<svg viewBox="0 0 480 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Estación VOR con radiales como rayos numerados y un avión en el radial 090">
  <text x="14" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">El VOR: un faro con 360 rayos numerados</text>

  <!-- rayos secundarios -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="200" y1="170" x2="265" y2="58"/>
    <line x1="200" y1="170" x2="312" y2="105"/>
    <line x1="200" y1="170" x2="312" y2="235"/>
    <line x1="200" y1="170" x2="265" y2="282"/>
    <line x1="200" y1="170" x2="135" y2="282"/>
    <line x1="200" y1="170" x2="88" y2="235"/>
    <line x1="200" y1="170" x2="88" y2="105"/>
    <line x1="200" y1="170" x2="135" y2="58"/>
  </g>

  <!-- rayos cardinales -->
  <g stroke="var(--accent)" stroke-width="2">
    <line x1="200" y1="170" x2="200" y2="45"/>
    <line x1="200" y1="170" x2="330" y2="170"/>
    <line x1="200" y1="170" x2="200" y2="295"/>
    <line x1="200" y1="170" x2="70" y2="170"/>
  </g>
  <text x="208" y="56" fill="var(--accent)" font-family="inherit" font-size="13">R-360</text>
  <text x="288" y="162" fill="var(--accent)" font-family="inherit" font-size="13">R-090</text>
  <text x="208" y="292" fill="var(--accent)" font-family="inherit" font-size="13">R-180</text>
  <text x="76" y="162" fill="var(--accent)" font-family="inherit" font-size="13">R-270</text>

  <!-- estación -->
  <path d="M200 155 L214 163 L214 178 L200 186 L186 178 L186 163 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="200" cy="170" r="3" fill="var(--text)"/>
  <text x="222" y="196" fill="var(--text)" font-family="inherit" font-size="12">estación VOR</text>

  <!-- avión en el radial 090 -->
  <path d="M370 170 L390 170 M380 162 L380 178 M375 182 L385 182" stroke="var(--ok)" stroke-width="3" fill="none"/>
  <line x1="345" y1="130" x2="375" y2="160" stroke="var(--muted)" stroke-width="1"/>
  <text x="300" y="108" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold">Estás en el radial 090</text>
  <text x="300" y="124" fill="var(--muted)" font-family="inherit" font-size="12">= al ESTE de la estación</text>

  <text x="14" y="308" fill="var(--muted)" font-family="inherit" font-size="12">El radial se nombra por su rumbo magnético DESDE la estación (FROM).</text>
</svg>
