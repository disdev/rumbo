<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-label="Compensador (trim tab) en el elevador">
  <defs>
    <marker id="tr-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--ok)"/>
    </marker>
    <marker id="tr-ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--accent)"/>
    </marker>
  </defs>
  <text x="210" y="24" text-anchor="middle" font-family="inherit" font-size="15" fill="var(--text)" font-weight="bold">Trim para nariz arriba (vista de perfil)</text>

  <!-- cono de cola -->
  <path d="M20,120 C70,108 120,110 165,124 L165,152 C120,160 70,158 20,146 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <text x="34" y="140" font-family="inherit" font-size="12" fill="var(--muted)">cola del avión</text>
  <text x="26" y="98" font-family="inherit" font-size="12" fill="var(--ok)">← hacia la nariz</text>

  <!-- estabilizador horizontal -->
  <path d="M160,128 L268,124 L268,138 L160,148 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <text x="180" y="168" font-family="inherit" font-size="12" fill="var(--text)">estabilizador horizontal</text>

  <!-- elevador deflectado arriba -->
  <path d="M268,124 L330,86 L336,96 L268,138 Z" fill="var(--accent)" stroke="var(--text)" stroke-width="1"/>
  <circle cx="269" cy="131" r="3" fill="var(--text)"/>
  <text x="288" y="76" font-family="inherit" font-size="13" fill="var(--accent)" font-weight="bold">elevador ARRIBA</text>

  <!-- trim tab deflectado abajo (opuesto) -->
  <path d="M332,90 L368,110 L363,117 L328,98 Z" fill="var(--bad)" stroke="var(--text)" stroke-width="1"/>
  <text x="322" y="140" font-family="inherit" font-size="13" fill="var(--bad)" font-weight="bold">trim tab ABAJO</text>
  <text x="322" y="156" font-family="inherit" font-size="12" fill="var(--muted)">(dirección opuesta)</text>

  <!-- el aire empuja el tab hacia arriba -->
  <line x1="352" y1="196" x2="352" y2="126" stroke="var(--ok)" stroke-width="2.5" marker-end="url(#tr-ok)"/>
  <text x="300" y="214" font-family="inherit" font-size="12" fill="var(--ok)">el aire empuja la pestaña y</text>
  <text x="300" y="229" font-family="inherit" font-size="12" fill="var(--ok)">sostiene el elevador arriba</text>

  <!-- cola baja / nariz sube -->
  <line x1="215" y1="180" x2="215" y2="222" stroke="var(--accent)" stroke-width="2.5" marker-end="url(#tr-ac)"/>
  <text x="150" y="240" font-family="inherit" font-size="12" fill="var(--accent)">la cola baja → la nariz sube, sin fuerza en el bastón</text>
</svg>
