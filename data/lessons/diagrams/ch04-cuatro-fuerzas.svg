<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" role="img" aria-label="Las cuatro fuerzas del vuelo: sustentación, peso, empuje y resistencia">
  <!-- avión (vista lateral, nariz a la izquierda) -->
  <ellipse cx="220" cy="130" rx="62" ry="14" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <polygon points="262,126 288,102 288,128" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M205 128 L235 128 L245 140 L215 140 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- sustentación (arriba) -->
  <line x1="220" y1="108" x2="220" y2="46" stroke="var(--ok)" stroke-width="4"/>
  <polygon points="220,30 210,50 230,50" fill="var(--ok)"/>
  <text x="232" y="52" font-family="inherit" font-size="14" fill="var(--ok)">sustentación (lift)</text>
  <!-- peso (abajo) -->
  <line x1="220" y1="152" x2="220" y2="214" stroke="var(--text)" stroke-width="4"/>
  <polygon points="220,230 210,210 230,210" fill="var(--text)"/>
  <text x="232" y="216" font-family="inherit" font-size="14" fill="var(--text)">peso (weight)</text>
  <!-- empuje (adelante = hacia la nariz) -->
  <line x1="150" y1="130" x2="80" y2="130" stroke="var(--accent)" stroke-width="4"/>
  <polygon points="64,130 84,120 84,140" fill="var(--accent)"/>
  <text x="20" y="110" font-family="inherit" font-size="14" fill="var(--accent)">empuje (thrust)</text>
  <!-- resistencia (atrás) -->
  <line x1="292" y1="140" x2="362" y2="140" stroke="var(--bad)" stroke-width="4"/>
  <polygon points="378,140 358,130 358,150" fill="var(--bad)"/>
  <text x="310" y="168" font-family="inherit" font-size="14" fill="var(--bad)">resistencia (drag)</text>
  <!-- equilibrio -->
  <text x="220" y="252" font-family="inherit" font-size="14" fill="var(--muted)" text-anchor="middle">vuelo recto y nivelado: sustentación = peso · empuje = resistencia</text>
</svg>
