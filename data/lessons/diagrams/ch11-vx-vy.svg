<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dos trayectorias de ascenso desde la pista: Vx sube con mejor ángulo y libra el árbol en menos distancia; Vy sube con mejor régimen, más pies por minuto, pero libra el obstáculo más lejos">
  <defs>
    <marker id="ch11-vxvy-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--accent)"/>
    </marker>
    <marker id="ch11-vxvy-arrow-ok" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--ok)"/>
    </marker>
  </defs>

  <!-- suelo -->
  <rect x="16" y="252" width="428" height="32" fill="var(--panel-2)" fill-opacity="0.35"/>
  <line x1="16" y1="252" x2="444" y2="252" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <rect x="24" y="246" width="112" height="7" rx="2" fill="var(--muted)" opacity="0.55"/>
  <text x="80" y="272" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">pista</text>

  <!-- árbol (obstáculo) -->
  <path d="M 292 252 L 294 208 L 300 208 L 302 252 Z" fill="var(--muted)"/>
  <path d="M 297 148 C 279 150 269 166 276 181 C 265 189 272 206 287 207 C 291 215 305 215 309 207 C 323 206 330 190 320 181 C 327 166 316 150 297 148 Z" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="297" y="272" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">obstáculo</text>

  <!-- trayectoria Vy: mejor régimen -->
  <path d="M 130 250 C 192 245 240 224 296 191 C 344 163 396 137 434 119" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 5" marker-end="url(#ch11-vxvy-arrow-ok)"/>

  <!-- trayectoria Vx: mejor ángulo -->
  <path d="M 100 250 C 152 245 192 214 238 172 C 276 137 316 105 360 71" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch11-vxvy-arrow)"/>

  <!-- avioncito sobre la senda Vx -->
  <g transform="translate(322,101) rotate(-38)" fill="var(--accent)">
    <path d="M 6 -3 L 10 -10 L 13 -9 L 11 -2 Z"/>
    <path d="M -2 0 L -9 7 L -3 7 L 3 1 Z"/>
    <path d="M -13 1 C -8 -3 4 -5 12 -2 C 14 -1 14 1 12 2 C 4 5 -7 4 -13 1 Z"/>
  </g>

  <text x="120" y="106" fill="var(--accent)" font-family="inherit" font-size="13.5" text-anchor="middle" font-weight="600">Vx — mejor ÁNGULO</text>
  <text x="120" y="124" fill="var(--accent)" font-family="inherit" font-size="11.5" text-anchor="middle">libra el árbol en menos distancia</text>

  <text x="444" y="226" fill="var(--ok)" font-family="inherit" font-size="13.5" text-anchor="end" font-weight="600">Vy — mejor RÉGIMEN</text>
  <text x="444" y="243" fill="var(--ok)" font-family="inherit" font-size="11.5" text-anchor="end">más pies por minuto</text>
</svg>
