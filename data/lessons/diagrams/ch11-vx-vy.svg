<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trayectorias de ascenso: Vx libra el obstáculo con mejor ángulo, Vy gana altura más rápido por tiempo">
  <text x="240" y="24" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="bold">Vx vs Vy: ¿ángulo o rapidez?</text>

  <!-- ground -->
  <line x1="10" y1="230" x2="470" y2="230" stroke="var(--text)" stroke-width="2"/>
  <!-- runway -->
  <rect x="20" y="224" width="120" height="6" fill="var(--muted)"/>
  <text x="80" y="250" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">pista</text>

  <!-- obstacle: tree -->
  <line x1="300" y1="230" x2="300" y2="180" stroke="var(--text)" stroke-width="3"/>
  <polygon points="300,130 282,185 318,185" fill="var(--ok)"/>
  <polygon points="300,150 286,195 314,195" fill="var(--ok)"/>
  <text x="300" y="250" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">obstáculo (árboles)</text>

  <!-- Vx path: steeper -->
  <line x1="140" y1="224" x2="330" y2="90" stroke="var(--accent)" stroke-width="3"/>
  <polygon points="336,86 324,88 330,99" fill="var(--accent)"/>
  <text x="196" y="130" fill="var(--accent)" font-family="inherit" font-size="14" text-anchor="middle" font-weight="bold">Vx</text>
  <text x="196" y="148" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">mejor ÁNGULO:</text>
  <text x="196" y="164" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">más altura por DISTANCIA</text>

  <!-- Vy path: shallower -->
  <line x1="140" y1="224" x2="460" y2="130" stroke="var(--ok)" stroke-width="3" stroke-dasharray="8 5"/>
  <polygon points="466,128 454,126 457,138" fill="var(--ok)"/>
  <text x="408" y="164" fill="var(--ok)" font-family="inherit" font-size="14" text-anchor="middle" font-weight="bold">Vy</text>
  <text x="408" y="182" fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle">mejor RÉGIMEN:</text>
  <text x="408" y="198" fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle">más altura por TIEMPO</text>

  <!-- angle marker -->
  <path d="M 200 224 A 60 60 0 0 0 189 189" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="222" y="210" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">ángulo ↑</text>

  <text x="240" y="52" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Vx: pista corta con obstáculo · Vy: ganar altura rápido cuando ya no hay obstáculo</text>
</svg>
