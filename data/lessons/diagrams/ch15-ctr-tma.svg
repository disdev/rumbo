<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vista lateral de un aeropuerto con su ATZ, la CTR desde la superficie y el TMA encima con piso elevado, como torta de bodas invertida">
  <!-- TMA nivel 2 (más ancho, más alto) -->
  <rect x="40" y="40" width="400" height="60" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2"/>
  <text x="60" y="65" fill="var(--accent)" font-family="inherit" font-size="14" font-weight="bold">TMA — área de control terminal</text>
  <text x="60" y="85" fill="var(--muted)" font-family="inherit" font-size="12">organiza llegadas y salidas; su piso NO toca el suelo</text>

  <!-- TMA nivel 1 (escalón) -->
  <rect x="110" y="100" width="260" height="55" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2"/>
  <text x="130" y="125" fill="var(--accent)" font-family="inherit" font-size="13">TMA escalón inferior</text>
  <text x="130" y="143" fill="var(--muted)" font-family="inherit" font-size="12">piso más bajo cerca del aeropuerto</text>

  <!-- CTR desde superficie -->
  <rect x="170" y="155" width="140" height="105" fill="none" stroke="var(--ok)" stroke-width="2.5"/>
  <text x="182" y="180" fill="var(--ok)" font-family="inherit" font-size="14" font-weight="bold">CTR</text>
  <text x="182" y="198" fill="var(--muted)" font-family="inherit" font-size="12">zona de control:</text>
  <text x="182" y="213" fill="var(--muted)" font-family="inherit" font-size="12">desde la superficie</text>

  <!-- ATZ (pequeña, punteada) -->
  <rect x="200" y="215" width="80" height="45" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="240" y1="215" x2="330" y2="188" stroke="var(--muted)" stroke-width="1"/>
  <text x="335" y="185" fill="var(--text)" font-family="inherit" font-size="12">ATZ: zona de</text>
  <text x="335" y="199" fill="var(--text)" font-family="inherit" font-size="12">tránsito, protege</text>
  <text x="335" y="213" fill="var(--text)" font-family="inherit" font-size="12">el circuito</text>

  <!-- espacio bajo el piso del TMA -->
  <line x1="80" y1="100" x2="80" y2="260" stroke="var(--muted)" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="46" y="200" fill="var(--muted)" font-family="inherit" font-size="11">aquí abajo:</text>
  <text x="46" y="214" fill="var(--muted)" font-family="inherit" font-size="11">E o G, fuera</text>
  <text x="46" y="228" fill="var(--muted)" font-family="inherit" font-size="11">del TMA</text>

  <!-- suelo y pista -->
  <line x1="20" y1="260" x2="460" y2="260" stroke="var(--text)" stroke-width="2"/>
  <rect x="215" y="256" width="50" height="5" fill="var(--text)"/>
  <text x="205" y="280" fill="var(--muted)" font-family="inherit" font-size="12">pista</text>
</svg>
