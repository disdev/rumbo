<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vista lateral de un aeropuerto con su ATZ, la CTR desde la superficie y el TMA encima con piso elevado, como torta de bodas invertida">
  <!-- TMA superior (más ancho, más alto) -->
  <rect x="56" y="42" width="368" height="62" rx="3" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="2"/>
  <text x="76" y="68" fill="var(--accent)" font-family="inherit" font-size="14" font-weight="bold">TMA — área de control terminal</text>
  <text x="76" y="88" fill="var(--muted)" font-family="inherit" font-size="12">organiza llegadas y salidas; su piso NO toca el suelo</text>

  <!-- TMA escalón inferior -->
  <rect x="116" y="104" width="248" height="56" rx="3" fill="var(--accent)" fill-opacity="0.24" stroke="var(--accent)" stroke-width="2"/>
  <text x="136" y="128" fill="var(--accent)" font-family="inherit" font-size="12.5" font-weight="bold">TMA escalón inferior</text>
  <text x="136" y="144" fill="var(--muted)" font-family="inherit" font-size="11">piso más bajo cerca del aeropuerto</text>

  <!-- CTR desde la superficie -->
  <rect x="186" y="160" width="108" height="100" rx="3" fill="var(--ok)" fill-opacity="0.12" stroke="var(--ok)" stroke-width="2.5"/>
  <text x="200" y="184" fill="var(--ok)" font-family="inherit" font-size="14" font-weight="bold">CTR</text>
  <text x="200" y="200" fill="var(--muted)" font-family="inherit" font-size="11">desde la superficie</text>

  <!-- ATZ (pequeña, punteada) -->
  <rect x="206" y="214" width="68" height="46" rx="4" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- bajo el piso del TMA: E o G -->
  <line x1="88" y1="104" x2="88" y2="260" stroke="var(--muted)" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="24" y="192" fill="var(--muted)" font-family="inherit" font-size="11">bajo el piso</text>
  <text x="24" y="206" fill="var(--muted)" font-family="inherit" font-size="11">del TMA:</text>
  <text x="24" y="220" fill="var(--muted)" font-family="inherit" font-size="11">clase E o G</text>

  <!-- guía ATZ -->
  <line x1="326" y1="204" x2="272" y2="222" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="270" cy="223" r="2.5" fill="var(--muted)"/>
  <text x="330" y="200" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">ATZ: zona de tránsito</text>
  <text x="330" y="215" fill="var(--muted)" font-family="inherit" font-size="12">protege el circuito</text>
  <text x="330" y="230" fill="var(--muted)" font-family="inherit" font-size="12">del aeródromo</text>

  <!-- suelo y pista -->
  <rect x="20" y="260" width="440" height="14" fill="var(--panel-2)" fill-opacity="0.5"/>
  <line x1="20" y1="260" x2="460" y2="260" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <rect x="214" y="256" width="52" height="5" fill="var(--text)"/>
  <text x="240" y="290" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">pista</text>
</svg>
