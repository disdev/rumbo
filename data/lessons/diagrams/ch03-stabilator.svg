<svg viewBox="0 0 480 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparación entre estabilizador con elevador y stabilator de una pieza con tab antiservo">
  <!-- Panel izquierdo: estabilizador + elevador -->
  <text x="120" y="28" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle">Estabilizador + elevador</text>
  <text x="120" y="44" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(dos piezas)</text>
  <path d="M30 100 L150 96 L150 112 L34 114 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M150 96 L210 90 L210 106 L150 112 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2.5"/>
  <circle cx="150" cy="104" r="4" fill="var(--accent)"/>
  <text x="60" y="140" fill="var(--muted)" font-family="inherit" font-size="12">fijo</text>
  <text x="165" y="135" fill="var(--accent)" font-family="inherit" font-size="12">solo esto se mueve</text>

  <!-- Panel derecho: stabilator -->
  <text x="360" y="28" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle">Stabilator</text>
  <text x="360" y="44" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(una sola pieza que pivota)</text>
  <path d="M270 108 L420 92 L420 106 L272 122 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2.5"/>
  <circle cx="330" cy="110" r="5" fill="var(--text)"/>
  <text x="318" y="145" fill="var(--muted)" font-family="inherit" font-size="12">punto de pivote</text>
  <line x1="330" y1="128" x2="330" y2="115" stroke="var(--muted)" stroke-width="1"/>
  <!-- tab antiservo -->
  <path d="M420 94 L448 90 L448 102 L420 105 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2.5"/>
  <line x1="434" y1="88" x2="440" y2="60" stroke="var(--muted)" stroke-width="1"/>
  <text x="345" y="70" fill="var(--bad)" font-family="inherit" font-size="13">tab antiservo</text>

  <!-- flechas de movimiento -->
  <path d="M415 80 Q425 70 435 78" fill="none" stroke="var(--accent)" stroke-width="2" marker-end="url(#fl)"/>
  <defs>
    <marker id="fl" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <text x="240" y="185" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">El tab antiservo se mueve en la MISMA dirección que el borde de salida:</text>
  <text x="240" y="203" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">pone resistencia al mando para que el stabilator no sea tan sensible</text>
  <text x="240" y="226" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(además funciona como compensador ajustable desde la cabina)</text>
</svg>
