    <marker id="k5e-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="var(--accent)"/></marker>
    <marker id="k5e-txt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="var(--text)"/></marker>
  </defs>
  <text x="200" y="20" fill="var(--muted)" font-size="12" text-anchor="middle">Viraje a la derecha, visto desde atrás (banqueo 30°)</text>
