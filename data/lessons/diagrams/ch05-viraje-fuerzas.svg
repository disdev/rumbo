<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="inherit" role="img" aria-label="En el viraje la sustentación se inclina: la componente vertical sostiene el peso y la horizontal hace girar el avión">
  <defs>
    <marker id="ch05-viraje-arrow-ok" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--ok)"/></marker>
    <marker id="ch05-viraje-arrow-a" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/></marker>
    <marker id="ch05-viraje-arrow-t" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--text)"/></marker>
  </defs>

  <text x="210" y="22" font-size="12" fill="var(--muted)" text-anchor="middle">viraje a la derecha visto desde atrás — banqueo 30°</text>

  <!-- avión banqueado 30°, visto desde atrás -->
  <g transform="translate(200 160) rotate(30)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="var(--panel-2)">
    <path d="M -3.5 -10 C -3.5 -20 -2 -27 0 -32 C 2 -27 3.5 -20 3.5 -10 Z"/>
    <path d="M -28 -8 C -13 -9.5 13 -9.5 28 -8 L 25 -4.5 C 11 -6 -11 -6 -25 -4.5 Z"/>
    <path d="M -9 -3 L -92 -13 C -97 -13.6 -99 -10 -95 -8.5 L -9 4 Z"/>
    <path d="M 9 -3 L 92 -13 C 97 -13.6 99 -10 95 -8.5 L 9 4 Z"/>
    <circle cx="0" cy="0" r="11"/>
  </g>

  <!-- paralelogramo de construcción -->
  <g stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 4">
    <line x1="200" y1="56" x2="260" y2="56"/>
    <line x1="260" y1="160" x2="260" y2="56"/>
  </g>

  <!-- sustentación total, inclinada con el banqueo -->
  <line x1="200" y1="160" x2="260" y2="56" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch05-viraje-arrow-ok)"/>
  <text x="270" y="50" font-size="14" fill="var(--ok)" font-weight="bold">sustentación total</text>

  <!-- componente vertical -->
  <line x1="200" y1="160" x2="200" y2="60" stroke="var(--ok)" stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round" marker-end="url(#ch05-viraje-arrow-ok)"/>
  <text x="192" y="44" font-size="12" fill="var(--ok)" text-anchor="end">componente vertical</text>
  <text x="192" y="59" font-size="12" fill="var(--ok)" text-anchor="end">(sostiene el peso)</text>

  <!-- componente horizontal -->
  <line x1="200" y1="160" x2="256" y2="160" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round" marker-end="url(#ch05-viraje-arrow-a)"/>
  <text x="286" y="148" font-size="12" fill="var(--accent)">componente horizontal</text>
  <text x="286" y="163" font-size="12" fill="var(--accent)" font-weight="bold">(¡hace girar!)</text>

  <!-- ángulo de banqueo -->
  <path d="M 200 96 A 64 64 0 0 1 232 105" fill="none" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <text x="214" y="88" font-size="11" fill="var(--muted)">30°</text>

  <!-- peso -->
  <line x1="200" y1="174" x2="200" y2="262" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch05-viraje-arrow-t)"/>
  <text x="212" y="256" font-size="14" fill="var(--text)" font-weight="bold">peso</text>

  <text x="210" y="284" font-size="11" fill="var(--muted)" text-anchor="middle">la componente vertical se achica:</text>
  <text x="210" y="297" font-size="11" fill="var(--muted)" text-anchor="middle">hay que aumentar el ángulo de ataque para no perder altura</text>
</svg>
