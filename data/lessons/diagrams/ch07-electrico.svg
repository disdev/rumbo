<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" role="img" aria-label="Sistema eléctrico: batería, alternador, bus y breakers">
  <defs>
    <marker id="ch07-el-tx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--text)"/></marker>
  </defs>
  <text x="230" y="22" text-anchor="middle" font-family="inherit" font-size="15" font-weight="bold" fill="var(--text)">Batería y alternador alimentan el bus eléctrico</text>

  <!-- batería -->
  <rect x="28" y="112" width="84" height="48" rx="6" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="70" y="133" text-anchor="middle" font-family="inherit" font-size="12" font-weight="bold" fill="var(--text)">BATERÍA</text>
  <text x="70" y="149" text-anchor="middle" font-family="inherit" font-size="11" fill="var(--muted)">12 / 24 V</text>

  <!-- alternador -->
  <circle cx="68" cy="240" r="26" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M54,240 C58,231 64,231 68,240 C72,249 78,249 82,240" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="68" y="282" text-anchor="middle" font-family="inherit" font-size="12" fill="var(--text)">alternador</text>

  <!-- master switch -->
  <line x1="112" y1="136" x2="144" y2="136" stroke="var(--text)" stroke-width="2"/>
  <circle cx="147" cy="136" r="2.5" fill="var(--text)"/>
  <circle cx="173" cy="136" r="2.5" fill="var(--text)"/>
  <line x1="147" y1="136" x2="171" y2="122" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="158" y="160" text-anchor="middle" font-family="inherit" font-size="12" fill="var(--accent)">master</text>

  <!-- amperímetro -->
  <line x1="175" y1="136" x2="201" y2="136" stroke="var(--text)" stroke-width="2"/>
  <circle cx="216" cy="136" r="15" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <line x1="216" y1="141" x2="224" y2="126" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
  <text x="216" y="110" text-anchor="middle" font-family="inherit" font-size="12" fill="var(--text)">amperímetro</text>
  <line x1="231" y1="136" x2="280" y2="136" stroke="var(--text)" stroke-width="2" marker-end="url(#ch07-el-tx)"/>

  <!-- alternador → bus, y carga de la batería -->
  <line x1="94" y1="240" x2="280" y2="240" stroke="var(--text)" stroke-width="2" marker-end="url(#ch07-el-tx)"/>
  <line x1="68" y1="212" x2="68" y2="166" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ch07-el-tx)"/>
  <text x="80" y="192" font-family="inherit" font-size="11" fill="var(--muted)">carga la</text>
  <text x="80" y="205" font-family="inherit" font-size="11" fill="var(--muted)">batería</text>

  <!-- bus -->
  <rect x="284" y="66" width="10" height="190" rx="3" fill="var(--accent)"/>
  <text x="289" y="56" text-anchor="middle" font-family="inherit" font-size="13" font-weight="bold" fill="var(--accent)">bus</text>

  <!-- circuitos con fusible / breaker -->
  <g stroke="var(--text)" stroke-width="1.5">
    <line x1="294" y1="84" x2="316" y2="84"/><circle cx="324" cy="84" r="6" fill="var(--panel-2)"/><line x1="330" y1="84" x2="348" y2="84"/>
    <line x1="294" y1="126" x2="316" y2="126"/><circle cx="324" cy="126" r="6" fill="var(--panel-2)"/><line x1="330" y1="126" x2="348" y2="126"/>
    <line x1="294" y1="168" x2="316" y2="168"/><circle cx="324" cy="168" r="6" fill="var(--panel-2)"/><line x1="330" y1="168" x2="348" y2="168"/>
    <line x1="294" y1="210" x2="316" y2="210"/><circle cx="324" cy="210" r="6" fill="var(--panel-2)"/><line x1="330" y1="210" x2="348" y2="210"/>
  </g>
  <g font-family="inherit" font-size="12" fill="var(--text)">
    <text x="354" y="88">luces</text>
    <text x="354" y="130">radios / aviónica</text>
    <text x="354" y="172">instrumentos</text>
    <text x="354" y="214">flaps eléctricos</text>
  </g>
  <text x="318" y="240" font-family="inherit" font-size="11" fill="var(--muted)">○ = fusible / breaker:</text>
  <text x="318" y="253" font-family="inherit" font-size="11" fill="var(--muted)">cada circuito, protegido</text>

  <!-- los magnetos quedan FUERA -->
  <text x="230" y="294" text-anchor="middle" font-family="inherit" font-size="13" font-weight="bold" fill="var(--bad)">Los magnetos NO están en este circuito:</text>
  <text x="230" y="310" text-anchor="middle" font-family="inherit" font-size="12" fill="var(--bad)">aunque todo esto falle, el motor sigue encendido.</text>
</svg>
