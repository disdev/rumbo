  <text x="58" y="284" fill="var(--muted)" font-family="inherit" font-size="10" text-anchor="middle">OBS</text>

  <!-- anotaciones -->
  <line x1="184" y1="100" x2="300" y2="70" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="184" cy="100" r="2.5" fill="var(--muted)"/>
  <text x="306" y="62" fill="var(--accent)" font-family="inherit" font-size="12" font-weight="bold">Aguja a la derecha</text>
  <text x="306" y="77" fill="var(--text)" font-family="inherit" font-size="12">el curso esta a tu derecha:</text>
  <text x="306" y="92" fill="var(--text)" font-family="inherit" font-size="12">vuela HACIA la aguja.</text>

  <text x="306" y="122" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Cada punto ≈ 2 grados</text>
  <text x="306" y="137" fill="var(--muted)" font-family="inherit" font-size="11">dos puntos ≈ 4 grados fuera</text>

  <text x="306" y="168" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">Bandera TO</text>
  <text x="306" y="183" fill="var(--muted)" font-family="inherit" font-size="11">el curso 090 te lleva HACIA</text>
  <text x="306" y="196" fill="var(--muted)" font-family="inherit" font-size="11">la estacion.</text>

  <text x="306" y="226" fill="var(--muted)" font-family="inherit" font-size="11">La aguja no depende de hacia</text>
  <text x="306" y="239" fill="var(--muted)" font-family="inherit" font-size="11">donde apunta tu nariz: solo</text>
  <text x="306" y="252" fill="var(--muted)" font-family="inherit" font-size="11">de donde ESTAS.</text>
