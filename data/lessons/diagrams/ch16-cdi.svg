  <!-- indice OBS arriba (triangulo) + lectura 090 -->
  <path d="M150 38 l-7 -12 l14 0 Z" fill="var(--accent)"/>
  <rect x="128" y="-4" width="44" height="22" rx="4" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1"/>
  <text x="150" y="12" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">090</text>

  <!-- puntos de desviacion (5 dots: -4 -2 0 +2 +4) -->
  <g fill="none" stroke="var(--muted)" stroke-width="1.25">
    <circle cx="90" cy="158" r="5"/>
    <circle cx="120" cy="158" r="5"/>
    <circle cx="180" cy="158" r="5"/>
    <circle cx="210" cy="158" r="5"/>
  </g>
  <circle cx="150" cy="158" r="2.5" fill="var(--text)"/>

  <!-- aguja CDI desviada 2 puntos a la derecha (barra vertical corrida +30 px) -->
  <line x1="180" y1="96" x2="180" y2="220" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- bandera TO (triangulo apuntando arriba) -->
  <path d="M150 200 l-8 14 l16 0 Z" fill="var(--ok)"/>
  <text x="150" y="236" fill="var(--ok)" font-family="inherit" font-size="11" font-weight="bold" text-anchor="middle">TO</text>

  <!-- perilla OBS -->
