<svg viewBox="0 0 540 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pista vista desde arriba con chevrones, barra de demarcación, umbral desplazado, umbral, designador, zona de toque, punto de mira y eje">
  <!-- blast pad con chevrones -->
  <rect x="28" y="130" width="68" height="60" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M38 160 L56 138 M38 160 L56 182 M58 160 L76 138 M58 160 L76 182" stroke="var(--accent)" stroke-width="3" fill="none"/>
  <!-- barra de demarcación -->
  <rect x="96" y="130" width="6" height="60" fill="var(--accent)"/>
  <!-- pista -->
  <rect x="102" y="130" width="410" height="60" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- flechas de umbral desplazado -->
  <path d="M112 146 h28 m0 0 l-8 -5 m8 5 l-8 5 M112 160 h28 m0 0 l-8 -5 m8 5 l-8 5 M112 174 h28 m0 0 l-8 -5 m8 5 l-8 5" stroke="var(--text)" stroke-width="2.5" fill="none"/>
  <!-- umbral: franjas -->
  <rect x="152" y="136" width="22" height="7" fill="var(--text)"/>
  <rect x="152" y="149" width="22" height="7" fill="var(--text)"/>
  <rect x="152" y="162" width="22" height="7" fill="var(--text)"/>
  <rect x="152" y="175" width="22" height="7" fill="var(--text)"/>
  <!-- designador -->
  <text x="196" y="169" fill="var(--text)" font-family="inherit" font-size="24" font-weight="bold">12</text>
  <!-- zona de toque (pares) -->
  <rect x="256" y="138" width="16" height="8" fill="var(--text)"/>
  <rect x="256" y="174" width="16" height="8" fill="var(--text)"/>
  <rect x="386" y="138" width="16" height="8" fill="var(--text)"/>
  <rect x="386" y="174" width="16" height="8" fill="var(--text)"/>
  <!-- punto de mira -->
  <rect x="310" y="139" width="40" height="10" fill="var(--text)"/>
  <rect x="310" y="171" width="40" height="10" fill="var(--text)"/>
  <!-- eje -->
  <line x1="246" y1="160" x2="500" y2="160" stroke="var(--text)" stroke-width="3" stroke-dasharray="18 12"/>

  <!-- etiquetas superiores -->
  <line x1="58" y1="138" x2="52" y2="70" stroke="var(--muted)" stroke-width="1"/>
  <text x="14" y="48" fill="var(--bad)" font-family="inherit" font-size="12">Chevrones:</text>
  <text x="14" y="62" fill="var(--muted)" font-family="inherit" font-size="12">NO se usa para nada</text>

  <line x1="126" y1="140" x2="150" y2="82" stroke="var(--muted)" stroke-width="1"/>
  <text x="118" y="62" fill="var(--text)" font-family="inherit" font-size="12">Flechas: umbral desplazado</text>
  <text x="118" y="76" fill="var(--muted)" font-family="inherit" font-size="12">rodar y despegar SÍ · tocar tierra NO</text>

  <line x1="208" y1="140" x2="300" y2="100" stroke="var(--muted)" stroke-width="1"/>
  <text x="302" y="90" fill="var(--text)" font-family="inherit" font-size="12">Designador: rumbo magnético ÷ 10</text>
  <text x="302" y="104" fill="var(--muted)" font-family="inherit" font-size="12">(12 ≈ 120° magnéticos)</text>

  <!-- etiquetas inferiores -->
  <line x1="99" y1="192" x2="80" y2="228" stroke="var(--muted)" stroke-width="1"/>
  <text x="20" y="244" fill="var(--accent)" font-family="inherit" font-size="12">Barra de demarcación</text>

  <line x1="163" y1="192" x2="180" y2="250" stroke="var(--muted)" stroke-width="1"/>
  <text x="150" y="266" fill="var(--ok)" font-family="inherit" font-size="12">Umbral: aquí SÍ</text>
  <text x="150" y="280" fill="var(--ok)" font-family="inherit" font-size="12">puedes tocar tierra</text>

  <line x1="264" y1="184" x2="285" y2="222" stroke="var(--muted)" stroke-width="1"/>
  <text x="270" y="238" fill="var(--text)" font-family="inherit" font-size="12">Zona de toque</text>

  <line x1="330" y1="184" x2="368" y2="204" stroke="var(--muted)" stroke-width="1"/>
  <text x="372" y="210" fill="var(--text)" font-family="inherit" font-size="12">Punto de mira</text>

  <line x1="460" y1="160" x2="472" y2="234" stroke="var(--muted)" stroke-width="1"/>
  <text x="450" y="250" fill="var(--text)" font-family="inherit" font-size="12">Eje</text>
</svg>
