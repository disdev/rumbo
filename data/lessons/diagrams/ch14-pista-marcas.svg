<svg viewBox="0 0 560 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pista vista desde arriba con chevrones, barra de demarcación, umbral desplazado, franjas de umbral, designador, zona de toque, punto de mira y eje">
  <!-- terreno alrededor -->
  <rect x="16" y="110" width="528" height="92" rx="4" fill="var(--panel-2)" fill-opacity="0.3"/>

  <!-- blast pad con chevrones (apuntan hacia la pista) -->
  <rect x="24" y="120" width="60" height="72" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--text)" stroke-width="1.25"/>
  <path d="M32 128 L52 156 L32 184 M54 128 L74 156 L54 184" fill="none" stroke="var(--warn)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- pista -->
  <rect x="88" y="120" width="440" height="72" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- barra de demarcación (amarilla) -->
  <rect x="88" y="120" width="6" height="72" fill="var(--warn)"/>

  <!-- umbral desplazado: flechas sobre el eje + cabezas antes de la barra de umbral -->
  <g stroke="var(--text)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M102 156 h26 m0 0 l-9 -6 m9 6 l-9 6"/>
    <path d="M138 156 h26 m0 0 l-9 -6 m9 6 l-9 6"/>
    <path d="M172 128 l9 6 -9 6 M172 150 l9 6 -9 6 M172 172 l9 6 -9 6"/>
  </g>
  <!-- barra de umbral -->
  <rect x="188" y="124" width="5" height="64" fill="var(--text)"/>

  <!-- franjas de umbral: 4 por lado, simétricas al eje -->
  <g fill="var(--text)">
    <rect x="200" y="125" width="28" height="5"/><rect x="200" y="133" width="28" height="5"/>
    <rect x="200" y="141" width="28" height="5"/><rect x="200" y="149" width="28" height="5"/>
    <rect x="200" y="160" width="28" height="5"/><rect x="200" y="168" width="28" height="5"/>
    <rect x="200" y="176" width="28" height="5"/><rect x="200" y="184" width="28" height="5"/>
  </g>

  <!-- designador (orientado en el sentido de aterrizaje) -->
  <text x="250" y="156" dy="10" fill="var(--text)" font-family="inherit" font-size="30" font-weight="bold" text-anchor="middle" transform="rotate(90 250 156)">12</text>

  <!-- eje -->
  <line x1="272" y1="156" x2="522" y2="156" stroke="var(--text)" stroke-width="3" stroke-dasharray="20 14" stroke-linecap="round"/>

  <!-- zona de toque: pares simétricos al eje -->
  <g fill="var(--text)">
    <rect x="288" y="130" width="20" height="5"/><rect x="288" y="139" width="20" height="5"/>
    <rect x="288" y="168" width="20" height="5"/><rect x="288" y="177" width="20" height="5"/>
    <rect x="448" y="136" width="20" height="5"/><rect x="448" y="171" width="20" height="5"/>
  </g>

  <!-- punto de mira: dos bloques grandes -->
  <rect x="340" y="132" width="44" height="12" fill="var(--text)"/>
  <rect x="340" y="168" width="44" height="12" fill="var(--text)"/>

  <!-- líneas guía con punto en el objetivo -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="46" y1="66" x2="53" y2="119"/>
    <line x1="134" y1="64" x2="128" y2="145"/>
    <line x1="304" y1="55" x2="257" y2="136"/>
    <line x1="74" y1="226" x2="90" y2="195"/>
    <line x1="196" y1="252" x2="214" y2="193"/>
    <line x1="290" y1="234" x2="297" y2="185"/>
    <line x1="398" y1="230" x2="365" y2="183"/>
    <line x1="488" y1="230" x2="481" y2="161"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="53" cy="121" r="2.5"/><circle cx="128" cy="147" r="2.5"/><circle cx="255" cy="138" r="2.5"/>
    <circle cx="91" cy="193" r="2.5"/><circle cx="215" cy="191" r="2.5"/><circle cx="297" cy="183" r="2.5"/>
    <circle cx="364" cy="181" r="2.5"/><circle cx="481" cy="159" r="2.5"/>
  </g>

  <text x="18" y="34" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">Chevrones</text>
  <text x="18" y="49" fill="var(--muted)" font-family="inherit" font-size="12">zona inutilizable: ni rodar,</text>
  <text x="18" y="63" fill="var(--muted)" font-family="inherit" font-size="12">ni despegar, ni aterrizar</text>

  <text x="112" y="32" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Flechas: umbral desplazado</text>
  <text x="112" y="47" fill="var(--muted)" font-family="inherit" font-size="12">rodar y despegar SÍ ·</text>
  <text x="112" y="61" fill="var(--muted)" font-family="inherit" font-size="12">tocar tierra NO</text>

  <text x="298" y="35" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Designador: rumbo magnético ÷ 10</text>
  <text x="298" y="50" fill="var(--muted)" font-family="inherit" font-size="12">(12 ≈ 120° magnéticos)</text>

  <text x="20" y="242" fill="var(--warn)" font-family="inherit" font-size="12" font-weight="bold">Barra de demarcación</text>
  <text x="20" y="257" fill="var(--muted)" font-family="inherit" font-size="12">separa el blast pad de la pista</text>

  <text x="148" y="268" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">Umbral (franjas)</text>
  <text x="148" y="283" fill="var(--ok)" font-family="inherit" font-size="12">aquí SÍ puedes tocar tierra</text>

  <text x="264" y="250" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Zona de toque</text>
  <text x="264" y="265" fill="var(--muted)" font-family="inherit" font-size="12">pares a cada lado del eje</text>

  <text x="376" y="246" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Punto de mira</text>
  <text x="376" y="261" fill="var(--muted)" font-family="inherit" font-size="12">apunta aquí al aproximar</text>

  <text x="480" y="246" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Eje</text>
</svg>
