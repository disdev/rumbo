<svg viewBox="0 0 480 344" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lista PAVE en cuatro tarjetas con iconos: Piloto, Aeronave, entorno y presiones Externas, esta última resaltada como la más peligrosa">
  <text x="12" y="26" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">PAVE — revisa los cuatro antes de cada vuelo</text>

  <!-- P · Piloto -->
  <rect x="12" y="44" width="224" height="134" rx="14" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--muted)" stroke-width="1.25"/>
  <circle cx="40" cy="76" r="15" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="2"/>
  <text x="40" y="81" fill="var(--accent)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">P</text>
  <text x="66" y="81" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Piloto</text>
  <g fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <circle cx="204" cy="70" r="8"/>
    <path d="M190 96 C190 84 196 80 204 80 C212 80 218 84 218 96"/>
  </g>
  <text x="28" y="116" fill="var(--muted)" font-family="inherit" font-size="12">¿Salud, descanso, estrés,</text>
  <text x="28" y="132" fill="var(--muted)" font-family="inherit" font-size="12">medicamentos, alcohol?</text>
  <text x="28" y="156" fill="var(--ok)" font-family="inherit" font-size="12">→ chequéate con IMSAFE</text>

  <!-- A · Aeronave -->
  <rect x="244" y="44" width="224" height="134" rx="14" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--muted)" stroke-width="1.25"/>
  <circle cx="272" cy="76" r="15" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="2"/>
  <text x="272" y="81" fill="var(--accent)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">A</text>
  <text x="298" y="81" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Aeronave (Aircraft)</text>
  <g fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <path d="M436 60 C438 60 438 62 437 66 L436 78 L450 86 L450 90 L436 87 L435 96 L440 100 L440 103 L436 102 L432 102 L432 99 L437 95 L436 87 L422 90 L422 86 L436 78 L435 66 C434 62 434 60 436 60 Z"/>
  </g>
  <text x="260" y="116" fill="var(--muted)" font-family="inherit" font-size="12">¿Combustible, mantenimiento,</text>
  <text x="260" y="132" fill="var(--muted)" font-family="inherit" font-size="12">equipo requerido?</text>
  <text x="260" y="156" fill="var(--ok)" font-family="inherit" font-size="12">→ ¿performance para esta pista?</text>

  <!-- V · Entorno -->
  <rect x="12" y="192" width="224" height="134" rx="14" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--muted)" stroke-width="1.25"/>
  <circle cx="40" cy="224" r="15" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="2"/>
  <text x="40" y="229" fill="var(--accent)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">V</text>
  <text x="66" y="229" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Entorno</text>
  <g fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <path d="M190 226 C186 226 184 222 186 218 C186 212 192 210 196 212 C198 206 208 206 210 212 C216 210 220 216 216 221 C215 224 212 226 208 226 Z"/>
    <line x1="188" y1="234" x2="204" y2="234"/>
    <line x1="196" y1="241" x2="214" y2="241"/>
  </g>
  <text x="28" y="258" fill="var(--muted)" font-family="inherit" font-size="12">(la V de enVironment)</text>
  <text x="28" y="278" fill="var(--muted)" font-family="inherit" font-size="12">¿Clima en ruta y destino?</text>
  <text x="28" y="294" fill="var(--muted)" font-family="inherit" font-size="12">¿Terreno, pista, día o noche?</text>

  <!-- E · Presiones externas -->
  <rect x="244" y="192" width="224" height="134" rx="14" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--warn)" stroke-width="2"/>
  <circle cx="272" cy="224" r="15" fill="var(--warn)" fill-opacity="0.2" stroke="var(--warn)" stroke-width="2"/>
  <text x="272" y="229" fill="var(--warn)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">E</text>
  <text x="298" y="229" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Presiones Externas</text>
  <g fill="none" stroke="var(--warn)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <circle cx="448" cy="224" r="11"/>
    <line x1="448" y1="224" x2="448" y2="216"/>
    <line x1="448" y1="224" x2="455" y2="227"/>
    <line x1="443" y1="210" x2="440" y2="207"/>
    <line x1="453" y1="210" x2="456" y2="207"/>
  </g>
  <text x="260" y="264" fill="var(--muted)" font-family="inherit" font-size="12">¿Qué te empuja a volar hoy?</text>
  <text x="260" y="280" fill="var(--muted)" font-family="inherit" font-size="12">¿Prometiste llegar? ¿Te esperan?</text>
  <text x="260" y="302" fill="var(--warn)" font-family="inherit" font-size="12" font-weight="bold">La más traicionera:</text>
  <text x="260" y="318" fill="var(--warn)" font-family="inherit" font-size="12">vive en tu cabeza.</text>
</svg>
