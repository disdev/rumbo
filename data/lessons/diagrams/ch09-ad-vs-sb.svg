<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparación entre una directiva de aeronavegabilidad obligatoria y un boletín de servicio recomendado">
  <text x="240" y="24" text-anchor="middle" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">¿Orden o consejo?</text>

  <!-- Panel AD -->
  <rect x="14" y="40" width="218" height="210" rx="10" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="3"/>
  <text x="123" y="66" text-anchor="middle" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">AD</text>
  <text x="123" y="84" text-anchor="middle" fill="var(--muted)" font-family="inherit" font-size="12">Directiva de aeronavegabilidad</text>
  <line x1="34" y1="94" x2="212" y2="94" stroke="var(--muted)" stroke-width="1"/>
  <text x="34" y="116" fill="var(--text)" font-family="inherit" font-size="12">• La emite la AUTORIDAD</text>
  <text x="34" y="138" fill="var(--text)" font-family="inherit" font-size="12">• Corrige algo inseguro</text>
  <text x="34" y="160" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">• OBLIGATORIA: es ley</text>
  <text x="34" y="182" fill="var(--text)" font-family="inherit" font-size="12">• De emergencia o con plazo</text>
  <text x="34" y="204" fill="var(--text)" font-family="inherit" font-size="12">• Única o recurrente</text>
  <text x="34" y="226" fill="var(--text)" font-family="inherit" font-size="12">• Se anota en los registros</text>

  <!-- Panel SB -->
  <rect x="248" y="40" width="218" height="210" rx="10" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="2"/>
  <text x="357" y="66" text-anchor="middle" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">SB</text>
  <text x="357" y="84" text-anchor="middle" fill="var(--muted)" font-family="inherit" font-size="12">Boletín de servicio</text>
  <line x1="268" y1="94" x2="446" y2="94" stroke="var(--muted)" stroke-width="1"/>
  <text x="268" y="116" fill="var(--text)" font-family="inherit" font-size="12">• Lo emite el FABRICANTE</text>
  <text x="268" y="138" fill="var(--text)" font-family="inherit" font-size="12">• Recomendación o mejora</text>
  <text x="268" y="160" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">• VOLUNTARIO: consejo</text>
  <text x="268" y="182" fill="var(--text)" font-family="inherit" font-size="12">• Buena idea seguirlo</text>
  <text x="268" y="204" fill="var(--text)" font-family="inherit" font-size="12">• …salvo que una AD</text>
  <text x="268" y="226" fill="var(--text)" font-family="inherit" font-size="12">  lo vuelva obligatorio</text>

  <!-- flecha -->
  <line x1="232" y1="270" x2="248" y2="270" stroke="var(--accent)" stroke-width="0"/>
  <path d="M330 258 Q240 278 150 258" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M150 258 L160 256 L156 265 Z" fill="var(--accent)"/>
  <text x="240" y="290" text-anchor="middle" fill="var(--accent)" font-family="inherit" font-size="12">Una AD puede exigir cumplir un SB</text>
</svg>
