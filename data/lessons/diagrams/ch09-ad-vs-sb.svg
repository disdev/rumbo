<svg viewBox="0 0 480 312" xmlns="http://www.w3.org/2000/svg" font-family="inherit" role="img" aria-label="Comparación entre una directiva de aeronavegabilidad obligatoria y un boletín de servicio recomendado">
  <defs>
    <marker id="ch09-adsb-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <text x="240" y="24" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="bold">¿Orden o consejo?</text>

  <!-- documento AD -->
  <path d="M16 50 Q16 42 24 42 H202 L236 76 V246 Q236 254 228 254 H24 Q16 254 16 246 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M202 42 V76 H236 Z" fill="var(--bad)" fill-opacity="0.2" stroke="var(--bad)" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="46" cy="74" r="15" fill="var(--bad)" fill-opacity="0.12" stroke="var(--bad)" stroke-width="2"/>
  <text x="46" y="80" text-anchor="middle" fill="var(--bad)" font-size="15" font-weight="bold">!</text>
  <text x="70" y="68" fill="var(--text)" font-size="15" font-weight="bold">AD</text>
  <text x="70" y="84" fill="var(--muted)" font-size="12">Directiva de</text>
  <text x="70" y="98" fill="var(--muted)" font-size="12">aeronavegabilidad</text>
  <line x1="30" y1="110" x2="222" y2="110" stroke="var(--muted)" stroke-width="1"/>
  <g fill="var(--text)" font-size="12">
    <text x="30" y="132">• La emite la AUTORIDAD</text>
    <text x="30" y="154">• Corrige algo inseguro</text>
    <text x="30" y="176" fill="var(--bad)" font-weight="bold">• OBLIGATORIA: es ley</text>
    <text x="30" y="198">• Única o recurrente</text>
    <text x="30" y="220">• Se anota en los registros</text>
  </g>

  <!-- documento SB -->
  <path d="M244 50 Q244 42 252 42 H430 L464 76 V246 Q464 254 456 254 H252 Q244 254 244 246 Z" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M430 42 V76 H464 Z" fill="var(--muted)" fill-opacity="0.35" stroke="var(--muted)" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="274" cy="74" r="15" fill="var(--ok)" fill-opacity="0.12" stroke="var(--ok)" stroke-width="2"/>
  <path d="M268 74.5 L272 79 L280.5 68.5" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="298" y="68" fill="var(--text)" font-size="15" font-weight="bold">SB</text>
  <text x="298" y="84" fill="var(--muted)" font-size="12">Boletín de</text>
  <text x="298" y="98" fill="var(--muted)" font-size="12">servicio</text>
  <line x1="258" y1="110" x2="450" y2="110" stroke="var(--muted)" stroke-width="1"/>
  <g fill="var(--text)" font-size="12">
    <text x="258" y="132">• Lo emite el FABRICANTE</text>
    <text x="258" y="154">• Recomendación o mejora</text>
    <text x="258" y="176" fill="var(--ok)" font-weight="bold">• VOLUNTARIO: consejo</text>
    <text x="258" y="198">• Buena idea seguirlo…</text>
    <text x="258" y="220">• …salvo que una AD lo exija</text>
  </g>

  <!-- una AD puede exigir un SB -->
  <path d="M126 266 Q240 294 344 266" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ch09-adsb-arrow)"/>
  <text x="240" y="306" text-anchor="middle" fill="var(--accent)" font-size="12">Una AD puede exigir cumplir un SB</text>
</svg>
