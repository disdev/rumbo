<svg viewBox="0 0 560 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Seis letreros de aeropuerto: mandatorio 16-34, ubicación B, dirección A, área ILS, no entrada y límite de pista">
  <!-- fila 1 -->
  <rect x="24" y="26" width="130" height="54" rx="6" fill="var(--bad)"/>
  <text x="89" y="61" fill="var(--panel-2)" font-family="inherit" font-size="22" font-weight="bold" text-anchor="middle">16-34</text>
  <text x="89" y="100" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Mandatorio (rojo)</text>
  <text x="89" y="114" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">espera de pista: NO pases</text>
  <text x="89" y="128" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">sin autorización</text>

  <rect x="216" y="26" width="130" height="54" rx="6" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="4"/>
  <text x="281" y="61" fill="var(--accent)" font-family="inherit" font-size="22" font-weight="bold" text-anchor="middle">B</text>
  <text x="281" y="100" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Ubicación (negro/amarillo)</text>
  <text x="281" y="114" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">ESTÁS en la calle B</text>

  <rect x="408" y="26" width="130" height="54" rx="6" fill="var(--accent)"/>
  <text x="473" y="61" fill="var(--panel-2)" font-family="inherit" font-size="22" font-weight="bold" text-anchor="middle">A →</text>
  <text x="473" y="100" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Dirección (amarillo)</text>
  <text x="473" y="114" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">la calle A está por ahí</text>

  <!-- fila 2 -->
  <rect x="24" y="158" width="130" height="54" rx="6" fill="var(--bad)"/>
  <text x="89" y="193" fill="var(--panel-2)" font-family="inherit" font-size="22" font-weight="bold" text-anchor="middle">ILS</text>
  <text x="89" y="232" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Mandatorio: área crítica ILS</text>
  <text x="89" y="246" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">espera si te lo indican</text>

  <rect x="216" y="158" width="130" height="54" rx="6" fill="var(--bad)"/>
  <circle cx="281" cy="185" r="19" fill="none" stroke="var(--panel-2)" stroke-width="5"/>
  <rect x="268" y="182" width="26" height="7" fill="var(--panel-2)"/>
  <text x="281" y="232" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">No entrada</text>
  <text x="281" y="246" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">área prohibida para aeronaves</text>

  <rect x="408" y="158" width="130" height="54" rx="6" fill="var(--accent)"/>
  <line x1="420" y1="176" x2="526" y2="176" stroke="var(--panel-2)" stroke-width="4" stroke-dasharray="8 6"/>
  <line x1="420" y1="185" x2="526" y2="185" stroke="var(--panel-2)" stroke-width="4" stroke-dasharray="8 6"/>
  <line x1="420" y1="195" x2="526" y2="195" stroke="var(--panel-2)" stroke-width="4"/>
  <line x1="420" y1="203" x2="526" y2="203" stroke="var(--panel-2)" stroke-width="4"/>
  <text x="473" y="232" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Límite del área de seguridad</text>
  <text x="473" y="246" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">crúzalo al salir = pista libre</text>
</svg>
