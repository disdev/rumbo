<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" font-family="inherit">
  <defs>
    <marker id="k5c-bad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="var(--bad)"/></marker>
    <marker id="k5c-mut" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="var(--muted)"/></marker>
  </defs>
  <text x="210" y="22" fill="var(--muted)" font-size="12" text-anchor="middle">Avión grande visto desde atrás</text>
  <g stroke="var(--text)" stroke-width="2.5" fill="var(--panel-2)">
    <line x1="120" y1="72" x2="300" y2="72"/>
    <path d="M210 62 L210 36 L224 62 Z"/>
    <circle cx="210" cy="72" r="11"/>
  </g>
  <path d="M138 92 A 24 24 0 1 1 92 82" fill="none" stroke="var(--bad)" stroke-width="2.5" marker-end="url(#k5c-bad)"/>
  <path d="M282 92 A 24 24 0 1 0 328 82" fill="none" stroke="var(--bad)" stroke-width="2.5" marker-end="url(#k5c-bad)"/>
  <text x="70" y="130" fill="var(--bad)" font-size="12" text-anchor="middle">giran hacia afuera,</text>
  <text x="70" y="144" fill="var(--bad)" font-size="12" text-anchor="middle">arriba y alrededor</text>
  <text x="350" y="130" fill="var(--bad)" font-size="12" text-anchor="middle">un remolino</text>
  <text x="350" y="144" fill="var(--bad)" font-size="12" text-anchor="middle">por cada punta</text>
  <line x1="175" y1="105" x2="168" y2="155" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#k5c-mut)"/>
  <line x1="210" y1="105" x2="210" y2="158" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#k5c-mut)"/>
  <line x1="245" y1="105" x2="252" y2="155" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#k5c-mut)"/>
  <text x="210" y="180" fill="var(--muted)" font-size="12" text-anchor="middle">se hunden 400–500 ft/min por debajo y detrás</text>
  <text x="210" y="215" fill="var(--bad)" font-size="14" text-anchor="middle" font-weight="bold">Peor estela: PESADO · LIMPIO · LENTO</text>
  <text x="210" y="235" fill="var(--muted)" font-size="11" text-anchor="middle">(mucho peso + sin flaps ni tren + gran ángulo de ataque)</text>
</svg>
