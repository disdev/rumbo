<svg viewBox="0 0 480 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tres vistas frontales: ala alta apoyada en montantes, ala media que cruza el fuselaje y ala baja cantilever con diedro">
  <!-- Panel 1: ala alta con montantes -->
  <text x="85" y="26" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">Ala alta</text>
  <ellipse cx="85" cy="108" rx="22" ry="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M73 98 Q85 87 97 98" fill="none" stroke="var(--muted)" stroke-width="1.25"/>
  <path d="M15 76 L85 70 L155 76 L155 83 L85 77 L15 83 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="48" y1="81" x2="75" y2="118" stroke="var(--ok)" stroke-width="2" stroke-linecap="round"/>
  <line x1="122" y1="81" x2="95" y2="118" stroke="var(--ok)" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="158" x2="59" y2="101" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="60" cy="98" r="2.5" fill="var(--ok)"/>
  <text x="12" y="176" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">montante (strut)</text>
  <text x="12" y="192" fill="var(--muted)" font-family="inherit" font-size="12">apoyo externo que ayuda</text>
  <text x="12" y="207" fill="var(--muted)" font-family="inherit" font-size="12">a cargar el peso del ala</text>

  <!-- Panel 2: ala media -->
  <text x="240" y="26" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">Ala media</text>
  <path d="M170 104 L240 100 L310 104 L310 111 L240 107 L170 111 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="240" cy="108" rx="22" ry="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M228 98 Q240 87 252 98" fill="none" stroke="var(--muted)" stroke-width="1.25"/>
  <text x="240" y="176" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">el ala cruza justo por</text>
  <text x="240" y="192" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">la mitad del fuselaje</text>

  <!-- Panel 3: ala baja cantilever -->
  <text x="395" y="26" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">Ala baja</text>
  <path d="M325 124 L395 136 L465 124 L465 131 L395 144 L325 131 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="395" cy="108" rx="22" ry="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M383 98 Q395 87 407 98" fill="none" stroke="var(--muted)" stroke-width="1.25"/>
  <text x="395" y="176" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">cantilever: sin apoyos —</text>
  <text x="395" y="192" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">toda la carga la aguanta</text>
  <text x="395" y="207" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">la estructura interna</text>

  <text x="240" y="234" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Vistas de frente. Un ala = monoplano; dos alas apiladas = biplano.</text>
</svg>
