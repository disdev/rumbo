<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Una caja de 50 libras se mueve 90 pulgadas hacia atrás dentro del fuselaje; el CG del avión de 2,000 libras se corre 2.25 pulgadas hacia atrás">
  <defs>
    <marker id="ch10-peso-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--accent)"/>
    </marker>
    <marker id="ch10-peso-arrow-ok" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--ok)"/>
    </marker>
  </defs>

  <text x="230" y="26" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="600">El total no cambia — el CG sí</text>

  <!-- fuselaje de perfil -->
  <path d="M 60 102 C 62 88 90 79 128 76 C 210 71 285 74 332 81 L 356 46 C 359 40 366 41 365 47 L 352 84 C 375 89 394 95 398 102 C 396 116 372 124 330 128 C 240 135 150 135 116 131 C 84 128 62 116 60 102 Z" fill="var(--panel-2)" fill-opacity="0.55" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 350 97 L 396 92" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- caja original (fantasma) -->
  <rect x="138" y="88" width="44" height="34" rx="4" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="5 4" stroke-linejoin="round"/>
  <text x="160" y="109" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">50 lb</text>

  <!-- caja movida atrás -->
  <rect x="308" y="88" width="44" height="34" rx="4" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <text x="330" y="109" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle" font-weight="600">50 lb</text>

  <!-- flecha de movimiento -->
  <line x1="188" y1="105" x2="300" y2="105" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch10-peso-arrow)"/>
  <text x="244" y="124" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">90 in hacia atrás</text>

  <!-- escala del CG -->
  <line x1="130" y1="196" x2="370" y2="196" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="232" y1="160" x2="232" y2="188" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>

  <circle cx="232" cy="196" r="5" fill="none" stroke="var(--muted)" stroke-width="2"/>
  <text x="200" y="222" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">CG viejo</text>

  <line x1="240" y1="196" x2="250" y2="196" stroke="var(--ok)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch10-peso-arrow-ok)"/>
  <circle cx="262" cy="196" r="6.5" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <path d="M 262 189.5 A 6.5 6.5 0 0 1 268.5 196 L 262 196 Z M 262 202.5 A 6.5 6.5 0 0 1 255.5 196 L 262 196 Z" fill="var(--ok)"/>
  <text x="296" y="222" fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle" font-weight="600">CG nuevo</text>

  <!-- fórmula -->
  <text x="230" y="256" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">peso movido × distancia = peso total × ΔCG</text>
  <text x="230" y="282" fill="var(--accent)" font-family="inherit" font-size="13.5" text-anchor="middle" font-weight="600">50 × 90 = 2,000 × ΔCG  →  ΔCG = 2.25 in atrás</text>
</svg>
