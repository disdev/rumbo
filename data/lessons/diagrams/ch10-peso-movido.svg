<svg viewBox="0 0 480 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mover 50 libras 90 pulgadas hacia atrás en un avión de 2000 libras desplaza el CG 2.25 pulgadas hacia atrás">
  <text x="240" y="24" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle">Peso movido: el total no cambia, el CG sí</text>

  <!-- fuselaje simple -->
  <rect x="60" y="70" width="360" height="56" rx="26" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>

  <!-- caja original (adelante, punteada) -->
  <rect x="120" y="82" width="42" height="32" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="141" y="103" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">50 lb</text>
  <text x="141" y="62" fill="var(--muted)" font-family="inherit" font-size="11" text-anchor="middle">brazo 30</text>

  <!-- caja nueva (atrás, sólida) -->
  <rect x="330" y="82" width="42" height="32" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="351" y="103" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">50 lb</text>
  <text x="351" y="62" fill="var(--muted)" font-family="inherit" font-size="11" text-anchor="middle">brazo 120</text>

  <!-- flecha de movimiento -->
  <line x1="166" y1="98" x2="322" y2="98" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="322,92 334,98 322,104" fill="var(--accent)"/>
  <text x="244" y="90" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">distancia = 90 in</text>

  <!-- CG viejo y nuevo -->
  <circle cx="228" cy="140" r="6" fill="none" stroke="var(--muted)" stroke-width="2"/>
  <text x="205" y="162" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">CG viejo</text>
  <circle cx="262" cy="140" r="6" fill="var(--ok)"/>
  <text x="290" y="162" fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle">CG nuevo</text>
  <line x1="236" y1="140" x2="252" y2="140" stroke="var(--ok)" stroke-width="2"/>
  <polygon points="252,135 260,140 252,145" fill="var(--ok)"/>

  <!-- fórmula -->
  <text x="240" y="196" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle">peso movido × distancia = peso total × cambio de CG</text>
  <text x="240" y="220" fill="var(--accent)" font-family="inherit" font-size="14" text-anchor="middle">50 × 90 = 2,000 × ΔCG  →  ΔCG = 2.25 in hacia atrás</text>
</svg>
