<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Log de navegación simplificado con checkpoints, distancias, tiempos y combustible">
  <text x="14" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Log de navegación (simplificado)</text>

  <!-- encabezado -->
  <rect x="14" y="40" width="452" height="30" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <text x="24" y="60" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">Checkpoint</text>
  <text x="190" y="60" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">Dist</text>
  <text x="255" y="60" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">GS</text>
  <text x="315" y="60" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">Tiempo</text>
  <text x="395" y="60" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">Comb.</text>

  <!-- filas -->
  <g stroke="var(--muted)" stroke-width="1" fill="none">
    <rect x="14" y="70" width="452" height="30"/>
    <rect x="14" y="100" width="452" height="30"/>
    <rect x="14" y="130" width="452" height="30"/>
    <rect x="14" y="160" width="452" height="30"/>
  </g>
  <g fill="var(--text)" font-family="inherit" font-size="13">
    <text x="24" y="90">Salida (aeródromo)</text>
    <text x="24" y="120">Puente sobre el río</text>
    <text x="190" y="120">20 NM</text><text x="250" y="120">100 kt</text><text x="320" y="120">12 min</text><text x="398" y="120">1.6 gal</text>
    <text x="24" y="150">Cruce de carreteras</text>
    <text x="190" y="150">25 NM</text><text x="250" y="150">100 kt</text><text x="320" y="150">15 min</text><text x="398" y="150">2.0 gal</text>
    <text x="24" y="180">Destino</text>
    <text x="190" y="180">15 NM</text><text x="250" y="180">100 kt</text><text x="320" y="180">9 min</text><text x="398" y="180">1.2 gal</text>
  </g>

  <!-- totales -->
  <rect x="14" y="190" width="452" height="30" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2"/>
  <text x="24" y="210" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">TOTAL</text>
  <text x="190" y="210" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">60 NM</text>
  <text x="320" y="210" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">36 min</text>
  <text x="398" y="210" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">4.8 gal</text>

  <text x="14" y="245" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold">+ Reserva VFR de día: 30 min más de combustible (8 gal/h → +4 gal)</text>
  <text x="14" y="266" fill="var(--muted)" font-family="inherit" font-size="12">En vuelo: anota la hora real en cada checkpoint y compárala con la planeada.</text>
</svg>
