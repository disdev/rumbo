<svg viewBox="0 0 464 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cuatro capas de nubes reportadas por altura; solo la capa BKN u OVC más baja define el techo">
  <defs>
    <g id="ch13-nt-puff">
      <path d="M0 0 Q-9 0 -9 -8 Q-9 -15 -1 -16 Q0 -24 10 -24 Q18 -24 21 -18 Q29 -22 34 -15 Q43 -15 43 -7 Q43 0 35 0 Z" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1.25" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- eje de alturas -->
  <line x1="56" y1="36" x2="56" y2="258" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round"/>
  <g stroke="var(--muted)" stroke-width="1.25">
    <line x1="52" y1="52" x2="60" y2="52"/><line x1="52" y1="138" x2="60" y2="138"/><line x1="52" y1="189" x2="60" y2="189"/><line x1="52" y1="232" x2="60" y2="232"/>
  </g>
  <g fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="end">
    <text x="46" y="56">12 000</text>
    <text x="46" y="142">7 000</text>
    <text x="46" y="193">4 000</text>
    <text x="46" y="236">1 500</text>
    <text x="46" y="256">ft AGL</text>
  </g>

  <!-- línea del techo (detrás de las nubes) -->
  <line x1="56" y1="138" x2="352" y2="138" stroke="var(--bad)" stroke-width="1.25" stroke-dasharray="6 4" stroke-linecap="round"/>

  <!-- OVC120: capa continua 8/8 -->
  <path d="M72 52 Q70 40 84 38 Q92 30 112 33 Q130 26 150 32 Q168 25 188 31 Q206 25 224 32 Q242 27 260 33 Q278 28 296 34 Q314 30 330 36 Q348 38 348 46 Q348 52 336 52 Z" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1.25" stroke-linejoin="round"/>

  <!-- BKN070: 5–7/8, casi cerrada — ESTE es el techo -->
  <use href="#ch13-nt-puff" x="82" y="138"/>
  <use href="#ch13-nt-puff" x="138" y="138"/>
  <use href="#ch13-nt-puff" x="194" y="138"/>
  <use href="#ch13-nt-puff" x="250" y="138"/>
  <use href="#ch13-nt-puff" x="306" y="138"/>

  <!-- SCT040: 3–4/8 -->
  <use href="#ch13-nt-puff" x="94" y="189"/>
  <use href="#ch13-nt-puff" x="196" y="189"/>
  <use href="#ch13-nt-puff" x="298" y="189"/>

  <!-- FEW015: 1–2/8 -->
  <g transform="translate(122 232) scale(0.85)"><use href="#ch13-nt-puff"/></g>
  <g transform="translate(262 232) scale(0.85)"><use href="#ch13-nt-puff"/></g>

  <!-- códigos a la derecha -->
  <g font-family="inherit" font-size="12.5">
    <text x="362" y="48" fill="var(--text)" font-weight="bold">OVC120 <tspan font-weight="normal" fill="var(--muted)">8/8</tspan></text>
    <text x="362" y="128" fill="var(--text)" font-weight="bold">BKN070 <tspan font-weight="normal" fill="var(--muted)">5–7/8</tspan></text>
    <text x="362" y="145" fill="var(--bad)" font-size="13" font-weight="bold">← TECHO</text>
    <text x="362" y="185" fill="var(--text)" font-weight="bold">SCT040 <tspan font-weight="normal" fill="var(--muted)">3–4/8</tspan></text>
    <text x="362" y="228" fill="var(--text)" font-weight="bold">FEW015 <tspan font-weight="normal" fill="var(--muted)">1–2/8</tspan></text>
  </g>

  <!-- terreno -->
  <path d="M56 258 H448 V270 Q448 273 445 273 H59 Q56 273 56 270 Z" fill="var(--panel-2)" fill-opacity="0.6"/>
  <line x1="56" y1="258" x2="448" y2="258" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>

  <text x="232" y="298" fill="var(--accent)" font-family="inherit" font-size="13" text-anchor="middle">Techo = la base de la capa BKN u OVC más baja · FEW y SCT no cuentan</text>
</svg>
