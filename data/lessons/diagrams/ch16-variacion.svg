<svg viewBox="0 0 480 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rosa de vientos mostrando la variación entre el norte verdadero y el norte magnético">
  <!-- rosa -->
  <circle cx="200" cy="170" r="95" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <circle cx="200" cy="170" r="4" fill="var(--text)"/>
  <line x1="200" y1="265" x2="200" y2="245" stroke="var(--muted)" stroke-width="1.5"/>
  <line x1="105" y1="170" x2="125" y2="170" stroke="var(--muted)" stroke-width="1.5"/>
  <line x1="295" y1="170" x2="275" y2="170" stroke="var(--muted)" stroke-width="1.5"/>

  <!-- norte verdadero: recto arriba, con estrella -->
  <line x1="200" y1="170" x2="200" y2="60" stroke="var(--text)" stroke-width="2.5"/>
  <path d="M200 42 L205 54 L217 54 L207 61 L211 73 L200 65 L189 73 L193 61 L183 54 L195 54 Z" fill="var(--text)"/>
  <text x="215" y="52" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">Norte verdadero (NV)</text>
  <text x="215" y="67" fill="var(--muted)" font-family="inherit" font-size="12">el de los meridianos del mapa</text>

  <!-- norte magnético: inclinado al oeste (izquierda) -->
  <line x1="200" y1="170" x2="163" y2="66" stroke="var(--accent)" stroke-width="2.5"/>
  <path d="M163 66 L158 82 L172 78 Z" fill="var(--accent)"/>
  <text x="18" y="52" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">Norte magnético (NM)</text>
  <text x="18" y="67" fill="var(--muted)" font-family="inherit" font-size="12">el que ve tu brújula</text>

  <!-- ángulo de variación -->
  <path d="M200 110 A 60 60 0 0 0 180 113" fill="none" stroke="var(--bad)" stroke-width="2"/>
  <text x="150" y="100" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">variación O</text>
  <text x="140" y="115" fill="var(--muted)" font-family="inherit" font-size="12">(isogona: línea</text>
  <text x="140" y="129" fill="var(--muted)" font-family="inherit" font-size="12">magenta punteada)</text>

  <!-- fórmulas -->
  <rect x="318" y="110" width="150" height="120" rx="8" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1"/>
  <text x="330" y="134" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">De verdadero a</text>
  <text x="330" y="150" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">magnético:</text>
  <text x="330" y="176" fill="var(--bad)" font-family="inherit" font-size="13">Oeste → SUMA</text>
  <text x="330" y="196" fill="var(--ok)" font-family="inherit" font-size="13">Este → RESTA</text>
  <text x="330" y="220" fill="var(--muted)" font-family="inherit" font-size="12">RM = RV + var O</text>

  <text x="60" y="295" fill="var(--muted)" font-family="inherit" font-size="12">En Perú hoy: variación pequeña, ~1–3° O según la zona — revisa la isogona de tu carta.</text>
</svg>
