<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" role="img" aria-label="Encendido dual: dos magnetos y dos bujías por cilindro">
  <text x="230" y="22" text-anchor="middle" font-family="inherit" font-size="15" font-weight="bold" fill="var(--text)">Encendido dual: cada cilindro tiene DOS bujías</text>
  <text x="24" y="48" font-family="inherit" font-size="12" font-weight="bold" fill="var(--bad)">No dependen de la batería:</text>
  <text x="24" y="63" font-family="inherit" font-size="11.5" fill="var(--muted)">cada magneto genera su chispa al girar el motor</text>

  <!-- llave de encendido -->
  <circle cx="80" cy="188" r="30" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <g stroke="var(--text)" stroke-width="1.5" stroke-linecap="round">
    <line x1="51.8" y1="177.7" x2="45" y2="175.2"/>
    <line x1="62.8" y1="163.4" x2="58.2" y2="156.9"/>
    <line x1="80" y1="158" x2="80" y2="150"/>
    <line x1="97.2" y1="163.4" x2="101.8" y2="156.9"/>
    <line x1="108.2" y1="177.7" x2="115" y2="175.2"/>
  </g>
  <g font-family="inherit" font-size="9" fill="var(--muted)">
    <text x="40" y="176" text-anchor="end">OFF</text>
    <text x="54" y="151" text-anchor="end">R</text>
    <text x="80" y="142" text-anchor="middle">L</text>
    <text x="106" y="151">BOTH</text>
    <text x="119" y="176">START</text>
  </g>
  <line x1="80" y1="188" x2="95" y2="166" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="80" cy="188" r="3.5" fill="var(--text)"/>
  <text x="80" y="240" text-anchor="middle" font-family="inherit" font-size="12" fill="var(--text)">llave de encendido</text>

  <!-- P-leads (control de la llave a cada magneto) -->
  <g fill="none" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="4 3">
    <path d="M106,172 C128,150 148,120 170,102"/>
    <path d="M106,204 C128,222 148,236 168,244"/>
  </g>

  <!-- magnetos -->
  <g stroke="var(--text)" stroke-width="2">
    <rect x="172" y="76" width="82" height="42" rx="6" fill="var(--panel-2)"/>
    <rect x="172" y="222" width="82" height="42" rx="6" fill="var(--panel-2)"/>
  </g>
  <text x="213" y="101" text-anchor="middle" font-family="inherit" font-size="12" font-weight="bold" fill="var(--text)">mag IZQ</text>
  <text x="213" y="247" text-anchor="middle" font-family="inherit" font-size="12" font-weight="bold" fill="var(--text)">mag DER</text>

  <!-- cables de alta tensión: IZQ → bujías superiores, DER → inferiores -->
  <g fill="none" stroke-width="2" stroke-linecap="round">
    <path d="M254,88 C292,82 312,80 331,80" stroke="var(--ok)"/>
    <path d="M254,106 C300,118 314,160 331,190" stroke="var(--ok)"/>
    <path d="M254,236 C296,232 312,226 331,224" stroke="var(--accent)"/>
    <path d="M254,252 C306,246 322,166 332,118" stroke="var(--accent)"/>
  </g>

  <!-- cilindros con aletas -->
  <g stroke="var(--text)" stroke-width="2">
    <rect x="342" y="58" width="74" height="72" rx="6" fill="var(--panel-2)" fill-opacity="0.5"/>
    <rect x="342" y="168" width="74" height="72" rx="6" fill="var(--panel-2)" fill-opacity="0.5"/>
  </g>
  <path d="M416,70 h9 M416,84 h9 M416,98 h9 M416,112 h9 M416,180 h9 M416,194 h9 M416,208 h9 M416,222 h9" stroke="var(--text)" stroke-width="1.25" opacity="0.55"/>
  <text x="379" y="90" text-anchor="middle" font-family="inherit" font-size="11.5" fill="var(--muted)">cilindro 1</text>
  <text x="379" y="200" text-anchor="middle" font-family="inherit" font-size="11.5" fill="var(--muted)">cilindro 2</text>

  <!-- bujías -->
  <g stroke="var(--text)" stroke-width="1.25">
    <circle cx="338" cy="80" r="5.5" fill="var(--ok)"/>
    <circle cx="338" cy="190" r="5.5" fill="var(--ok)"/>
    <circle cx="338" cy="118" r="5.5" fill="var(--accent)"/>
    <circle cx="338" cy="224" r="5.5" fill="var(--accent)"/>
  </g>

  <!-- leyenda -->
  <g font-family="inherit" font-size="12">
    <line x1="120" y1="290" x2="140" y2="290" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="148" y="294" fill="var(--text)">mag IZQ → bujía superior de cada cilindro</text>
    <line x1="120" y1="308" x2="140" y2="308" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="148" y="312" fill="var(--text)">mag DER → bujía inferior de cada cilindro</text>
  </g>
</svg>
