<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circulación global simplificada del ecuador al polo con tres celdas">
  <!-- suelo -->
  <line x1="30" y1="220" x2="450" y2="220" stroke="var(--text)" stroke-width="2"/>
  <text x="60" y="242" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">Ecuador 0°</text>
  <text x="200" y="242" fill="var(--muted)" font-family="inherit" font-size="13" text-anchor="middle">30°</text>
  <text x="330" y="242" fill="var(--muted)" font-family="inherit" font-size="13" text-anchor="middle">60°</text>
  <text x="430" y="242" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">Polo 90°</text>

  <!-- sol -->
  <circle cx="60" cy="40" r="16" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="76" stroke="var(--accent)" stroke-width="2"/>
  <line x1="44" y1="44" x2="28" y2="48" stroke="var(--accent)" stroke-width="2"/>
  <line x1="76" y1="44" x2="92" y2="48" stroke="var(--accent)" stroke-width="2"/>
  <text x="104" y="36" fill="var(--muted)" font-family="inherit" font-size="12">el sol pega más</text>
  <text x="104" y="52" fill="var(--muted)" font-family="inherit" font-size="12">fuerte en el ecuador</text>

  <!-- celda 1 (Hadley): sube en ecuador, baja en 30 -->
  <path d="M 60 210 L 60 110 Q 60 95 80 95 L 180 95 Q 200 95 200 110 L 200 205" fill="none" stroke="var(--bad)" stroke-width="2.5"/>
  <polygon points="60,105 54,120 66,120" fill="var(--bad)"/>
  <polygon points="200,210 194,196 206,196" fill="var(--accent)"/>
  <text x="70" y="150" fill="var(--bad)" font-family="inherit" font-size="12">sube</text>
  <text x="72" y="164" fill="var(--bad)" font-family="inherit" font-size="12">caliente</text>
  <text x="208" y="150" fill="var(--accent)" font-family="inherit" font-size="12">baja</text>
  <text x="208" y="164" fill="var(--accent)" font-family="inherit" font-size="12">seco (H)</text>

  <!-- celda 2 (Ferrel): sube en 60, baja en 30 -->
  <path d="M 330 205 L 330 125 Q 330 112 315 112 L 225 112 Q 212 112 212 125 L 212 200" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="330,120 324,134 336,134" fill="var(--muted)"/>
  <text x="338" y="160" fill="var(--muted)" font-family="inherit" font-size="12">sube (L)</text>

  <!-- celda 3 (Polar): baja en polo -->
  <path d="M 342 130 L 415 130 Q 430 130 430 145 L 430 205" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="430,210 424,196 436,196" fill="var(--accent)"/>
  <text x="392" y="122" fill="var(--accent)" font-family="inherit" font-size="12">baja frío</text>

  <!-- retorno superficial -->
  <path d="M 190 214 L 80 214" fill="none" stroke="var(--ok)" stroke-width="2"/>
  <polygon points="72,214 86,208 86,220" fill="var(--ok)"/>
  <text x="135" y="208" fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle">viento en superficie</text>

  <text x="240" y="270" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">Calentamiento desigual → el aire circula en celdas → nacen los vientos</text>
</svg>
