<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" role="img" aria-label="Stabilator con tab antiservo, vista de perfil">
  <defs>
    <marker id="ch06-st-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--accent)"/>
    </marker>
  </defs>
  <text x="210" y="22" text-anchor="middle" font-family="inherit" font-size="15" font-weight="bold" fill="var(--text)">Stabilator: toda la cola pivota (vista de perfil)</text>

  <!-- deriva y cono de cola (la nariz queda fuera, a la izquierda) -->
  <g stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="var(--panel-2)">
    <path d="M100,112 C116,66 148,46 182,41 L200,40 C182,62 170,92 166,120 Z" fill-opacity="0.5"/>
    <path d="M16,112 C70,100 120,102 160,116 L160,150 C120,158 70,156 16,144 Z"/>
  </g>
  <text x="30" y="134" font-family="inherit" font-size="12" fill="var(--muted)">cola del avión</text>

  <!-- cuerda neutra de referencia -->
  <line x1="176" y1="140" x2="362" y2="140" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="4 4"/>
  <text x="368" y="144" font-family="inherit" font-size="12" fill="var(--muted)">neutro</text>

  <!-- stabilator completo, rotado sobre su pivote (borde de salida ARRIBA) -->
  <g transform="rotate(-14 240 140)">
    <path d="M176,140 C180,132 202,128 238,128 C282,128 322,133 340,139 C320,145 270,147.5 226,147 C198,146.5 180,145 176,140 Z"
          fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
    <!-- tab antiservo: gira aún más en la MISMA dirección -->
    <g transform="rotate(-24 340 141)">
      <path d="M340,137.5 L374,135.5 L376,141.5 L340,144.5 Z" fill="var(--accent)" stroke="var(--text)" stroke-width="1" stroke-linejoin="round"/>
    </g>
    <circle cx="340" cy="141" r="2" fill="var(--text)"/>
  </g>

  <!-- pivote -->
  <circle cx="240" cy="140" r="5.5" fill="var(--accent)" stroke="var(--text)" stroke-width="1.5"/>

  <!-- flecha: el borde de salida sube -->
  <path d="M346,168 C353,154 354,138 350,126" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch06-st-arrow)"/>

  <!-- etiquetas con líneas guía -->
  <g font-family="inherit">
    <text x="150" y="66" font-size="13" font-weight="bold" fill="var(--accent)">tab antiservo:</text>
    <text x="150" y="82" font-size="12" fill="var(--accent)">se mueve en la MISMA dirección</text>
    <text x="150" y="180" font-size="13" font-weight="bold" fill="var(--text)">pivote central</text>
    <text x="210" y="205" font-size="12" fill="var(--text)">stabilator: UNA sola pieza</text>
  </g>
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="280" y1="76" x2="342" y2="94"/>
    <line x1="228" y1="170" x2="238" y2="148"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="343" cy="94.5" r="2.5"/>
    <circle cx="238.5" cy="147" r="2.5"/>
  </g>

  <text x="210" y="234" text-anchor="middle" font-family="inherit" font-size="11" fill="var(--muted)">El tab resiste el movimiento: da «peso» al mando y evita sobre-controlar</text>
</svg>
