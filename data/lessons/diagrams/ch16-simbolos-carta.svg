<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Simbolos clave de la carta seccional: aeropuertos, combustible, obstaculos, MEF, checkpoint y VOR">
  <text x="16" y="26" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Simbolos de la carta seccional</text>

  <!-- celdas -->
  <g fill="var(--panel-2)" fill-opacity="0.35" stroke="var(--muted)" stroke-width="0.75">
    <rect x="14" y="40" width="148" height="112" rx="8"/>
    <rect x="166" y="40" width="148" height="112" rx="8"/>
    <rect x="318" y="40" width="148" height="112" rx="8"/>
    <rect x="14" y="158" width="148" height="112" rx="8"/>
    <rect x="166" y="158" width="148" height="112" rx="8"/>
    <rect x="318" y="158" width="148" height="112" rx="8"/>
  </g>

  <!-- 1. aeropuerto con torre (azul/accent) -->
  <circle cx="60" cy="80" r="18" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <line x1="60" y1="62" x2="60" y2="98" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
  <text x="88" y="78" fill="var(--accent)" font-family="inherit" font-size="12" font-weight="bold">Azul</text>
  <text x="88" y="93" fill="var(--muted)" font-family="inherit" font-size="10.5">con torre</text>
  <text x="24" y="138" fill="var(--muted)" font-family="inherit" font-size="10.5">aeropuerto controlado</text>

  <!-- 2. aeropuerto sin torre + combustible (magenta/bad) -->
  <circle cx="212" cy="80" r="18" fill="none" stroke="var(--bad)" stroke-width="2"/>
  <line x1="212" y1="62" x2="212" y2="98" stroke="var(--bad)" stroke-width="4" stroke-linecap="round"/>
  <g fill="var(--bad)">
    <rect x="207" y="50" width="10" height="5" rx="1"/>
    <rect x="207" y="105" width="10" height="5" rx="1"/>
    <rect x="189" y="75" width="5" height="10" rx="1"/>
    <rect x="230" y="75" width="5" height="10" rx="1"/>
  </g>
  <text x="240" y="78" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">Magenta</text>
  <text x="240" y="93" fill="var(--muted)" font-family="inherit" font-size="10.5">sin torre</text>
  <text x="176" y="138" fill="var(--muted)" font-family="inherit" font-size="10.5">marcas = hay combustible</text>

  <!-- 3. obstaculo con MSL/(AGL) -->
  <path d="M372 100 C372 100 378 62 380 56 C382 62 388 100 388 100 Z" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="380" y1="56" x2="380" y2="46" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="380" cy="45" r="2.5" fill="var(--text)"/>
  <text x="400" y="70" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">2049</text>
  <text x="400" y="86" fill="var(--muted)" font-family="inherit" font-size="12">(549)</text>
  <text x="328" y="126" fill="var(--text)" font-family="inherit" font-size="10.5">negrita = cima MSL</text>
  <text x="328" y="140" fill="var(--muted)" font-family="inherit" font-size="10.5">(parentesis) = altura AGL</text>

  <!-- 4. MEF -->
  <text x="48" y="222" fill="var(--text)" font-family="inherit" font-size="32" font-weight="bold">3</text>
  <text x="70" y="210" fill="var(--text)" font-family="inherit" font-size="19" font-weight="bold">6</text>
  <text x="24" y="248" fill="var(--text)" font-family="inherit" font-size="11" font-weight="bold">MEF = 3 600 ft MSL</text>
  <text x="24" y="263" fill="var(--muted)" font-family="inherit" font-size="10.5">lo mas alto del cuadrante</text>

  <!-- 5. checkpoint (bandera) -->
  <line x1="204" y1="184" x2="204" y2="232" stroke="var(--bad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M204 184 C216 186 224 192 234 189 C230 197 234 202 234 202 C224 205 214 199 204 202 Z" fill="var(--bad)" stroke="var(--bad)" stroke-width="1" stroke-linejoin="round"/>
  <text x="248" y="204" fill="var(--text)" font-family="inherit" font-size="11" font-weight="bold">checkpoint</text>
  <text x="176" y="250" fill="var(--muted)" font-family="inherit" font-size="10.5">punto visual VFR;</text>
  <text x="176" y="263" fill="var(--muted)" font-family="inherit" font-size="10.5">reportalo al ATC</text>

  <!-- 6. VOR con rosa de rumbos -->
  <circle cx="380" cy="200" r="24" fill="none" stroke="var(--accent)" stroke-width="0.75" stroke-dasharray="3 3"/>
  <path d="M380 186 L392 193 L392 207 L380 214 L368 207 L368 193 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.75" stroke-linejoin="round"/>
  <circle cx="380" cy="200" r="2.5" fill="var(--accent)"/>
  <text x="328" y="250" fill="var(--accent)" font-family="inherit" font-size="11" font-weight="bold">VOR</text>
  <text x="360" y="250" fill="var(--muted)" font-family="inherit" font-size="10.5">con rosa de rumbos</text>

  <text x="16" y="302" fill="var(--muted)" font-family="inherit" font-size="11">Escala 1:500 000 · 1 cm ≈ 5 km reales. Las cartas caducan: usa siempre la vigente.</text>
</svg>
