<svg viewBox="0 0 480 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Símbolos clave de la carta seccional: aeropuertos, obstáculos, MEF, checkpoint y VOR">
  <text x="14" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Símbolos de la carta seccional</text>

  <!-- aeropuerto con torre (azul) -->
  <circle cx="70" cy="80" r="22" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
  <rect x="66" y="62" width="8" height="36" fill="var(--accent)"/>
  <text x="30" y="125" fill="var(--accent)" font-family="inherit" font-size="12">AZUL = con torre</text>
  <text x="30" y="140" fill="var(--muted)" font-family="inherit" font-size="12">(Clases B, C, D, E)</text>

  <!-- aeropuerto sin torre (magenta) -->
  <circle cx="230" cy="80" r="22" fill="none" stroke="var(--bad)" stroke-width="2.5"/>
  <rect x="226" y="62" width="8" height="36" fill="var(--bad)"/>
  <text x="185" y="125" fill="var(--bad)" font-family="inherit" font-size="12">MAGENTA = sin torre</text>
  <!-- marcas de combustible -->
  <rect x="226" y="52" width="8" height="6" fill="var(--bad)"/>
  <rect x="226" y="106" width="8" height="6" fill="var(--bad)"/>
  <rect x="204" y="76" width="6" height="8" fill="var(--bad)"/>
  <rect x="254" y="76" width="6" height="8" fill="var(--bad)"/>
  <text x="185" y="140" fill="var(--muted)" font-family="inherit" font-size="12">marcas = hay combustible</text>

  <!-- obstáculo -->
  <path d="M390 60 L400 95 L380 95 Z" fill="none" stroke="var(--text)" stroke-width="2"/>
  <line x1="390" y1="60" x2="390" y2="48" stroke="var(--text)" stroke-width="2"/>
  <text x="410" y="66" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">2049</text>
  <text x="410" y="82" fill="var(--muted)" font-family="inherit" font-size="12">(549)</text>
  <text x="345" y="125" fill="var(--text)" font-family="inherit" font-size="12">negrita = cima MSL</text>
  <text x="345" y="140" fill="var(--muted)" font-family="inherit" font-size="12">(paréntesis) = altura AGL</text>

  <!-- MEF -->
  <text x="55" y="215" fill="var(--text)" font-family="inherit" font-size="34" font-weight="bold">3</text>
  <text x="78" y="203" fill="var(--text)" font-family="inherit" font-size="20" font-weight="bold">6</text>
  <text x="30" y="245" fill="var(--text)" font-family="inherit" font-size="12">MEF = 3 600 ft MSL</text>
  <text x="30" y="260" fill="var(--muted)" font-family="inherit" font-size="12">lo más alto del cuadrante</text>
  <text x="30" y="275" fill="var(--muted)" font-family="inherit" font-size="12">(terreno + obstáculos)</text>

  <!-- checkpoint bandera -->
  <line x1="230" y1="180" x2="230" y2="225" stroke="var(--bad)" stroke-width="2.5"/>
  <path d="M230 180 L258 189 L230 198 Z" fill="var(--bad)"/>
  <text x="192" y="245" fill="var(--text)" font-family="inherit" font-size="12">bandera = checkpoint</text>
  <text x="192" y="260" fill="var(--muted)" font-family="inherit" font-size="12">visual VFR (repórtalo</text>
  <text x="192" y="275" fill="var(--muted)" font-family="inherit" font-size="12">por radio al ATC)</text>

  <!-- VOR -->
  <path d="M390 185 L403 192 L403 208 L390 215 L377 208 L377 192 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2.5"/>
  <circle cx="390" cy="200" r="3" fill="var(--accent)"/>
  <rect x="352" y="162" width="76" height="76" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="350" y="258" fill="var(--accent)" font-family="inherit" font-size="12">VOR con rosa de</text>
  <text x="350" y="273" fill="var(--muted)" font-family="inherit" font-size="12">rumbos magnéticos</text>

  <text x="14" y="312" fill="var(--muted)" font-family="inherit" font-size="12">Escala 1:500 000 — 1 cm en la carta ≈ 5 km reales · las cartas caducan: usa la vigente</text>
</svg>
