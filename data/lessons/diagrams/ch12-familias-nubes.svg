<svg viewBox="0 0 480 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Las cuatro familias de nubes por rango de altura: bajas, medias, altas y de desarrollo vertical, con el cumulonimbus atravesando todas">
  <!-- bandas de altura (profundidad sutil) -->
  <rect x="66" y="40" width="392" height="78" fill="var(--panel-2)" fill-opacity="0.10"/>
  <rect x="66" y="118" width="392" height="98" fill="var(--panel-2)" fill-opacity="0.20"/>
  <rect x="66" y="216" width="392" height="72" fill="var(--panel-2)" fill-opacity="0.32"/>

  <!-- eje de alturas -->
  <line x1="66" y1="40" x2="66" y2="288" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="62" y1="118" x2="70" y2="118" stroke="var(--muted)" stroke-width="1.25"/>
  <line x1="62" y1="216" x2="70" y2="216" stroke="var(--muted)" stroke-width="1.25"/>
  <g fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="end">
    <text x="58" y="122">20,000 ft</text>
    <text x="58" y="220">6,500 ft</text>
    <text x="58" y="292">0 ft</text>
  </g>
  <line x1="70" y1="118" x2="340" y2="118" stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 5" opacity="0.6"/>
  <line x1="70" y1="216" x2="340" y2="216" stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 5" opacity="0.6"/>
  <path d="M66 288 H458 V300 Q458 303 455 303 H69 Q66 303 66 300 Z" fill="var(--panel-2)" fill-opacity="0.6"/>
  <line x1="66" y1="288" x2="458" y2="288" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>

  <!-- ALTAS: cirrus, hebras de hielo -->
  <g fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round">
    <path d="M104 84 C 116 72 134 72 146 79 C 160 86 176 85 188 77"/>
    <path d="M150 62 C 162 51 180 51 192 58 C 205 65 219 64 230 57"/>
    <path d="M212 92 C 222 83 236 83 246 89"/>
  </g>
  <text x="96" y="56" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">ALTAS</text>
  <text x="146" y="56" fill="var(--muted)" font-family="inherit" font-size="12">· cirro- (cristales de hielo)</text>

  <!-- MEDIAS: altocumulus, motas suaves -->
  <g fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.25" stroke-linejoin="round">
    <path d="M108 176 Q104 166 114 164 Q116 155 128 156 Q136 150 144 157 Q154 156 155 165 Q162 170 154 176 Z"/>
    <path d="M168 176 Q164 166 174 164 Q176 155 188 156 Q196 150 204 157 Q214 156 215 165 Q222 170 214 176 Z"/>
    <path d="M228 176 Q224 166 234 164 Q236 155 248 156 Q256 150 264 157 Q274 156 275 165 Q282 170 274 176 Z"/>
  </g>
  <text x="96" y="140" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">MEDIAS</text>
  <text x="152" y="140" fill="var(--muted)" font-family="inherit" font-size="12">· alto-</text>

  <!-- BAJAS: stratus en capas -->
  <path d="M96 262 Q94 251 108 249 Q116 242 138 244 Q166 238 192 244 Q216 240 232 248 Q248 250 246 259 Q246 267 232 268 L110 268 Q96 268 96 262 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.25" stroke-linejoin="round"/>
  <path d="M118 280 Q116 274 126 273 Q138 268 162 271 Q190 267 208 272 Q222 271 224 277 Q225 282 216 283 L126 283 Q118 283 118 280 Z" fill="var(--panel-2)" fill-opacity="0.55" stroke="var(--accent)" stroke-width="1" stroke-linejoin="round"/>
  <text x="96" y="238" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">BAJAS</text>
  <text x="142" y="238" fill="var(--muted)" font-family="inherit" font-size="12">· stratus, techos bajos</text>

  <!-- DESARROLLO VERTICAL: cumulonimbus que cruza las tres bandas -->
  <path d="M374 256 C 366 242 370 230 362 220 C 350 212 352 196 362 190 C 350 182 352 164 366 160 C 358 146 366 132 378 130 L 378 122 C 364 122 352 116 350 104 C 348 90 362 80 378 82 C 382 66 400 58 414 66 C 422 60 436 62 440 72 C 454 70 466 80 466 92 C 466 104 454 112 440 112 L 422 112 C 426 124 422 132 412 134 C 422 146 418 162 406 166 C 416 176 414 194 404 200 C 412 214 408 232 411 244 C 412 250 410 254 406 256 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2" stroke-linejoin="round"/>
  <!-- chubasco bajo el Cb -->
  <g stroke="var(--accent)" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="5 4">
    <line x1="382" y1="262" x2="378" y2="282"/>
    <line x1="394" y1="262" x2="390" y2="282"/>
    <line x1="406" y1="262" x2="402" y2="282"/>
  </g>
  <line x1="452" y1="84" x2="466" y2="60" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="452" cy="84" r="2.5" fill="var(--muted)"/>
  <text x="468" y="52" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="end">yunque</text>
  <text x="404" y="182" fill="var(--bad)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">Cb</text>
  <text x="404" y="312" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">DESARROLLO</text>
  <text x="404" y="326" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">VERTICAL</text>

  <text x="185" y="320" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">4 familias por RANGO DE ALTURA · nimbus = lluvia</text>
</svg>
