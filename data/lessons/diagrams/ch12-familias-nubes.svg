<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Las cuatro familias de nubes por rango de altura, con el cumulonimbus atravesando todas">
  <!-- eje vertical -->
  <line x1="70" y1="30" x2="70" y2="280" stroke="var(--text)" stroke-width="2"/>
  <line x1="70" y1="280" x2="460" y2="280" stroke="var(--text)" stroke-width="2"/>
  <!-- líneas de altura -->
  <line x1="70" y1="200" x2="340" y2="200" stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="70" y1="110" x2="340" y2="110" stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="62" y="284" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="end">0 ft</text>
  <text x="62" y="204" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="end">6,500</text>
  <text x="62" y="114" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="end">20,000</text>

  <!-- familia baja: stratus -->
  <rect x="95" y="235" width="130" height="14" rx="7" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.5"/>
  <rect x="110" y="255" width="100" height="12" rx="6" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="160" y="228" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">BAJAS: stratus</text>

  <!-- familia media: alto- -->
  <ellipse cx="125" cy="160" rx="26" ry="11" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.5"/>
  <ellipse cx="180" cy="160" rx="26" ry="11" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="160" y="140" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">MEDIAS: alto-</text>

  <!-- familia alta: cirro- -->
  <path d="M 100 80 q 15 -10 30 0 q 15 8 30 -2" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <path d="M 150 62 q 15 -10 30 0 q 15 8 30 -2" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <text x="160" y="46" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">ALTAS: cirro- (hielo)</text>

  <!-- desarrollo vertical: cumulonimbus -->
  <path d="M 380 278 Q 360 240 372 190 Q 360 150 380 110 L 380 78 L 350 78 L 350 66 L 452 66 L 452 78 L 420 78 L 420 110 Q 438 150 428 190 Q 440 240 420 278 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2"/>
  <text x="400" y="56" fill="var(--bad)" font-family="inherit" font-size="12" text-anchor="middle">yunque</text>
  <text x="400" y="170" fill="var(--bad)" font-family="inherit" font-size="13" text-anchor="middle">Cb</text>
  <text x="400" y="300" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">DESARROLLO</text>
  <text x="400" y="314" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">VERTICAL</text>

  <text x="200" y="304" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">4 familias por RANGO DE ALTURA · nimbus = lluvia</text>
</svg>
