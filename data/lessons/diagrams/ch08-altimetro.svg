<svg viewBox="0 0 510 290" xmlns="http://www.w3.org/2000/svg" font-family="inherit">
  <circle cx="140" cy="145" r="115" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>

  <!-- marcas -->
  <g stroke="var(--text)" stroke-width="2">
    <line x1="140" y1="45" x2="140" y2="35"/>
    <line x1="198.8" y1="64.1" x2="204.7" y2="56.0"/>
    <line x1="235.1" y1="114.1" x2="244.6" y2="111.0"/>
    <line x1="235.1" y1="175.9" x2="244.6" y2="179.0"/>
    <line x1="198.8" y1="225.9" x2="204.7" y2="234.0"/>
    <line x1="140" y1="245" x2="140" y2="255"/>
    <line x1="81.2" y1="225.9" x2="75.3" y2="234.0"/>
    <line x1="44.9" y1="175.9" x2="35.4" y2="179.0"/>
    <line x1="44.9" y1="114.1" x2="35.4" y2="111.0"/>
    <line x1="81.2" y1="64.1" x2="75.3" y2="56.0"/>
  </g>

  <!-- números -->
  <g fill="var(--text)" font-size="15" text-anchor="middle">
    <text x="140" y="62">0</text>
    <text x="191.7" y="78.8">1</text>
    <text x="223.7" y="122.8">2</text>
    <text x="223.7" y="177.2">3</text>
    <text x="191.7" y="221.2">4</text>
    <text x="140" y="238">5</text>
    <text x="88.3" y="221.2">6</text>
    <text x="56.3" y="177.2">7</text>
    <text x="56.3" y="122.8">8</text>
    <text x="88.3" y="78.8">9</text>
  </g>

  <!-- ventanita de Kollsman -->
  <rect x="152" y="134" width="46" height="22" rx="3" fill="none" stroke="var(--muted)"/>
  <text x="175" y="150" font-size="13" fill="var(--accent)" text-anchor="middle">29.92</text>

  <!-- aguja fina: decenas de miles (0.45) -->
  <line x1="140" y1="145" x2="165.7" y2="56.7" stroke="var(--muted)" stroke-width="2"/>
  <polygon points="165.7,56.7 158.7,64.5 170.3,67.9" fill="var(--muted)"/>
  <!-- aguja corta y gruesa: miles (4.5) -->
  <line x1="140" y1="145" x2="156.1" y2="194.4" stroke="var(--text)" stroke-width="8" stroke-linecap="round"/>
  <!-- aguja larga: centenas (5) -->
  <line x1="140" y1="145" x2="140" y2="230" stroke="var(--text)" stroke-width="3.5"/>
  <circle cx="140" cy="145" r="6" fill="var(--text)"/>

  <!-- leyenda -->
  <text x="272" y="58" font-size="15" font-weight="bold" fill="var(--text)">Lectura: 4,500 ft</text>
  <text x="272" y="94" font-size="12" fill="var(--text)">aguja larga → centenas (500)</text>
  <text x="272" y="120" font-size="12" fill="var(--text)">aguja corta y gruesa → miles (4,000)</text>
  <text x="272" y="146" font-size="12" fill="var(--text)">aguja fina con triángulo →</text>
  <text x="286" y="164" font-size="12" fill="var(--text)">decenas de miles (0)</text>
  <text x="272" y="196" font-size="12" fill="var(--accent)">ventanita de Kollsman: aquí pones</text>
  <text x="286" y="214" font-size="12" fill="var(--accent)">el ajuste de altímetro (29.92)</text>
  <text x="272" y="248" font-size="12" fill="var(--muted)">Lee de la más lenta a la más rápida:</text>
  <text x="286" y="266" font-size="12" fill="var(--muted)">decenas de miles → miles → centenas</text>
</svg>
