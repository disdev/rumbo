<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" font-family="inherit">
  <circle cx="180" cy="160" r="130" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="180" y="120" font-size="13" fill="var(--muted)" text-anchor="middle">nudos</text>

  <!-- arco blanco: Vso→Vfe (40→85) -->
  <path d="M273.6 143.5 A95 95 0 0 1 196.5 253.6" fill="none" stroke="var(--text)" stroke-width="8"/>
  <!-- arco verde: Vs1→Vno (50→130) -->
  <path d="M285.4 178.6 A107 107 0 0 1 74.6 178.6" fill="none" stroke="var(--ok)" stroke-width="8"/>
  <!-- arco amarillo: Vno→Vne (130→160) -->
  <path d="M74.6 178.6 A107 107 0 0 1 111.2 78.0" fill="none" stroke="var(--accent)" stroke-width="8"/>
  <!-- línea roja: Vne -->
  <line x1="118.9" y1="87.2" x2="103.5" y2="68.8" stroke="var(--bad)" stroke-width="6"/>

  <!-- aguja -->
  <line x1="180" y1="160" x2="256" y2="230" stroke="var(--text)" stroke-width="4"/>
  <circle cx="180" cy="160" r="7" fill="var(--text)"/>

  <!-- etiquetas V -->
  <g font-size="13" fill="var(--text)">
    <text x="306" y="140">Vso 40</text>
    <text x="308" y="188">Vs1 50</text>
    <text x="202" y="300" text-anchor="middle">Vfe 85</text>
    <text x="58" y="186" text-anchor="end">Vno 130</text>
    <text x="96" y="52" text-anchor="middle">Vne 160</text>
  </g>

  <!-- leyenda -->
  <rect x="330" y="216" width="12" height="12" fill="var(--text)"/>
  <text x="350" y="226" font-size="12" fill="var(--text)">Blanco: rango de flaps</text>
  <text x="350" y="242" font-size="12" fill="var(--muted)">(Vso → Vfe)</text>
  <rect x="330" y="254" width="12" height="12" fill="var(--ok)"/>
  <text x="350" y="264" font-size="12" fill="var(--text)">Verde: operación normal</text>
  <text x="350" y="280" font-size="12" fill="var(--muted)">(Vs1 → Vno)</text>
  <rect x="330" y="292" width="12" height="12" fill="var(--accent)"/>
  <text x="350" y="302" font-size="12" fill="var(--text)">Amarillo: precaución —</text>
  <text x="350" y="318" font-size="12" fill="var(--muted)">solo aire calmado (hasta Vne)</text>
  <rect x="330" y="30" width="12" height="12" fill="var(--bad)"/>
  <text x="350" y="40" font-size="12" fill="var(--text)">Línea roja: Vne,</text>
  <text x="350" y="56" font-size="12" fill="var(--muted)">nunca exceder</text>
  <text x="330" y="92" font-size="12" font-weight="bold" fill="var(--bad)">Va NO está marcada:</text>
  <text x="330" y="110" font-size="12" fill="var(--text)">cambia con el peso.</text>
  <text x="330" y="128" font-size="12" fill="var(--text)">Búscala en el manual (POH).</text>
</svg>
