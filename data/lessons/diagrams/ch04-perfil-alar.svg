<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="inherit" role="img" aria-label="Perfil alar con sus partes: borde de ataque, borde de salida, extradós, intradós, cuerda recta y combadura curva">
  <!-- perfil alar combado -->
  <path d="M70 172 C 70 156 86 134 124 122 C 172 108 244 106 302 120 C 344 130 378 145 400 158
           C 362 168 300 178 240 180 C 178 182 118 184 88 179 C 76 177 70 176 70 172 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- cuerda: recta de borde de ataque a borde de salida -->
  <line x1="70" y1="172" x2="400" y2="158" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="7 5" stroke-linecap="round"/>
  <circle cx="70" cy="172" r="3" fill="var(--accent)"/>
  <circle cx="400" cy="158" r="3" fill="var(--accent)"/>

  <!-- línea de combadura media -->
  <path d="M70 172 C 140 146 260 138 400 158" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 4" stroke-linecap="round"/>

  <!-- etiquetas con líneas guía -->
  <g stroke="var(--muted)" stroke-width="1" stroke-linecap="round">
    <line x1="120" y1="52" x2="164" y2="144"/>
    <line x1="330" y1="52" x2="282" y2="110"/>
    <line x1="62" y1="240" x2="71" y2="180"/>
    <line x1="182" y1="248" x2="228" y2="169"/>
    <line x1="285" y1="232" x2="285" y2="182"/>
    <line x1="400" y1="220" x2="400" y2="164"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="165" cy="147" r="2.5"/>
    <circle cx="281" cy="112" r="2.5"/>
    <circle cx="71" cy="177" r="2.5"/>
    <circle cx="229" cy="167" r="2.5"/>
    <circle cx="285" cy="179" r="2.5"/>
    <circle cx="400" cy="162" r="2.5"/>
  </g>

  <text x="28" y="44" font-size="13" fill="var(--muted)">combadura media (curva)</text>
  <text x="332" y="42" font-size="13" fill="var(--text)" text-anchor="middle">extradós (arriba)</text>
  <text x="26" y="258" font-size="13" fill="var(--text)">borde de ataque</text>
  <text x="176" y="266" font-size="13" fill="var(--accent)" text-anchor="middle">cuerda (recta)</text>
  <text x="290" y="250" font-size="13" fill="var(--text)" text-anchor="middle">intradós (abajo)</text>
  <text x="402" y="238" font-size="13" fill="var(--text)" text-anchor="middle">borde de salida</text>
</svg>
