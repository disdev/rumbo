<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pirámide de avisos meteorológicos: AIRMET en la base, SIGMET al medio y SIGMET convectivo en la punta">
  <defs>
    <marker id="ch13-pir-arrow" viewBox="0 0 10 10" refX="6.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M1.5 1.5 7 5 1.5 8.5" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <!-- rayo en la punta -->
  <path d="M222 6 l -9 15 h 6 l -6 14 l 13 -17 h -6 l 8 -12 Z" fill="var(--warn)"/>

  <!-- flecha de severidad -->
  <line x1="44" y1="250" x2="44" y2="62" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch13-pir-arrow)"/>
  <text x="32" y="156" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle" transform="rotate(-90 32 156)">+ severidad</text>

  <!-- punta: SIGMET CONVECTIVO -->
  <path d="M216 46 Q220 40 224 46 L 269 112 L 171 112 Z" fill="var(--bad)" fill-opacity="0.30" stroke="var(--bad)" stroke-width="2" stroke-linejoin="round"/>
  <text x="220" y="90" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">SIGMET</text>
  <text x="220" y="105" fill="var(--bad)" font-family="inherit" font-size="11.5" font-weight="bold" text-anchor="middle">CONVECTIVO</text>
  <line x1="254" y1="82" x2="296" y2="60" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="254" cy="82" r="2.5" fill="var(--muted)"/>
  <g fill="var(--muted)" font-family="inherit" font-size="11.5">
    <text x="300" y="44">solo tormentas graves:</text>
    <text x="300" y="58">tornados · Cb embebidos</text>
    <text x="300" y="72">granizo ≥ ¾ pulg</text>
  </g>

  <!-- medio: SIGMET -->
  <path d="M166 118 H 274 L 321 184 H 119 Z" fill="var(--warn)" fill-opacity="0.28" stroke="var(--warn)" stroke-width="2" stroke-linejoin="round"/>
  <text x="220" y="148" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">SIGMET</text>
  <text x="220" y="166" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">severo</text>
  <line x1="298" y1="148" x2="330" y2="148" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="298" cy="148" r="2.5" fill="var(--muted)"/>
  <g fill="var(--muted)" font-family="inherit" font-size="11.5">
    <text x="336" y="138">TODAS las aeronaves</text>
    <text x="336" y="152">turb. e hielo severos</text>
    <text x="336" y="166">ceniza volcánica</text>
  </g>

  <!-- base: AIRMET -->
  <path d="M114 190 H 326 L 375 258 H 65 Z" fill="var(--ok)" fill-opacity="0.26" stroke="var(--ok)" stroke-width="2" stroke-linejoin="round"/>
  <text x="220" y="216" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold" text-anchor="middle">AIRMET</text>
  <text x="220" y="233" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">intensidad moderada · para todos los pilotos</text>
  <text x="220" y="249" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">Sierra IFR · Tango turbulencia · Zulu hielo</text>

  <text x="240" y="288" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">El SIGMET convectivo IMPLICA turbulencia severa, hielo severo y cizalladura</text>
</svg>
