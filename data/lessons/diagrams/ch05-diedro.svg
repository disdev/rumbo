<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 230" font-family="inherit" role="img" aria-label="El diedro: alas en V abierta; al ladearse, el ala baja genera más sustentación y endereza el avión">
  <defs>
    <marker id="ch05-diedro-arrow-ok" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--ok)"/></marker>
    <marker id="ch05-diedro-arrow-a" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/></marker>
    <g id="ch05-diedro-avion" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="var(--panel-2)">
      <path d="M -3.5 -10 C -3.5 -20 -2 -27 0 -32 C 2 -27 3.5 -20 3.5 -10 Z"/>
      <path d="M -26 -8 C -12 -9.5 12 -9.5 26 -8 L 23 -4.5 C 10 -6 -10 -6 -23 -4.5 Z"/>
      <path d="M -9 -3 L -80 -21 C -85 -22.2 -87.5 -18.5 -83.5 -16.5 L -9 4 Z"/>
      <path d="M 9 -3 L 80 -21 C 85 -22.2 87.5 -18.5 83.5 -16.5 L 9 4 Z"/>
      <circle cx="0" cy="0" r="11"/>
      <circle cx="0" cy="0" r="3" fill="var(--muted)" fill-opacity="0.6" stroke="none"/>
    </g>
  </defs>

  <line x1="218" y1="44" x2="218" y2="204" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 6" stroke-opacity="0.6"/>

  <!-- 1: el diedro en reposo -->
  <text x="112" y="24" font-size="13" fill="var(--text)" text-anchor="middle">1. alas en «V» abierta</text>
  <use href="#ch05-diedro-avion" x="0" y="0" transform="translate(112 128)"/>
  <line x1="28" y1="129" x2="103" y2="129" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M 53 129 A 50 50 0 0 1 54.4 116.4" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="56" y="152" font-size="12" fill="var(--accent)" text-anchor="middle">ángulo diedro</text>

  <!-- 2: al ladearse, el ala baja sustenta más -->
  <text x="322" y="24" font-size="13" fill="var(--text)" text-anchor="middle">2. al ladearse, se endereza solo</text>
  <use href="#ch05-diedro-avion" x="0" y="0" transform="translate(322 126) rotate(14)"/>
  <line x1="406" y1="118" x2="406" y2="80" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch05-diedro-arrow-ok)"/>
  <text x="414" y="56" font-size="12" fill="var(--ok)" text-anchor="end" font-weight="bold">ala baja:</text>
  <text x="414" y="70" font-size="12" fill="var(--ok)" text-anchor="end" font-weight="bold">más sustentación</text>
  <line x1="247" y1="80" x2="247" y2="54" stroke="var(--ok)" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch05-diedro-arrow-ok)"/>
  <text x="244" y="42" font-size="12" fill="var(--muted)" text-anchor="middle">ala alta: menos</text>
  <path d="M 289 159 A 47 47 0 0 0 355 159" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch05-diedro-arrow-a)"/>
  <text x="322" y="196" font-size="12" fill="var(--accent)" text-anchor="middle">la diferencia de sustentación</text>
  <text x="322" y="211" font-size="12" fill="var(--accent)" text-anchor="middle">rueda el avión de vuelta a nivelado</text>
</svg>
