<svg viewBox="0 0 480 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avión de entrenamiento de ala alta visto de lado, con líneas guía hacia sus cinco componentes mayores: planta motriz, alas, empenaje, fuselaje y tren de aterrizaje">
  <!-- suelo -->
  <rect x="0" y="252" width="480" height="40" fill="var(--panel-2)" fill-opacity="0.35"/>
  <line x1="0" y1="252" x2="480" y2="252" stroke="var(--muted)" stroke-width="1.25"/>

  <!-- disco de la hélice -->
  <ellipse cx="64" cy="175" rx="5" ry="42" fill="none" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="4 4"/>
  <path d="M64 137 C58 156 58 194 64 213" fill="none" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/>

  <!-- fuselaje -->
  <path d="M74 163 C90 156 108 152 128 150 L146 148 C155 130 167 119 183 115 L254 113 C298 116 338 130 372 146 C380 149 386 152 390 155 L390 166 C356 176 318 184 276 187 L160 191 C132 192 102 190 84 184 C76 181 72 172 74 163 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <!-- cono de la hélice -->
  <path d="M56 175 C58 168 64 164 74 163 L74 187 C64 186 58 182 56 175 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>

  <!-- empenaje: deriva, timón y estabilizador -->
  <path d="M346 141 C354 114 362 94 373 82 L389 80 C388 104 385 126 381 146 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M389 80 C398 82 404 88 405 96 L397 152 L381 146 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M350 156 L436 152 C440 152 440 157 436 158 L352 165 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>

  <!-- ala alta con montante -->
  <path d="M160 110 C166 102 176 98 190 98 L296 100 C303 100 307 104 306 108 C305 111 301 113 296 113 L172 114 C164 114 159 113 160 110 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="172" y1="187" x2="205" y2="114" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>

  <!-- vidrios -->
  <path d="M150 146 C158 131 168 121 182 117 L192 116 L192 128 C176 131 162 138 154 146 Z" fill="var(--muted)" fill-opacity="0.35"/>
  <path d="M200 118 L232 117 L230 136 L202 137 Z" fill="var(--muted)" fill-opacity="0.25"/>

  <!-- tren de aterrizaje triciclo -->
  <line x1="110" y1="190" x2="113" y2="236" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="114" cy="243" r="9" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="114" cy="243" r="2.5" fill="var(--text)"/>
  <path d="M204 189 C214 200 222 212 227 228" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="229" cy="241" r="11" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="229" cy="241" r="3" fill="var(--text)"/>

  <!-- líneas guía y etiquetas -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="60" y1="104" x2="88" y2="150"/>
    <line x1="250" y1="52" x2="240" y2="96"/>
    <line x1="405" y1="62" x2="385" y2="84"/>
    <line x1="326" y1="216" x2="298" y2="188"/>
    <line x1="172" y1="276" x2="214" y2="248"/>
  </g>
  <circle cx="90" cy="153" r="2.5" fill="var(--text)"/>
  <circle cx="239" cy="99" r="2.5" fill="var(--text)"/>
  <circle cx="383" cy="86" r="2.5" fill="var(--text)"/>
  <circle cx="296" cy="186" r="2.5" fill="var(--text)"/>
  <circle cx="217" cy="246" r="2.5" fill="var(--text)"/>

  <g font-family="inherit">
    <text x="14" y="82" fill="var(--text)" font-size="13" font-weight="bold">Planta motriz</text>
    <text x="14" y="98" fill="var(--muted)" font-size="12">(motor y hélice)</text>
    <text x="250" y="44" fill="var(--text)" font-size="13" font-weight="bold" text-anchor="middle">Alas</text>
    <text x="408" y="40" fill="var(--text)" font-size="13" font-weight="bold" text-anchor="middle">Empenaje</text>
    <text x="408" y="56" fill="var(--muted)" font-size="12" text-anchor="middle">(la cola)</text>
    <text x="330" y="224" fill="var(--text)" font-size="13" font-weight="bold">Fuselaje</text>
    <text x="330" y="240" fill="var(--muted)" font-size="12">(el cuerpo central)</text>
    <text x="40" y="281" fill="var(--text)" font-size="13" font-weight="bold">Tren de aterrizaje</text>
  </g>
</svg>
