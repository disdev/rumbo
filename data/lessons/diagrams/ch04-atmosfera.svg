<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="inherit" role="img" aria-label="La atmósfera: al subir bajan la presión, la temperatura y la densidad del aire">
  <defs>
    <marker id="ch04-atmos-arrow" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <!-- capas de aire: más densas (oscuras) abajo -->
  <rect x="150" y="198" width="254" height="54" fill="var(--panel-2)" fill-opacity="0.45"/>
  <rect x="150" y="136" width="254" height="62" fill="var(--panel-2)" fill-opacity="0.26"/>
  <rect x="150" y="74" width="254" height="62" fill="var(--panel-2)" fill-opacity="0.12"/>

  <!-- moléculas de aire: densidad decrece con la altura -->
  <g fill="var(--muted)" fill-opacity="0.65">
    <circle cx="170" cy="210" r="2"/><circle cx="196" cy="238" r="2"/><circle cx="222" cy="214" r="2"/>
    <circle cx="205" cy="226" r="2"/><circle cx="246" cy="232" r="2"/><circle cx="182" cy="228" r="2"/>
    <circle cx="238" cy="206" r="2"/><circle cx="162" cy="244" r="2"/><circle cx="228" cy="244" r="2"/>
    <circle cx="188" cy="208" r="2"/><circle cx="214" cy="240" r="2"/><circle cx="254" cy="214" r="2"/>
    <circle cx="176" cy="150" r="2"/><circle cx="214" cy="168" r="2"/><circle cx="252" cy="146" r="2"/>
    <circle cx="192" cy="184" r="2"/><circle cx="236" cy="182" r="2"/><circle cx="270" cy="166" r="2"/>
    <circle cx="298" cy="186" r="2"/>
    <circle cx="190" cy="92" r="2"/><circle cx="248" cy="112" r="2"/><circle cx="312" cy="88" r="2"/>
  </g>

  <!-- montaña y mar -->
  <path d="M244 252 C 264 214 277 186 288 168 C 299 186 315 214 350 252 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.25" stroke-linejoin="round"/>
  <path d="M281 182 C 283 177 286 172 288 169 C 290 172 293 178 296 183 C 293 187 290 184 288 188 C 286 184 284 186 281 182 Z"
        fill="var(--text)" fill-opacity="0.3"/>
  <line x1="150" y1="252" x2="404" y2="252" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <path d="M158 252 q 11 -8 22 0 q 11 -8 22 0 q 11 -8 22 0" fill="none" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round"/>

  <!-- líneas de altitud -->
  <g stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 5">
    <line x1="150" y1="190" x2="404" y2="190"/>
    <line x1="150" y1="128" x2="404" y2="128"/>
    <line x1="150" y1="66" x2="404" y2="66"/>
  </g>
  <g font-size="12" fill="var(--muted)" text-anchor="end">
    <text x="398" y="60">30,000 ft · −45 °C</text>
    <text x="398" y="122">20,000 ft · −25 °C</text>
    <text x="398" y="184">10,000 ft · −5 °C</text>
  </g>

  <!-- avioncito subiendo -->
  <g transform="translate(196 126) rotate(-16)" stroke="var(--text)" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round" fill="var(--panel-2)">
    <path d="M0 0 C 3 -3 12 -5 22 -4.5 L 37 -3.5 C 41 -3.2 43 -1.8 43 -0.5 C 43 0.8 41 1.6 37 1.8 L 20 3 C 10 3.6 3 2.6 0 0 Z"/>
    <path d="M17 -4 C 20 -9 23 -12 26 -13.5 L 29 -13 C 28 -9 27 -6.5 26 -4 Z"/>
    <path d="M3 -1.5 C 1 -5.5 -0.5 -9 -1 -11.5 L 2 -12 C 4 -9 6 -5.5 8 -2.5 Z"/>
  </g>

  <!-- flecha de ascenso y consecuencias -->
  <line x1="46" y1="246" x2="46" y2="72" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch04-atmos-arrow)"/>
  <text x="64" y="104" font-size="13" fill="var(--accent)" font-weight="bold">al subir:</text>
  <g font-size="13" fill="var(--accent)">
    <text x="64" y="126">presión ↓</text>
    <text x="64" y="146">temperatura ↓</text>
    <text x="64" y="166">densidad ↓</text>
  </g>
  <text x="64" y="190" font-size="11" fill="var(--muted)">~2 °C menos por</text>
  <text x="64" y="204" font-size="11" fill="var(--muted)">cada 1,000 ft</text>

  <!-- estándar al nivel del mar -->
  <text x="210" y="284" font-size="13" fill="var(--text)" text-anchor="middle">nivel del mar: 15 °C · 29.92 inHg · 1013.2 hPa</text>
</svg>
