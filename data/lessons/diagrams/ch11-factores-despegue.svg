<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de barras: peso, altitud de densidad, pendiente arriba y pista blanda alargan la carrera de despegue; solo el viento de frente la acorta">
  <defs>
    <marker id="ch11-despegue-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--text)"/>
    </marker>
  </defs>

  <text x="230" y="24" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="600">¿Cuánta pista te pide cada factor?</text>

  <!-- referencia: día estándar -->
  <line x1="280" y1="46" x2="280" y2="232" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="5 4"/>
  <text x="280" y="40" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">carrera estándar</text>

  <!-- barras -->
  <path d="M150 54 L342 54 Q350 54 350 62 Q350 70 342 70 L150 70 Z" fill="var(--bad)" fill-opacity="0.7"/>
  <path d="M150 90 L384 90 Q392 90 392 98 Q392 106 384 106 L150 106 Z" fill="var(--bad)" fill-opacity="0.7"/>
  <path d="M150 126 L328 126 Q336 126 336 134 Q336 142 328 142 L150 142 Z" fill="var(--bad)" fill-opacity="0.7"/>
  <path d="M150 162 L360 162 Q368 162 368 170 Q368 178 360 178 L150 178 Z" fill="var(--bad)" fill-opacity="0.7"/>
  <path d="M150 198 L218 198 Q226 198 226 206 Q226 214 218 214 L150 214 Z" fill="var(--ok)" fill-opacity="0.85"/>

  <!-- categorías -->
  <g fill="var(--text)" font-family="inherit" font-size="12" text-anchor="end">
    <text x="142" y="66">Más peso</text>
    <text x="142" y="102">DA alta (calor / altura)</text>
    <text x="142" y="138">Cuesta arriba</text>
    <text x="142" y="174">Pasto o arena</text>
    <text x="142" y="210" font-weight="600">Viento de frente</text>
  </g>

  <!-- eje de distancia con pista -->
  <rect x="150" y="234" width="130" height="6" rx="2" fill="var(--muted)" opacity="0.45"/>
  <line x1="146" y1="244" x2="440" y2="244" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch11-despegue-arrow)"/>
  <text x="295" y="264" fill="var(--text)" font-family="inherit" font-size="12.5" text-anchor="middle">distancia de despegue</text>

  <text x="230" y="290" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Lo rojo alarga la carrera — solo el viento de frente la acorta</text>
</svg>
