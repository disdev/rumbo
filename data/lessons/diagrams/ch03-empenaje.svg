<svg viewBox="0 0 480 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Empenaje de un avión con estabilizadores, timón, elevador y compensador señalados">
  <!-- cola del fuselaje -->
  <path d="M20 165 L200 150 Q240 148 250 160 L250 185 Q235 195 200 193 L20 190 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>

  <!-- estabilizador vertical (fijo) -->
  <path d="M195 152 L225 60 L262 60 L252 150 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- timón (móvil) -->
  <path d="M262 60 L290 62 L268 152 L252 150 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2.5"/>

  <!-- estabilizador horizontal (fijo) -->
  <path d="M205 162 L330 158 L330 172 L210 176 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- elevador (móvil) -->
  <path d="M330 158 L385 157 L385 170 L330 172 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2.5"/>
  <!-- compensador (trim tab) -->
  <path d="M385 159 L410 159 L410 168 L385 168 Z" fill="var(--panel-2)" stroke="var(--ok)" stroke-width="2.5"/>

  <!-- etiquetas -->
  <line x1="230" y1="90" x2="150" y2="60" stroke="var(--muted)" stroke-width="1"/>
  <text x="20" y="45" fill="var(--text)" font-family="inherit" font-size="13">Estabilizador vertical</text>
  <text x="20" y="60" fill="var(--muted)" font-family="inherit" font-size="12">(fijo: estabiliza)</text>

  <line x1="276" y1="90" x2="345" y2="55" stroke="var(--muted)" stroke-width="1"/>
  <text x="330" y="42" fill="var(--accent)" font-family="inherit" font-size="13">Timón (rudder)</text>
  <text x="330" y="57" fill="var(--muted)" font-family="inherit" font-size="12">móvil: controla guiñada</text>

  <line x1="260" y1="172" x2="220" y2="235" stroke="var(--muted)" stroke-width="1"/>
  <text x="90" y="250" fill="var(--text)" font-family="inherit" font-size="13">Estabilizador horizontal</text>
  <text x="110" y="265" fill="var(--muted)" font-family="inherit" font-size="12">(fijo: estabiliza)</text>

  <line x1="355" y1="172" x2="345" y2="220" stroke="var(--muted)" stroke-width="1"/>
  <text x="300" y="235" fill="var(--accent)" font-family="inherit" font-size="13">Elevador (elevator)</text>
  <text x="300" y="250" fill="var(--muted)" font-family="inherit" font-size="12">móvil: controla cabeceo</text>

  <line x1="398" y1="157" x2="420" y2="120" stroke="var(--muted)" stroke-width="1"/>
  <text x="360" y="108" fill="var(--ok)" font-family="inherit" font-size="13">Compensador</text>
  <text x="360" y="123" fill="var(--muted)" font-family="inherit" font-size="12">(trim tab)</text>
</svg>
