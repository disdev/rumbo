<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Empenaje visto de lado: estabilizador vertical y horizontal fijos, timón y elevador móviles, y el pequeño compensador en el borde del elevador">
  <defs>
    <marker id="ch03-empenaje-arrow" markerWidth="8" markerHeight="8" refX="5.5" refY="4" orient="auto-start-reverse">
      <path d="M0 0.5 L7 4 L0 7.5 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <!-- cono de cola del fuselaje -->
  <path d="M20 168 C90 158 160 152 216 152 C238 152 250 156 254 162 L254 182 C248 190 234 194 214 193 L20 192 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>

  <!-- estabilizador vertical (fijo) -->
  <path d="M210 154 C218 120 230 90 246 72 L270 70 C268 96 264 124 260 152 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <!-- bisagra -->
  <line x1="270" y1="72" x2="261" y2="150" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="4 3"/>
  <!-- timón (móvil) -->
  <path d="M270 70 C282 72 290 80 290 92 L278 156 L260 152 Z"
        fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>

  <!-- estabilizador horizontal (fijo) -->
  <path d="M216 166 L328 160 C336 160 338 164 336 168 L220 178 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <!-- elevador (móvil) -->
  <path d="M336 160 L390 157 C396 157 396 162 392 164 L338 168 Z"
        fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
  <!-- compensador (trim tab) -->
  <path d="M392 158 L416 156.5 L416 162 L392 163 Z"
        fill="var(--panel-2)" stroke="var(--ok)" stroke-width="2" stroke-linejoin="round"/>

  <!-- movimiento del elevador: sube y baja -->
  <path d="M429 144 C433 152 433 162 429 170" fill="none" stroke="var(--accent)" stroke-width="1.5"
        marker-start="url(#ch03-empenaje-arrow)" marker-end="url(#ch03-empenaje-arrow)"/>

  <!-- líneas guía con punto en el objetivo -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="118" y1="58" x2="230" y2="106"/>
    <line x1="302" y1="44" x2="282" y2="88"/>
    <line x1="140" y1="240" x2="238" y2="178"/>
    <line x1="330" y1="236" x2="362" y2="166"/>
    <line x1="406" y1="130" x2="404" y2="152"/>
  </g>
  <circle cx="232" cy="107" r="2.5" fill="var(--text)"/>
  <circle cx="281" cy="91" r="2.5" fill="var(--accent)"/>
  <circle cx="240" cy="176" r="2.5" fill="var(--text)"/>
  <circle cx="363" cy="163" r="2.5" fill="var(--accent)"/>
  <circle cx="404" cy="155" r="2.5" fill="var(--ok)"/>

  <g font-family="inherit">
    <text x="14" y="42" fill="var(--text)" font-size="13" font-weight="bold">Estabilizador vertical</text>
    <text x="14" y="58" fill="var(--muted)" font-size="12">(fijo: estabiliza)</text>
    <text x="306" y="38" fill="var(--accent)" font-size="13" font-weight="bold">Timón (rudder)</text>
    <text x="306" y="54" fill="var(--muted)" font-size="12">móvil: controla la guiñada</text>
    <text x="60" y="258" fill="var(--text)" font-size="13" font-weight="bold">Estabilizador horizontal</text>
    <text x="60" y="274" fill="var(--muted)" font-size="12">(fijo: estabiliza)</text>
    <text x="300" y="258" fill="var(--accent)" font-size="13" font-weight="bold">Elevador (elevator)</text>
    <text x="300" y="274" fill="var(--muted)" font-size="12">móvil: controla el cabeceo</text>
    <text x="356" y="110" fill="var(--ok)" font-size="13" font-weight="bold">Compensador</text>
    <text x="356" y="126" fill="var(--muted)" font-size="12">(trim tab)</text>
  </g>
</svg>
