<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Carburador de flotador: venturi, mariposa y cuba">
  <defs>
    <marker id="ch07-cb-mu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--muted)"/></marker>
    <marker id="ch07-cb-ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--accent)"/></marker>
  </defs>

  <!-- conducto con garganta venturi (aire sube de abajo hacia arriba) -->
  <path d="M64,264 L64,190 C64,168 96,160 96,136 L96,44 L146,44 L146,136 C146,160 178,168 178,190 L178,264 Z"
        fill="var(--panel-2)" fill-opacity="0.35" stroke="none"/>
  <g fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round">
    <path d="M64,264 L64,190 C64,168 96,160 96,136 L96,44"/>
    <path d="M178,264 L178,190 C178,168 146,160 146,136 L146,44"/>
  </g>

  <!-- mariposa del acelerador -->
  <line x1="101" y1="90" x2="141" y2="66" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="121" cy="78" r="3" fill="var(--text)"/>

  <!-- flujo de aire: lento abajo, rápido en la garganta, mezcla arriba -->
  <g stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="252" x2="100" y2="226" marker-end="url(#ch07-cb-mu)"/>
    <line x1="142" y1="252" x2="142" y2="226" marker-end="url(#ch07-cb-mu)"/>
    <line x1="121" y1="186" x2="121" y2="132" stroke-width="2" marker-end="url(#ch07-cb-mu)"/>
  </g>
  <line x1="121" y1="58" x2="121" y2="22" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch07-cb-ac)"/>

  <!-- cuba del flotador -->
  <rect x="232" y="156" width="132" height="88" rx="8" fill="var(--panel-2)" fill-opacity="0.35" stroke="var(--text)" stroke-width="2"/>
  <path d="M234,196 L362,196 L362,236 C362,240 358,242 354,242 L242,242 C238,242 234,240 234,236 Z" fill="var(--accent)" fill-opacity="0.25" stroke="none"/>
  <line x1="234" y1="196" x2="362" y2="196" stroke="var(--accent)" stroke-width="1.5"/>
  <ellipse cx="284" cy="191" rx="26" ry="10" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <line x1="308" y1="188" x2="340" y2="176" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="340" y1="166" x2="340" y2="178" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- venteo de la cuba -->
  <line x1="252" y1="156" x2="252" y2="142" stroke="var(--text)" stroke-width="1.5"/>
  <!-- entrada de combustible -->
  <line x1="404" y1="166" x2="352" y2="166" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch07-cb-ac)"/>

  <!-- surtidor: de la cuba al centro del venturi -->
  <path d="M232,210 L164,210 L164,164 C164,152 142,152 130,147" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="var(--accent)">
    <circle cx="123" cy="138" r="2.5"/><circle cx="115" cy="126" r="2.5"/>
    <circle cx="128" cy="120" r="2.5"/><circle cx="119" cy="108" r="2.5"/>
  </g>

  <!-- etiquetas -->
  <g font-family="inherit" font-size="12">
    <text x="130" y="26" fill="var(--accent)" font-weight="bold">mezcla → a los cilindros</text>
    <text x="88" y="106" text-anchor="end" fill="var(--muted)" font-size="11">venturi:</text>
    <text x="88" y="121" text-anchor="end" fill="var(--text)">aire rápido,</text>
    <text x="88" y="136" text-anchor="end" font-weight="bold" fill="var(--text)">presión BAJA</text>
    <text x="160" y="52" fill="var(--accent)">mariposa (acelerador)</text>
    <text x="186" y="134" fill="var(--muted)">surtidor</text>
    <text x="298" y="262" text-anchor="middle" fill="var(--text)">cuba con flotador</text>
    <text x="404" y="152" text-anchor="end" fill="var(--muted)">entrada de combustible</text>
    <text x="121" y="286" text-anchor="middle" fill="var(--muted)">entrada de aire</text>
    <text x="252" y="136" fill="var(--muted)" font-size="11">venteo</text>
  </g>
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="90" y1="141" x2="102" y2="146"/>
    <line x1="176" y1="56" x2="138" y2="70"/>
    <line x1="192" y1="138" x2="178" y2="150"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="103" cy="146.5" r="2.5"/>
    <circle cx="137" cy="70.5" r="2.5"/>
    <circle cx="177" cy="151" r="2.5"/>
  </g>
</svg>
