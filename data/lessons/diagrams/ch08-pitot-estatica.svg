<svg viewBox="0 0 500 310" xmlns="http://www.w3.org/2000/svg" font-family="inherit">
  <!-- puerto estático -->
  <rect x="52" y="58" width="60" height="44" rx="8" fill="var(--panel-2)" stroke="var(--text)"/>
  <circle cx="82" cy="80" r="6" fill="none" stroke="var(--text)" stroke-width="2"/>
  <text x="82" y="46" font-size="13" fill="var(--text)" text-anchor="middle">Puerto estático</text>
  <text x="82" y="118" font-size="12" fill="var(--muted)" text-anchor="middle">aire quieto</text>

  <!-- tubo pitot -->
  <rect x="44" y="212" width="68" height="14" rx="7" fill="var(--panel-2)" stroke="var(--text)"/>
  <circle cx="48" cy="219" r="4" fill="var(--accent)"/>
  <text x="78" y="202" font-size="13" fill="var(--text)" text-anchor="middle">Tubo pitot</text>
  <text x="78" y="246" font-size="12" fill="var(--muted)" text-anchor="middle">mira al frente</text>

  <!-- viento -->
  <line x1="6" y1="219" x2="30" y2="219" stroke="var(--muted)" stroke-width="2"/>
  <polygon points="38,219 28,214 28,224" fill="var(--muted)"/>
  <text x="20" y="266" font-size="12" fill="var(--muted)">viento</text>

  <!-- línea pitot (impacto) -->
  <path d="M112 219 H180 V52 H400" fill="none" stroke="var(--accent)" stroke-width="3"/>

  <!-- línea estática -->
  <path d="M88 80 H320 V240" fill="none" stroke="var(--muted)" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M320 68 H401" fill="none" stroke="var(--muted)" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M320 150 H399" fill="none" stroke="var(--muted)" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M320 240 H399" fill="none" stroke="var(--muted)" stroke-width="3" stroke-dasharray="7 5"/>

  <!-- válvula alterna -->
  <rect x="196" y="72" width="16" height="16" fill="var(--panel-2)" stroke="var(--text)"/>
  <text x="204" y="62" font-size="12" fill="var(--text)" text-anchor="middle">fuente alterna (cabina)</text>

  <!-- instrumentos -->
  <circle cx="430" cy="60" r="30" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="430" y="65" font-size="14" fill="var(--text)" text-anchor="middle">VEL</text>
  <text x="430" y="106" font-size="12" fill="var(--text)" text-anchor="middle">Velocímetro</text>

  <circle cx="430" cy="150" r="30" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="430" y="155" font-size="14" fill="var(--text)" text-anchor="middle">ALT</text>
  <text x="430" y="196" font-size="12" fill="var(--text)" text-anchor="middle">Altímetro</text>

  <circle cx="430" cy="240" r="30" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="430" y="245" font-size="14" fill="var(--text)" text-anchor="middle">VSI</text>
  <text x="430" y="286" font-size="12" fill="var(--text)" text-anchor="middle">Variómetro</text>

  <!-- leyenda -->
  <line x1="120" y1="278" x2="150" y2="278" stroke="var(--accent)" stroke-width="3"/>
  <text x="156" y="282" font-size="12" fill="var(--text)">presión de impacto (solo al velocímetro)</text>
  <line x1="120" y1="296" x2="150" y2="296" stroke="var(--muted)" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="156" y="300" font-size="12" fill="var(--text)">presión estática (a los tres)</text>
</svg>
