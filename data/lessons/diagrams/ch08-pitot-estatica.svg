<svg viewBox="0 0 510 336" xmlns="http://www.w3.org/2000/svg" font-family="inherit" role="img" aria-label="Sistema pitot-estática: el pitot alimenta solo al velocímetro y la estática a los tres instrumentos">
  <defs>
    <marker id="ch08-pitot-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--muted)"/>
    </marker>
  </defs>

  <!-- puerto estático (panel del fuselaje) -->
  <rect x="40" y="50" width="84" height="60" rx="8" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <g fill="var(--muted)">
    <circle cx="50" cy="60" r="1.5"/><circle cx="114" cy="60" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/><circle cx="114" cy="100" r="1.5"/>
  </g>
  <circle cx="82" cy="80" r="7" fill="none" stroke="var(--text)" stroke-width="2"/>
  <circle cx="82" cy="80" r="2.5" fill="var(--text)"/>
  <text x="82" y="38" font-size="13" fill="var(--text)" text-anchor="middle">Puerto estático</text>
  <text x="82" y="126" font-size="12" fill="var(--muted)" text-anchor="middle">aire en calma</text>

  <!-- tubo pitot -->
  <path d="M118 211 L66 211 C52 211 45 214 44 219 C45 224 52 227 66 227 L118 227 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <rect x="114" y="207" width="8" height="24" rx="2" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <circle cx="49" cy="219" r="2.5" fill="var(--accent)"/>
  <text x="81" y="196" font-size="13" fill="var(--text)" text-anchor="middle">Tubo pitot</text>
  <text x="81" y="250" font-size="12" fill="var(--muted)" text-anchor="middle">mira al frente</text>

  <!-- viento -->
  <line x1="6" y1="219" x2="28" y2="219" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#ch08-pitot-arrow)"/>
  <text x="6" y="240" font-size="12" fill="var(--muted)">viento</text>

  <!-- línea de impacto (pitot → velocímetro) -->
  <path d="M122 219 H196 Q206 219 206 209 V82 Q206 72 216 72 H400" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- líneas estáticas (a los tres) -->
  <g fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="7 5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M89 80 H197 Q206 66 215 80 H310"/>
    <path d="M310 80 V238 Q310 248 320 248 H400"/>
    <path d="M310 80 V56 Q310 46 320 46 H411"/>
    <path d="M310 150 Q310 160 320 160 H400"/>
  </g>

  <!-- válvula de fuente alterna -->
  <rect x="302" y="192" width="16" height="16" fill="var(--panel-2)" stroke="var(--text)" stroke-width="1.5"/>
  <line x1="306" y1="204" x2="314" y2="196" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M292 234 L306 212" stroke="var(--muted)" stroke-width="1" fill="none"/>
  <circle cx="307" cy="210" r="2.5" fill="var(--muted)"/>
  <text x="288" y="246" font-size="12" fill="var(--muted)" text-anchor="end">fuente alterna (cabina)</text>

  <!-- instrumentos -->
  <g>
    <circle cx="436" cy="72" r="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
    <circle cx="436" cy="72" r="28" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--muted)" stroke-width="1"/>
    <g transform="translate(436 72)">
      <path stroke="var(--muted)" stroke-width="1" fill="none" d="M0.0 -24.0L0.0 -20.0M17.0 -17.0L14.1 -14.1M24.0 0.0L20.0 0.0M17.0 17.0L14.1 14.1M0.0 24.0L0.0 20.0M-17.0 17.0L-14.1 14.1M-24.0 0.0L-20.0 0.0M-17.0 -17.0L-14.1 -14.1"/>
      <line x1="0" y1="0" x2="15.6" y2="15.6" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
      <circle r="3" fill="var(--text)"/>
    </g>
    <text x="436" y="122" font-size="12" fill="var(--text)" text-anchor="middle">Velocímetro</text>
  </g>
  <g>
    <circle cx="436" cy="160" r="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
    <circle cx="436" cy="160" r="28" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--muted)" stroke-width="1"/>
    <g transform="translate(436 160)">
      <path stroke="var(--muted)" stroke-width="1" fill="none" d="M0.0 -24.0L0.0 -20.0M17.0 -17.0L14.1 -14.1M24.0 0.0L20.0 0.0M17.0 17.0L14.1 14.1M0.0 24.0L0.0 20.0M-17.0 17.0L-14.1 14.1M-24.0 0.0L-20.0 0.0M-17.0 -17.0L-14.1 -14.1"/>
      <line x1="0" y1="0" x2="12.9" y2="6" stroke="var(--text)" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="-21" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
      <circle r="3" fill="var(--text)"/>
    </g>
    <text x="436" y="210" font-size="12" fill="var(--text)" text-anchor="middle">Altímetro</text>
  </g>
  <g>
    <circle cx="436" cy="248" r="34" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
    <circle cx="436" cy="248" r="28" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--muted)" stroke-width="1"/>
    <g transform="translate(436 248)">
      <path stroke="var(--muted)" stroke-width="1" fill="none" d="M0.0 -24.0L0.0 -20.0M17.0 -17.0L14.1 -14.1M24.0 0.0L20.0 0.0M17.0 17.0L14.1 14.1M0.0 24.0L0.0 20.0M-17.0 17.0L-14.1 14.1M-24.0 0.0L-20.0 0.0M-17.0 -17.0L-14.1 -14.1"/>
      <line x1="0" y1="0" x2="-21" y2="0" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
      <circle r="3" fill="var(--text)"/>
    </g>
    <text x="436" y="298" font-size="12" fill="var(--text)" text-anchor="middle">Variómetro</text>
  </g>

  <!-- leyenda -->
  <line x1="40" y1="304" x2="70" y2="304" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="78" y="308" font-size="12" fill="var(--text)">presión de impacto: solo al velocímetro</text>
  <line x1="40" y1="324" x2="70" y2="324" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="78" y="328" font-size="12" fill="var(--text)">presión estática: a los tres instrumentos</text>
</svg>
