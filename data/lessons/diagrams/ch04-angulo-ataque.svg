<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" font-family="inherit" role="img" aria-label="Ángulo de ataque: el ángulo entre la cuerda del ala y el viento relativo">
  <defs>
    <marker id="ch04-aoa-arrow-t" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--text)"/>
    </marker>
    <marker id="ch04-aoa-arrow-m" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--muted)"/>
    </marker>
  </defs>

  <!-- perfil con la nariz arriba (12°), pivotado en el borde de ataque -->
  <g transform="rotate(-12 150 160)">
    <path d="M150 160 C 150 147 163 129 193 120 C 231 109 288 108 334 119 C 367 127 394 145 410 160
             C 380 166 330 172 282 173 C 233 174 186 174 164 170 C 154 168 150 165 150 160 Z"
          fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="100" y1="160" x2="410" y2="160" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="7 5" stroke-linecap="round"/>
  </g>

  <!-- dirección del viento relativo (horizontal) -->
  <line x1="46" y1="160" x2="320" y2="160" stroke="var(--muted)" stroke-width="1" stroke-dasharray="5 5" stroke-linecap="round"/>
  <line x1="56" y1="160" x2="122" y2="160" stroke="var(--text)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch04-aoa-arrow-t)"/>
  <line x1="42" y1="190" x2="102" y2="190" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round" marker-end="url(#ch04-aoa-arrow-m)"/>

  <!-- arco del ángulo de ataque -->
  <path d="M265 160 A 115 115 0 0 0 262.5 136" fill="none" stroke="var(--bad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="290" y1="184" x2="269" y2="153" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="267" cy="150" r="2.5" fill="var(--muted)"/>
  <text x="286" y="200" font-size="14" fill="var(--bad)" font-weight="bold">α: ángulo de ataque</text>
  <text x="286" y="217" font-size="12" fill="var(--bad)">entre cuerda y viento relativo</text>

  <!-- etiquetas -->
  <text x="32" y="216" font-size="14" fill="var(--text)">viento relativo</text>
  <text x="32" y="233" font-size="12" fill="var(--muted)">(opuesto a la trayectoria de vuelo)</text>

  <line x1="398" y1="70" x2="378" y2="106" stroke="var(--muted)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="376" cy="110" r="2.5" fill="var(--muted)"/>
  <text x="398" y="60" font-size="13" fill="var(--accent)" text-anchor="middle">cuerda</text>
</svg>
