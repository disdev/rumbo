<svg viewBox="0 0 420 326" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de la atmósfera estándar: la temperatura baja 2 grados y la presión baja una pulgada de mercurio por cada mil pies, desde 15 grados y 29.92 al nivel del mar">
  <defs>
    <marker id="ch11-isa-arrow-bad" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--bad)"/>
    </marker>
  </defs>

  <text x="210" y="24" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="600">La escalera ISA</text>

  <!-- cielo -->
  <rect x="52" y="60" width="198" height="222" fill="var(--panel-2)" fill-opacity="0.3"/>

  <!-- rejilla: un peldaño por cada 1,000 ft -->
  <g stroke="var(--muted)" stroke-width="1" opacity="0.35">
    <line x1="52" y1="72" x2="386" y2="72"/>
    <line x1="52" y1="114" x2="386" y2="114"/>
    <line x1="52" y1="156" x2="386" y2="156"/>
    <line x1="52" y1="198" x2="386" y2="198"/>
    <line x1="52" y1="240" x2="386" y2="240"/>
  </g>

  <!-- ejes -->
  <line x1="52" y1="60" x2="52" y2="282" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="282" x2="250" y2="282" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
  <g stroke="var(--text)" stroke-width="1.5">
    <line x1="46" y1="72" x2="52" y2="72"/>
    <line x1="46" y1="114" x2="52" y2="114"/>
    <line x1="46" y1="156" x2="52" y2="156"/>
    <line x1="46" y1="198" x2="52" y2="198"/>
    <line x1="46" y1="240" x2="52" y2="240"/>
    <line x1="46" y1="282" x2="52" y2="282"/>
    <line x1="75" y1="282" x2="75" y2="288"/>
    <line x1="150" y1="282" x2="150" y2="288"/>
    <line x1="225" y1="282" x2="225" y2="288"/>
  </g>
  <g fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="end">
    <text x="42" y="76">5,000</text>
    <text x="42" y="118">4,000</text>
    <text x="42" y="160">3,000</text>
    <text x="42" y="202">2,000</text>
    <text x="42" y="244">1,000</text>
    <text x="42" y="286">0</text>
  </g>
  <text x="42" y="52" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="end">ft</text>
  <g fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">
    <text x="75" y="302">5</text>
    <text x="150" y="302">10</text>
    <text x="225" y="302">15</text>
  </g>
  <text x="151" y="318" fill="var(--text)" font-family="inherit" font-size="12.5" text-anchor="middle">temperatura (°C)</text>
  <text x="330" y="318" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">~ −1 inHg / 1,000 ft</text>

  <!-- curva de temperatura -->
  <path d="M 225 282 L 75 72" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="var(--accent)">
    <circle cx="225" cy="282" r="3.5"/>
    <circle cx="195" cy="240" r="3.5"/>
    <circle cx="165" cy="198" r="3.5"/>
    <circle cx="135" cy="156" r="3.5"/>
    <circle cx="105" cy="114" r="3.5"/>
    <circle cx="75" cy="72" r="3.5"/>
  </g>
  <g fill="var(--accent)" font-family="inherit" font-size="11.5" text-anchor="start">
    <text x="233" y="276" font-weight="600">15 °C</text>
    <text x="203" y="234">13 °C</text>
    <text x="173" y="192">11 °C</text>
    <text x="143" y="150">9 °C</text>
    <text x="113" y="108">7 °C</text>
    <text x="83" y="66">5 °C</text>
  </g>

  <!-- peldaño: subir 1,000 ft resta 2 °C -->
  <path d="M 135 156 L 135 114 L 112 114" fill="none" stroke="var(--bad)" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round" marker-end="url(#ch11-isa-arrow-bad)"/>
  <text x="128" y="140" fill="var(--bad)" font-family="inherit" font-size="11.5" text-anchor="end" font-weight="600">−2 °C / 1,000 ft</text>

  <!-- columna de presión -->
  <text x="330" y="52" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">presión (inHg)</text>
  <g fill="var(--ok)" font-family="inherit" font-size="12" text-anchor="middle">
    <text x="330" y="286" font-weight="600">29.92</text>
    <text x="330" y="244">28.92</text>
    <text x="330" y="202">27.92</text>
    <text x="330" y="160">26.92</text>
    <text x="330" y="118">25.92</text>
    <text x="330" y="76">24.92</text>
  </g>

</svg>
