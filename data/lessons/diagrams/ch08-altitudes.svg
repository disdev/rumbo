<svg viewBox="0 0 500 310" xmlns="http://www.w3.org/2000/svg" font-family="inherit" role="img" aria-label="Altitud verdadera medida desde el nivel del mar y altitud absoluta medida desde el terreno">
  <defs>
    <marker id="ch08-altd-arrow-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--ok)"/>
    </marker>
    <marker id="ch08-altd-arrow-ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <text x="14" y="20" font-size="12" fill="var(--muted)">Indicada: lo que lees en el altímetro · De presión: desde el plano estándar 29.92</text>
  <text x="14" y="38" font-size="12" fill="var(--muted)">De densidad: la de presión corregida por temperatura (manda en performance)</text>

  <!-- nivel medio del mar -->
  <line x1="10" y1="262" x2="490" y2="262" stroke="var(--muted)" stroke-width="1.25" stroke-dasharray="6 5"/>

  <!-- mar -->
  <rect x="10" y="263" width="140" height="32" fill="var(--accent)" fill-opacity="0.08"/>
  <path d="M10 262 q10 -6 20 0 t20 0 t20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
  <text x="16" y="286" font-size="12" fill="var(--accent)">mar (nivel medio, MSL)</text>

  <!-- terreno: colina lejana y cerro principal -->
  <path d="M210 262 C250 238 300 230 340 244 C380 256 430 250 470 258 L470 262 Z" fill="var(--panel-2)" fill-opacity="0.4"/>
  <path d="M150 262 C186 244 214 212 250 216 C280 220 298 238 324 230 C348 190 362 170 372 168 C384 170 402 190 428 200 C452 208 476 198 490 194 L490 262 Z" fill="var(--panel-2)" fill-opacity="0.85" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <text x="464" y="246" font-size="12" fill="var(--muted)" text-anchor="end">terreno</text>

  <!-- avión -->
  <g fill="var(--text)" stroke="var(--text)" stroke-width="1" stroke-linejoin="round">
    <path d="M294 74 L297 52 L305 52 L313 70 Z"/>
    <path d="M284 72 L303 70 L304 74.5 L285 76 Z"/>
    <path d="M292 74 C300 70 318 66 336 65 L360 65 C372 66 380 69 384 72.5 C380 76 370 78.5 356 79 L310 79 C300 78.5 294 76.5 292 74 Z"/>
    <path d="M330 79 L353 77 L355 82 L332 84 Z"/>
  </g>

  <!-- altitud verdadera (MSL) -->
  <line x1="312" y1="94" x2="312" y2="254" stroke="var(--ok)" stroke-width="2" marker-start="url(#ch08-altd-arrow-ok)" marker-end="url(#ch08-altd-arrow-ok)"/>
  <text x="302" y="170" font-size="12" fill="var(--ok)" text-anchor="end">VERDADERA (true)</text>
  <text x="302" y="186" font-size="12" fill="var(--ok)" text-anchor="end">sobre el mar (MSL)</text>

  <!-- altitud absoluta (AGL) -->
  <line x1="372" y1="94" x2="372" y2="160" stroke="var(--accent)" stroke-width="2" marker-start="url(#ch08-altd-arrow-ac)" marker-end="url(#ch08-altd-arrow-ac)"/>
  <text x="382" y="120" font-size="12" fill="var(--accent)">ABSOLUTA</text>
  <text x="382" y="136" font-size="12" fill="var(--accent)">sobre el terreno (AGL)</text>
</svg>
