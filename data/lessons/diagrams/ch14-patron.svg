<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Patrón de tráfico estándar con virajes a la izquierda: tramos viento en contra, cruzado, viento a favor, básico y final, con entrada a 45 grados">
  <!-- viento (se aterriza contra el viento) -->
  <path d="M196 34 H128 m0 0 l10 -6 m-10 6 l10 6" fill="none" stroke="var(--bad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="204" y="38" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">viento</text>

  <!-- circuito con esquinas redondeadas (virajes a la izquierda) -->
  <path d="M320 212 L406 212 Q428 212 428 190 L428 110 Q428 88 406 88 L102 88 Q80 88 80 110 L80 190 Q80 212 102 212 L188 212"
        fill="none" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- final resaltado -->
  <path d="M112 212 H186" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- flechas de sentido -->
  <g fill="var(--text)">
    <polygon points="365,206.5 376,212 365,217.5"/>
    <polygon points="422.5,155 428,144 433.5,155"/>
    <polygon points="256,82.5 245,88 256,93.5"/>
    <polygon points="74.5,146 85.5,146 80,157"/>
  </g>
  <polygon points="178,206.5 189,212 178,217.5" fill="var(--ok)"/>

  <!-- pista -->
  <rect x="196" y="202" width="118" height="20" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <line x1="206" y1="212" x2="304" y2="212" stroke="var(--text)" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="255" y="238" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">pista</text>

  <!-- avioncito en viento a favor -->
  <g transform="translate(196 88) rotate(-90)" fill="var(--accent)">
    <path d="M0 -9 C-1.6 -9 -2.4 -6.8 -2.4 -4 L-2.4 -1.2 L-10 2 L-10 4.2 L-2.4 3 L-2.4 6.5 L-5.4 8.6 L-5.4 10.4 L0 9.2 L5.4 10.4 L5.4 8.6 L2.4 6.5 L2.4 3 L10 4.2 L10 2 L2.4 -1.2 L2.4 -4 C2.4 -6.8 1.6 -9 0 -9 Z"/>
  </g>

  <!-- entrada a 45° al punto medio del viento a favor -->
  <path d="M338 26 L262 86 m0 0 l4 -13 m-4 13 l13 -4" fill="none" stroke="var(--ok)" stroke-width="2" stroke-dasharray="7 5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="42" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">entrada a 45°</text>
  <text x="348" y="57" fill="var(--muted)" font-family="inherit" font-size="12">a la altitud del patrón</text>

  <!-- nombres de los tramos -->
  <text x="326" y="236" fill="var(--text)" font-family="inherit" font-size="13">viento en contra</text>
  <text x="326" y="251" fill="var(--muted)" font-family="inherit" font-size="12">(upwind)</text>

  <text x="440" y="148" fill="var(--text)" font-family="inherit" font-size="13">cruzado</text>
  <text x="440" y="163" fill="var(--muted)" font-family="inherit" font-size="12">(crosswind)</text>

  <text x="100" y="64" fill="var(--text)" font-family="inherit" font-size="13">viento a favor (downwind)</text>
  <text x="100" y="79" fill="var(--muted)" font-family="inherit" font-size="12">a 1 000 ft AGL</text>

  <text x="14" y="148" fill="var(--text)" font-family="inherit" font-size="13">básico</text>
  <text x="14" y="163" fill="var(--muted)" font-family="inherit" font-size="12">(base)</text>

  <text x="128" y="238" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold">final</text>

  <!-- nota central -->
  <text x="254" y="144" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold" text-anchor="middle">virajes a la IZQUIERDA</text>
  <text x="254" y="160" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(patrón estándar)</text>

  <text x="250" y="292" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Se aterriza y se despega CONTRA el viento;</text>
  <text x="250" y="308" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">el circuito recorre los cinco tramos en este orden.</text>
</svg>
