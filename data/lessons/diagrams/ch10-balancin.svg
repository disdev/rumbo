<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Balancín en equilibrio: 120 libras a 2 pies del fulcro equilibra 60 libras a 4 pies; ambos momentos valen 240">
  <defs>
    <marker id="ch10-balancin-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  <text x="230" y="26" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="600">Peso × brazo = momento</text>

  <!-- suelo -->
  <rect x="16" y="208" width="428" height="58" fill="var(--panel-2)" fill-opacity="0.35"/>
  <line x1="16" y1="208" x2="444" y2="208" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round"/>

  <!-- fulcro -->
  <path d="M 240 158 L 214 208 L 266 208 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>

  <!-- tabla del balancín -->
  <rect x="64" y="146" width="352" height="9" rx="4.5" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="240" cy="150.5" r="3.5" fill="var(--text)"/>

  <!-- pesa izquierda: 120 lb, brazo corto -->
  <path d="M 144 98 C 144 85 176 85 176 98" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <rect x="128" y="97" width="64" height="49" rx="7" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <text x="160" y="127" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle" font-weight="600">120 lb</text>

  <!-- pesa derecha: 60 lb, brazo largo -->
  <path d="M 389 113 C 389 102 411 102 411 113" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <rect x="377" y="112" width="46" height="34" rx="6" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2" stroke-linejoin="round"/>
  <text x="400" y="134" fill="var(--text)" font-family="inherit" font-size="12.5" text-anchor="middle" font-weight="600">60 lb</text>

  <!-- cotas de brazo -->
  <line x1="160" y1="164" x2="160" y2="184" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="400" y1="164" x2="400" y2="184" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="240" y1="160" x2="240" y2="184" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>

  <line x1="238" y1="178" x2="164" y2="178" stroke="var(--accent)" stroke-width="1.25" stroke-linecap="round" marker-end="url(#ch10-balancin-arrow)"/>
  <line x1="242" y1="178" x2="396" y2="178" stroke="var(--accent)" stroke-width="1.25" stroke-linecap="round" marker-end="url(#ch10-balancin-arrow)"/>
  <text x="176" y="196" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">brazo: 2 pies</text>
  <text x="334" y="196" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">brazo: 4 pies</text>

  <!-- momentos -->
  <text x="150" y="242" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">120 × 2 = <tspan font-weight="600">240</tspan></text>
  <text x="330" y="242" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">60 × 4 = <tspan font-weight="600">240</tspan></text>
  <text x="230" y="284" fill="var(--ok)" font-family="inherit" font-size="14" text-anchor="middle" font-weight="600">momentos iguales → equilibrio</text>
</svg>
