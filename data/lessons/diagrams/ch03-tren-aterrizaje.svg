<svg viewBox="0 0 480 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparación entre tren triciclo con rueda de nariz y tren convencional con patín de cola">
  <!-- Panel izquierdo: triciclo -->
  <text x="120" y="26" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle">Triciclo</text>
  <text x="120" y="42" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(rueda bajo la nariz)</text>
  <path d="M40 110 Q45 95 70 92 L160 90 Q190 89 205 96 L205 112 Q185 122 160 120 L65 118 Q45 118 40 110 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M160 91 L178 62 L192 62 L186 90 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- rueda de nariz -->
  <line x1="58" y1="116" x2="58" y2="138" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="58" cy="146" r="8" fill="var(--panel-2)" stroke="var(--ok)" stroke-width="2.5"/>
  <!-- ruedas principales -->
  <line x1="120" y1="120" x2="120" y2="140" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="120" cy="148" r="9" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2.5"/>
  <line x1="58" y1="160" x2="58" y2="175" stroke="var(--muted)" stroke-width="1"/>
  <text x="20" y="190" fill="var(--ok)" font-family="inherit" font-size="12">rueda de nariz</text>
  <text x="20" y="205" fill="var(--muted)" font-family="inherit" font-size="12">nariz horizontal: ves</text>
  <text x="20" y="220" fill="var(--muted)" font-family="inherit" font-size="12">la pista al rodar</text>

  <!-- Panel derecho: convencional -->
  <text x="360" y="26" fill="var(--text)" font-family="inherit" font-size="14" text-anchor="middle">Convencional</text>
  <text x="360" y="42" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">(patín o rueda de cola)</text>
  <path d="M280 118 Q285 100 310 96 L400 82 Q430 78 445 84 L445 96 Q425 108 400 106 L305 124 Q285 126 280 118 Z"
        fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <path d="M400 83 L416 56 L430 56 L425 80 Z" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- ruedas principales adelante -->
  <line x1="310" y1="124" x2="310" y2="144" stroke="var(--text)" stroke-width="2.5"/>
  <circle cx="310" cy="152" r="9" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2.5"/>
  <!-- rueda de cola -->
  <line x1="432" y1="98" x2="436" y2="112" stroke="var(--text)" stroke-width="2"/>
  <circle cx="437" cy="117" r="5" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2.5"/>
  <line x1="437" y1="124" x2="437" y2="172" stroke="var(--muted)" stroke-width="1"/>
  <text x="392" y="188" fill="var(--bad)" font-family="inherit" font-size="12">rueda de cola</text>
  <text x="330" y="205" fill="var(--muted)" font-family="inherit" font-size="12">nariz levantada: menos</text>
  <text x="330" y="220" fill="var(--muted)" font-family="inherit" font-size="12">visibilidad al rodar</text>

  <line x1="240" y1="55" x2="240" y2="225" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 5"/>
</svg>
