<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Los cuatro tipos de hipoxia segun donde falla el oxigeno">
  <text x="240" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold" text-anchor="middle">Los cuatro tipos de hipoxia</text>

  <!-- conectores -->
  <g stroke="var(--muted)" stroke-width="1.25" fill="none">
    <path d="M186 138 C150 120 120 96 96 72"/>
    <path d="M294 138 C330 120 360 96 384 72"/>
    <path d="M186 162 C150 180 120 204 96 228"/>
    <path d="M294 162 C330 180 360 204 384 228"/>
  </g>

  <!-- centro -->
  <ellipse cx="240" cy="150" rx="66" ry="34" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--accent)" stroke-width="2"/>
  <text x="240" y="147" fill="var(--accent)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="bold">HIPOXIA</text>
  <text x="240" y="164" fill="var(--muted)" font-family="inherit" font-size="10.5" text-anchor="middle">falta de oxigeno</text>

  <!-- nodo helper via 4 tarjetas -->
  <!-- Hipoxica (arriba-izq) -->
  <rect x="12" y="42" width="156" height="60" rx="10" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="24" y="62" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">1. Hipoxica</text>
  <text x="24" y="79" fill="var(--muted)" font-family="inherit" font-size="10.5">poco O2 al respirarlo</text>
  <text x="24" y="93" fill="var(--muted)" font-family="inherit" font-size="10.5">(altura) · la mas comun</text>

  <!-- Hipemica (arriba-der) -->
  <rect x="312" y="42" width="156" height="60" rx="10" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--bad)" stroke-width="1.5"/>
  <text x="324" y="62" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">2. Hipemica</text>
  <text x="324" y="79" fill="var(--muted)" font-family="inherit" font-size="10.5">la sangre no lo transporta</text>
  <text x="324" y="93" fill="var(--muted)" font-family="inherit" font-size="10.5">(CO, anemia)</text>

  <!-- Estancada (abajo-izq) -->
  <rect x="12" y="216" width="156" height="60" rx="10" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--text)" stroke-width="1.5"/>
  <text x="24" y="236" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">3. Estancada</text>
  <text x="24" y="253" fill="var(--muted)" font-family="inherit" font-size="10.5">la sangre no circula</text>
  <text x="24" y="267" fill="var(--muted)" font-family="inherit" font-size="10.5">(fuerzas G, frio)</text>

  <!-- Histotoxica (abajo-der) -->
  <rect x="312" y="216" width="156" height="60" rx="10" fill="var(--panel-2)" fill-opacity="0.45" stroke="var(--text)" stroke-width="1.5"/>
  <text x="324" y="236" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">4. Histotoxica</text>
  <text x="324" y="253" fill="var(--muted)" font-family="inherit" font-size="10.5">la celula no lo usa</text>
  <text x="324" y="267" fill="var(--muted)" font-family="inherit" font-size="10.5">(alcohol, toxicos)</text>
</svg>
