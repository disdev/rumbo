<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cortes transversales de un frente frío empinado con cumulonimbus y un frente cálido en rampa suave con estratos">
  <line x1="240" y1="20" x2="240" y2="270" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- FRENTE FRÍO -->
  <text x="120" y="28" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="bold">Frente FRÍO</text>
  <line x1="20" y1="240" x2="220" y2="240" stroke="var(--text)" stroke-width="2"/>
  <!-- cuña empinada de aire frío -->
  <path d="M 20 240 L 130 240 Q 90 200 80 120 L 20 120 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2"/>
  <text x="58" y="190" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">aire frío</text>
  <text x="58" y="204" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">(pala)</text>
  <polygon points="118,232 100,224 100,240" fill="var(--accent)"/>
  <text x="82" y="228" fill="var(--accent)" font-family="inherit" font-size="11" text-anchor="end">rápido</text>
  <!-- aire cálido levantado de golpe -->
  <path d="M 150 238 Q 148 200 140 160" fill="none" stroke="var(--bad)" stroke-width="2"/>
  <polygon points="138,152 132,166 146,164" fill="var(--bad)"/>
  <!-- Cb -->
  <path d="M 155 150 Q 140 120 152 90 L 152 74 L 128 74 L 128 62 L 208 62 L 208 74 L 186 74 L 186 90 Q 198 120 188 150 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="2"/>
  <text x="170" y="120" fill="var(--bad)" font-family="inherit" font-size="12" text-anchor="middle">Cb</text>
  <!-- chubasco -->
  <line x1="160" y1="158" x2="155" y2="176" stroke="var(--bad)" stroke-width="2"/>
  <line x1="172" y1="158" x2="167" y2="176" stroke="var(--bad)" stroke-width="2"/>
  <line x1="184" y1="158" x2="179" y2="176" stroke="var(--bad)" stroke-width="2"/>
  <text x="120" y="262" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">levanta el aire cálido de golpe:</text>
  <text x="120" y="276" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">chubascos violentos y rápidos</text>

  <!-- FRENTE CÁLIDO -->
  <text x="360" y="28" fill="var(--text)" font-family="inherit" font-size="15" text-anchor="middle" font-weight="bold">Frente CÁLIDO</text>
  <line x1="260" y1="240" x2="460" y2="240" stroke="var(--text)" stroke-width="2"/>
  <!-- rampa suave: aire cálido trepa sobre el frío -->
  <path d="M 460 240 L 270 240 L 270 226 Q 360 214 460 130 Z" fill="var(--panel-2)" stroke="var(--accent)" stroke-width="2"/>
  <text x="330" y="236" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="middle">aire frío que se retira</text>
  <!-- flecha del aire cálido subiendo la rampa -->
  <path d="M 285 210 Q 340 195 400 155" fill="none" stroke="var(--bad)" stroke-width="2"/>
  <polygon points="407,150 393,152 400,164" fill="var(--bad)"/>
  <text x="318" y="188" fill="var(--bad)" font-family="inherit" font-size="12">aire cálido trepa la rampa</text>
  <!-- capas de estratos -->
  <rect x="270" y="150" width="90" height="12" rx="6" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1.5"/>
  <rect x="310" y="120" width="100" height="12" rx="6" fill="var(--panel-2)" stroke="var(--muted)" stroke-width="1.5"/>
  <path d="M 380 92 q 14 -9 28 0 q 14 8 28 -2" fill="none" stroke="var(--muted)" stroke-width="2"/>
  <text x="300" y="144" fill="var(--muted)" font-family="inherit" font-size="11">nimbostratus</text>
  <text x="352" y="114" fill="var(--muted)" font-family="inherit" font-size="11">altostratus</text>
  <text x="414" y="82" fill="var(--muted)" font-family="inherit" font-size="11">cirrus</text>
  <!-- llovizna continua -->
  <line x1="285" y1="168" x2="282" y2="182" stroke="var(--muted)" stroke-width="1.5"/>
  <line x1="300" y1="168" x2="297" y2="182" stroke="var(--muted)" stroke-width="1.5"/>
  <line x1="315" y1="168" x2="312" y2="182" stroke="var(--muted)" stroke-width="1.5"/>
  <text x="360" y="262" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">sube lento y suave: estratos,</text>
  <text x="360" y="276" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">lluvia constante, techos bajos</text>

  <text x="240" y="294" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">Al cruzar CUALQUIER frente: siempre cambia la dirección del viento</text>
</svg>
