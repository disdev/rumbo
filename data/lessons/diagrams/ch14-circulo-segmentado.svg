<svg viewBox="0 0 480 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Círculo segmentado con manga de viento al centro y extensiones en L que indican la dirección del viraje de básico a final">
  <!-- círculo segmentado -->
  <circle cx="210" cy="170" r="95" fill="none" stroke="var(--text)" stroke-width="6" stroke-dasharray="18 14"/>

  <!-- manga de viento al centro (viento del este: se infla hacia el oeste) -->
  <line x1="212" y1="196" x2="212" y2="160" stroke="var(--text)" stroke-width="3"/>
  <polygon points="212,158 212,176 158,171 158,163" fill="var(--accent)"/>

  <!-- viento -->
  <path d="M340 120 h-60 m0 0 l12 -7 m-12 7 l12 7" stroke="var(--bad)" stroke-width="2.5" fill="none"/>
  <text x="346" y="124" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">viento (del este)</text>

  <!-- indicador de franja de aterrizaje (pista 09-27, este-oeste) con extensión en L -->
  <!-- franja alineada con la pista, en el lado oeste del círculo -->
  <rect x="96" y="252" width="46" height="10" fill="var(--text)"/>
  <!-- brazo de la L: paralelo al tramo básico, hacia el norte -->
  <rect x="96" y="216" width="10" height="40" fill="var(--text)"/>
  <line x1="140" y1="258" x2="196" y2="290" stroke="var(--muted)" stroke-width="1"/>
  <text x="200" y="288" fill="var(--text)" font-family="inherit" font-size="12">extensión en L: el viraje de</text>
  <text x="200" y="302" fill="var(--text)" font-family="inherit" font-size="12">básico a final llega por el norte</text>
  <text x="200" y="316" fill="var(--muted)" font-family="inherit" font-size="12">= patrón IZQUIERDO para la pista 09</text>

  <!-- etiquetas -->
  <line x1="180" y1="168" x2="120" y2="96" stroke="var(--muted)" stroke-width="1"/>
  <text x="22" y="72" fill="var(--accent)" font-family="inherit" font-size="12">Manga: el viento entra por la</text>
  <text x="22" y="86" fill="var(--accent)" font-family="inherit" font-size="12">boca ancha y la infla</text>

  <line x1="290" y1="220" x2="342" y2="234" stroke="var(--muted)" stroke-width="1"/>
  <text x="330" y="252" fill="var(--ok)" font-family="inherit" font-size="12">Aterriza CONTRA el</text>
  <text x="330" y="266" fill="var(--ok)" font-family="inherit" font-size="12">viento: hacia el este</text>
  <text x="330" y="280" fill="var(--muted)" font-family="inherit" font-size="12">(pista 09)</text>

  <text x="150" y="30" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Círculo segmentado</text>
</svg>
