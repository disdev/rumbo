<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Círculo segmentado con manga de viento al centro y extensión en L que indica la dirección del viraje de básico a final">
  <defs>
    <marker id="ch14-circ-arrow-bad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--bad)"/>
    </marker>
    <marker id="ch14-circ-arrow-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--ok)"/>
    </marker>
  </defs>

  <text x="24" y="30" fill="var(--text)" font-family="inherit" font-size="14" font-weight="bold">Círculo segmentado</text>

  <!-- círculo de segmentos -->
  <circle cx="225" cy="180" r="95" fill="var(--panel-2)" fill-opacity="0.25" stroke="var(--text)" stroke-width="6" stroke-dasharray="19 15" stroke-linecap="round"/>

  <!-- manga de viento al centro: viento del este, la manga apunta al oeste -->
  <line x1="225" y1="216" x2="225" y2="164" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="225" cy="217" rx="9" ry="3" fill="var(--text)" fill-opacity="0.3"/>
  <path d="M225 158 C211 159.5 197 161.5 184 163.5 L184 169.5 C197 171.5 211 173.5 225 175 Z" fill="var(--accent)"/>
  <path d="M212 159.4 L212 173.6 L204 172.4 L204 160.6 Z" fill="var(--panel-2)"/>
  <path d="M196 161.7 L196 171.3 L190 170.4 L190 162.6 Z" fill="var(--panel-2)"/>

  <!-- viento del este -->
  <path d="M382 116 L310 142" fill="none" stroke="var(--bad)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch14-circ-arrow-bad)"/>
  <text x="330" y="104" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">viento del este</text>

  <!-- indicador de franja (pista 09-27) con extensión en L hacia el norte -->
  <rect x="100" y="270" width="48" height="9" rx="2" fill="var(--text)"/>
  <rect x="100" y="232" width="9" height="42" rx="2" fill="var(--text)"/>

  <!-- trayectoria de básico a final (llega por el norte, vira al este) -->
  <path d="M88 206 L88 244 Q88 262 106 262 L162 262" fill="none" stroke="var(--ok)" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" marker-end="url(#ch14-circ-arrow-ok)"/>
  <text x="130" y="250" fill="var(--ok)" font-family="inherit" font-size="11">a final</text>

  <!-- líneas guía -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="118" y1="94" x2="196" y2="160"/>
    <line x1="168" y1="298" x2="112" y2="256"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="198" cy="162" r="2.5"/>
    <circle cx="110" cy="254" r="2.5"/>
  </g>

  <text x="24" y="66" fill="var(--accent)" font-family="inherit" font-size="12" font-weight="bold">Manga de viento</text>
  <text x="24" y="81" fill="var(--muted)" font-family="inherit" font-size="12">el viento entra por la boca</text>
  <text x="24" y="95" fill="var(--muted)" font-family="inherit" font-size="12">ancha y la infla</text>

  <text x="330" y="240" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">Aterriza CONTRA el</text>
  <text x="330" y="255" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">viento: hacia el este</text>
  <text x="330" y="270" fill="var(--muted)" font-family="inherit" font-size="12">(pista 09)</text>

  <text x="172" y="302" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">Extensión en L:</text>
  <text x="172" y="317" fill="var(--text)" font-family="inherit" font-size="12">el viraje de básico a final llega por el norte</text>
  <text x="172" y="332" fill="var(--muted)" font-family="inherit" font-size="12">= patrón IZQUIERDO para la pista 09</text>
</svg>
