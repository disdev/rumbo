<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avión de perfil con el datum en la nariz y los brazos hasta asientos, combustible y equipaje">
  <!-- datum -->
  <line x1="82" y1="42" x2="82" y2="212" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="82" y="32" fill="var(--accent)" font-family="inherit" font-size="14" text-anchor="middle">DATUM</text>
  <text x="82" y="228" fill="var(--muted)" font-family="inherit" font-size="11" text-anchor="middle">el "km 0" del avión</text>

  <!-- fuselaje (perfil simple) -->
  <ellipse cx="215" cy="115" rx="128" ry="27" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- cola -->
  <polygon points="322,104 372,62 388,62 352,110" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <line x1="340" y1="104" x2="405" y2="98" stroke="var(--text)" stroke-width="3"/>
  <!-- ala (vista de costado) -->
  <rect x="168" y="112" width="92" height="9" rx="4" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- hélice -->
  <line x1="87" y1="96" x2="87" y2="134" stroke="var(--text)" stroke-width="3"/>
  <!-- tren -->
  <line x1="160" y1="140" x2="160" y2="158" stroke="var(--text)" stroke-width="2"/>
  <circle cx="160" cy="163" r="6" fill="none" stroke="var(--text)" stroke-width="2"/>
  <line x1="255" y1="140" x2="255" y2="158" stroke="var(--text)" stroke-width="2"/>
  <circle cx="255" cy="163" r="6" fill="none" stroke="var(--text)" stroke-width="2"/>

  <!-- estaciones -->
  <circle cx="200" cy="115" r="4" fill="var(--text)"/>
  <circle cx="240" cy="113" r="4" fill="var(--text)"/>
  <circle cx="325" cy="106" r="4" fill="var(--text)"/>
  <!-- CG -->
  <circle cx="216" cy="115" r="6" fill="var(--ok)"/>
  <text x="216" y="98" fill="var(--ok)" font-family="inherit" font-size="13" text-anchor="middle">CG</text>

  <!-- brazos (líneas de cota) -->
  <line x1="82" y1="196" x2="200" y2="196" stroke="var(--accent)" stroke-width="2"/>
  <line x1="200" y1="190" x2="200" y2="202" stroke="var(--accent)" stroke-width="2"/>
  <line x1="200" y1="123" x2="200" y2="190" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="230" y="200" fill="var(--text)" font-family="inherit" font-size="12">brazo 37 in — asientos</text>

  <line x1="82" y1="222" x2="240" y2="222" stroke="var(--accent)" stroke-width="2"/>
  <line x1="240" y1="216" x2="240" y2="228" stroke="var(--accent)" stroke-width="2"/>
  <line x1="240" y1="121" x2="240" y2="216" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="270" y="226" fill="var(--text)" font-family="inherit" font-size="12">brazo 48 in — combustible</text>

  <line x1="82" y1="248" x2="325" y2="248" stroke="var(--accent)" stroke-width="2"/>
  <line x1="325" y1="242" x2="325" y2="254" stroke="var(--accent)" stroke-width="2"/>
  <line x1="325" y1="114" x2="325" y2="242" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="355" y="252" fill="var(--text)" font-family="inherit" font-size="12">brazo 95 in — equipaje</text>

  <text x="240" y="272" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Todo brazo se mide desde el datum, en pulgadas, hacia atrás (+)</text>
</svg>
