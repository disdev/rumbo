<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="El oido interno: canales semicirculares, vestibulo y coclea">
  <text x="16" y="26" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">El oido interno</text>

  <!-- vestibulo (cuerpo central) -->
  <path d="M150 150 C150 132 168 122 186 128 C204 134 208 156 200 172 C193 186 172 190 160 178 C150 168 150 160 150 150 Z" fill="var(--panel-2)" fill-opacity="0.5" stroke="var(--text)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- canal horizontal (lateral): sale a la derecha -->
  <path d="M196 158 C232 150 262 158 268 178 C273 196 258 212 234 210 C214 208 200 194 198 178" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
  <!-- ampolla del horizontal -->
  <circle cx="200" cy="176" r="6" fill="var(--accent)"/>

  <!-- canal superior (anterior): arco hacia arriba -->
  <path d="M166 132 C160 96 178 66 206 66 C234 66 250 92 240 120 C236 132 226 140 214 140" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="168" cy="134" r="6" fill="var(--accent)"/>

  <!-- canal posterior: arco hacia arriba-izquierda -->
  <path d="M156 148 C120 140 96 112 104 84 C112 58 142 54 160 74 C170 86 172 104 168 120" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>
  <circle cx="158" cy="146" r="6" fill="var(--accent)" fill-opacity="0.7"/>

  <!-- coclea (espiral) -->
