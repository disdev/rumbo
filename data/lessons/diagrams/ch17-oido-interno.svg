<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="El oído interno y los canales semicirculares que causan desorientación">
  <!-- cabeza simplificada -->
  <circle cx="150" cy="150" r="95" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <text x="150" y="255" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">tu cabeza</text>

  <!-- canales semicirculares (tres anillos) -->
  <ellipse cx="150" cy="120" rx="42" ry="20" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
  <ellipse cx="150" cy="150" rx="20" ry="42" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
  <ellipse cx="150" cy="150" rx="42" ry="20" fill="none" stroke="var(--accent)" stroke-width="2.5" transform="rotate(45 150 150)"/>
  <circle cx="150" cy="150" r="10" fill="var(--accent)" opacity="0.4"/>

  <!-- leader -->
  <line x1="230" y1="120" x2="300" y2="90" stroke="var(--muted)" stroke-width="1"/>
  <text x="300" y="70" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">Canales</text>
  <text x="300" y="86" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">semicirculares</text>
  <text x="300" y="104" fill="var(--muted)" font-family="inherit" font-size="11">sienten el giro con</text>
  <text x="300" y="118" fill="var(--muted)" font-family="inherit" font-size="11">líquido que se mueve</text>

  <!-- trap message -->
  <rect x="290" y="150" width="160" height="118" rx="8" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="1.5"/>
  <text x="300" y="172" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">El engaño:</text>
  <text x="300" y="190" fill="var(--muted)" font-family="inherit" font-size="11">un giro lento y sostenido</text>
  <text x="300" y="204" fill="var(--muted)" font-family="inherit" font-size="11">deja de sentirse.</text>
  <text x="300" y="224" fill="var(--muted)" font-family="inherit" font-size="11">Al nivelar, sientes que</text>
  <text x="300" y="238" fill="var(--muted)" font-family="inherit" font-size="11">giras al otro lado</text>
  <text x="300" y="252" fill="var(--muted)" font-family="inherit" font-size="11">= "the leans".</text>
</svg>
