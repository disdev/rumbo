88.3 143.3 291.3 135.9 293.2 C128.5 295.1 120.5 296 112.8 295.8 C105.1 295.6 97 294.3 89.5 292 C82 289.7 71.3 283.7 67.7 282" fill="none" stroke="var(--muted)" stroke-width="4" stroke-linecap="round"/>
  <path d="M150 172 C138 186 128 196 67.7 282" fill="none" stroke="var(--muted)" stroke-width="4" stroke-linecap="round"/>

  <!-- leaders -->
  <line x1="234" y1="76" x2="300" y2="60" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="234" cy="76" r="2.5" fill="var(--muted)"/>
  <text x="306" y="56" fill="var(--accent)" font-family="inherit" font-size="12" font-weight="bold">Canales</text>
  <text x="306" y="70" fill="var(--accent)" font-family="inherit" font-size="12" font-weight="bold">semicirculares</text>
  <text x="306" y="86" fill="var(--muted)" font-family="inherit" font-size="10">tres planos: sienten</text>
  <text x="306" y="98" fill="var(--muted)" font-family="inherit" font-size="10">el giro con liquido</text>
  <text x="306" y="110" fill="var(--muted)" font-family="inherit" font-size="10">en movimiento</text>

  <line x1="200" y1="176" x2="250" y2="132" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="200" cy="176" r="2.5" fill="var(--muted)"/>
  <text x="252" y="132" fill="var(--text)" font-family="inherit" font-size="10">ampollas (sensores)</text>

  <line x1="118" y1="212" x2="96" y2="252" stroke="var(--muted)" stroke-width="1"/>
  <circle cx="118" cy="212" r="2.5" fill="var(--muted)"/>
  <text x="60" y="266" fill="var(--muted)" font-family="inherit" font-size="10">coclea (oido)</text>

  <!-- trap box -->
  <rect x="296" y="130" width="152" height="150" rx="10" fill="var(--panel-2)" fill-opacity="0.5" stroke="var(--bad)" stroke-width="1.5"/>
  <text x="310" y="152" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">El engano</text>
  <text x="310" y="172" fill="var(--muted)" font-family="inherit" font-size="10.5">Un giro lento y sostenido</text>
  <text x="310" y="186" fill="var(--muted)" font-family="inherit" font-size="10.5">deja de sentirse: el liquido</text>
  <text x="310" y="200" fill="var(--muted)" font-family="inherit" font-size="10.5">se estabiliza.</text>
  <text x="310" y="222" fill="var(--muted)" font-family="inherit" font-size="10.5">Al nivelar, sientes que</text>
  <text x="310" y="236" fill="var(--muted)" font-family="inherit" font-size="10.5">giras al otro lado.</text>
  <text x="310" y="258" fill="var(--text)" font-family="inherit" font-size="10.5" font-weight="bold">Sin horizonte visible,</text>
  <text x="310" y="272" fill="var(--bad)" font-family="inherit" font-size="10.5" font-weight="bold">el oido te miente.</text>
</svg>
