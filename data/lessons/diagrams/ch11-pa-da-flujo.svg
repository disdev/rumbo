<svg viewBox="0 0 440 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flujo de cálculo: elevación más ajuste del altímetro da la altitud de presión; sumando la corrección por temperatura se obtiene la altitud de densidad">
  <defs>
    <marker id="ch11-flujo-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--accent)"/>
    </marker>
    <marker id="ch11-flujo-arrow-bad" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.8 L9.5 5 L0.5 9.2 Z" fill="var(--bad)"/>
    </marker>
  </defs>

  <!-- paso 1: lo que conoces -->
  <rect x="100" y="36" width="240" height="44" rx="10" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--text)" stroke-width="1.5"/>
  <text x="220" y="63" fill="var(--text)" font-family="inherit" font-size="13" text-anchor="middle">Elevación + ajuste del altímetro</text>

  <line x1="220" y1="82" x2="220" y2="114" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch11-flujo-arrow)"/>
  <text x="234" y="102" fill="var(--accent)" font-family="inherit" font-size="12" text-anchor="start">+ (29.92 − ajuste) × 1,000</text>

  <!-- paso 2: altitud de presión -->
  <rect x="100" y="118" width="240" height="56" rx="10" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--accent)" stroke-width="2"/>
  <text x="220" y="142" fill="var(--text)" font-family="inherit" font-size="13.5" text-anchor="middle" font-weight="600">Altitud de PRESIÓN (PA)</text>
  <text x="220" y="162" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">el altímetro puesto en 29.92</text>

  <line x1="220" y1="176" x2="220" y2="208" stroke="var(--bad)" stroke-width="2" stroke-linecap="round" marker-end="url(#ch11-flujo-arrow-bad)"/>
  <text x="234" y="196" fill="var(--bad)" font-family="inherit" font-size="12" text-anchor="start">+ 120 × (OAT − ISA)</text>
  <!-- sol: la corrección es por calor -->
  <g stroke="var(--bad)" stroke-width="1.5" stroke-linecap="round">
    <circle cx="188" cy="192" r="5.5" fill="none"/>
    <line x1="188" y1="182" x2="188" y2="184.5"/>
    <line x1="188" y1="199.5" x2="188" y2="202"/>
    <line x1="178" y1="192" x2="180.5" y2="192"/>
    <line x1="195.5" y1="192" x2="198" y2="192"/>
    <line x1="181" y1="185" x2="182.8" y2="186.8"/>
    <line x1="193.2" y1="197.2" x2="195" y2="199"/>
    <line x1="195" y1="185" x2="193.2" y2="186.8"/>
    <line x1="182.8" y1="197.2" x2="181" y2="199"/>
  </g>

  <!-- paso 3: altitud de densidad -->
  <rect x="100" y="212" width="240" height="56" rx="10" fill="var(--panel-2)" fill-opacity="0.6" stroke="var(--bad)" stroke-width="2"/>
  <text x="220" y="236" fill="var(--text)" font-family="inherit" font-size="13.5" text-anchor="middle" font-weight="600">Altitud de DENSIDAD (DA)</text>
  <text x="220" y="256" fill="var(--muted)" font-family="inherit" font-size="11.5" text-anchor="middle">la altitud que el avión siente</text>

  <!-- ejemplo -->
  <line x1="48" y1="282" x2="392" y2="282" stroke="var(--muted)" stroke-width="1" opacity="0.4"/>
  <text x="220" y="302" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Ej.: PA 5,000 ft · OAT 25 °C → ISA 5 °C → sobran 20 °C</text>
  <text x="220" y="322" fill="var(--bad)" font-family="inherit" font-size="13" text-anchor="middle" font-weight="600">DA = 5,000 + 120 × 20 = 7,400 ft</text>
</svg>
