<svg viewBox="0 0 440 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Matriz de riesgo de tres por tres: probabilidad en el eje vertical y severidad en el horizontal, del verde aceptable al rojo inaceptable">
  <defs>
    <marker id="ch02-matriz-arrow" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0.5 L8 4.5 L0 8.5 Z" fill="var(--text)"/>
    </marker>
  </defs>

  <text x="12" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Matriz de riesgo = probabilidad × severidad</text>

  <!-- celdas: fila superior = frecuente -->
  <g stroke-linejoin="round">
    <rect x="128" y="48" width="90" height="62" rx="6" fill="var(--warn)" fill-opacity="0.3"/>
    <rect x="221" y="48" width="90" height="62" rx="6" fill="var(--bad)" fill-opacity="0.35"/>
    <rect x="314" y="48" width="90" height="62" rx="6" fill="var(--bad)" fill-opacity="0.55" stroke="var(--bad)" stroke-width="2"/>
    <rect x="128" y="113" width="90" height="62" rx="6" fill="var(--ok)" fill-opacity="0.25"/>
    <rect x="221" y="113" width="90" height="62" rx="6" fill="var(--warn)" fill-opacity="0.3"/>
    <rect x="314" y="113" width="90" height="62" rx="6" fill="var(--bad)" fill-opacity="0.35"/>
    <rect x="128" y="178" width="90" height="62" rx="6" fill="var(--ok)" fill-opacity="0.45"/>
    <rect x="221" y="178" width="90" height="62" rx="6" fill="var(--ok)" fill-opacity="0.25"/>
    <rect x="314" y="178" width="90" height="62" rx="6" fill="var(--warn)" fill-opacity="0.3"/>
  </g>

  <text x="173" y="213" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">Aceptable</text>
  <text x="359" y="74" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">¡Inaceptable!</text>
  <text x="359" y="90" fill="var(--bad)" font-family="inherit" font-size="11" text-anchor="middle">cambia el plan</text>

  <!-- filas: probabilidad -->
  <g fill="var(--text)" font-family="inherit" font-size="12" text-anchor="end">
    <text x="116" y="83">Frecuente</text>
    <text x="116" y="148">Ocasional</text>
    <text x="116" y="213">Improbable</text>
  </g>
  <!-- columnas: severidad -->
  <g fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">
    <text x="173" y="264">Leve</text>
    <text x="266" y="264">Grave</text>
    <text x="359" y="264">Catastrófica</text>
  </g>

  <!-- ejes -->
  <g stroke="var(--text)" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#ch02-matriz-arrow)">
    <line x1="122" y1="246" x2="122" y2="42"/>
    <line x1="122" y1="246" x2="412" y2="246"/>
  </g>
  <text x="32" y="146" fill="var(--muted)" font-family="inherit" font-size="12" transform="rotate(-90 32 146)" text-anchor="middle">¿Qué tan probable?</text>
  <text x="266" y="288" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Si pasa, ¿qué tan grave?</text>

  <text x="220" y="314" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">verde: sigue · amarillo: mitiga el riesgo · rojo: cambia el plan</text>
</svg>
