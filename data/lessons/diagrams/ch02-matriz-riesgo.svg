<svg viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Matriz de riesgo: probabilidad contra severidad, de aceptable en verde a inaceptable en rojo">
  <text x="12" y="24" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Matriz de riesgo = probabilidad × severidad</text>

  <!-- celdas (fila superior = frecuente) -->
  <g stroke="var(--muted)" stroke-width="1">
    <rect x="120" y="50" width="94" height="66" fill="var(--bad)" fill-opacity="0.18"/>
    <rect x="214" y="50" width="94" height="66" fill="var(--bad)" fill-opacity="0.38"/>
    <rect x="308" y="50" width="94" height="66" fill="var(--bad)" fill-opacity="0.6"/>
    <rect x="120" y="116" width="94" height="66" fill="var(--ok)" fill-opacity="0.15"/>
    <rect x="214" y="116" width="94" height="66" fill="var(--bad)" fill-opacity="0.18"/>
    <rect x="308" y="116" width="94" height="66" fill="var(--bad)" fill-opacity="0.38"/>
    <rect x="120" y="182" width="94" height="66" fill="var(--ok)" fill-opacity="0.32"/>
    <rect x="214" y="182" width="94" height="66" fill="var(--ok)" fill-opacity="0.15"/>
    <rect x="308" y="182" width="94" height="66" fill="var(--bad)" fill-opacity="0.18"/>
  </g>

  <text x="167" y="220" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">Aceptable</text>
  <text x="355" y="87" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold" text-anchor="middle">¡Inaceptable!</text>
  <text x="355" y="102" fill="var(--bad)" font-family="inherit" font-size="11" text-anchor="middle">cambia el plan</text>

  <!-- etiquetas de filas (probabilidad) -->
  <text x="112" y="87" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="end">Frecuente</text>
  <text x="112" y="153" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="end">Ocasional</text>
  <text x="112" y="219" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="end">Improbable</text>

  <!-- etiquetas de columnas (severidad) -->
  <text x="167" y="268" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Leve</text>
  <text x="261" y="268" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Grave</text>
  <text x="355" y="268" fill="var(--text)" font-family="inherit" font-size="12" text-anchor="middle">Catastrófica</text>

  <!-- ejes -->
  <line x1="120" y1="248" x2="120" y2="44" stroke="var(--text)" stroke-width="2"/>
  <path d="M115 52 L120 42 L125 52" fill="none" stroke="var(--text)" stroke-width="2"/>
  <line x1="120" y1="248" x2="408" y2="248" stroke="var(--text)" stroke-width="2"/>
  <path d="M400 243 L410 248 L400 253" fill="none" stroke="var(--text)" stroke-width="2"/>

  <text x="30" y="150" fill="var(--muted)" font-family="inherit" font-size="12" transform="rotate(-90 30 150)" text-anchor="middle">¿Qué tan probable?</text>
  <text x="261" y="292" fill="var(--muted)" font-family="inherit" font-size="12" text-anchor="middle">Si pasa, ¿qué tan grave?</text>
</svg>
