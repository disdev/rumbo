<svg viewBox="0 0 480 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cómo leer techo y piso en la carta: el número de arriba es el techo, el de abajo es el piso, y SFC significa superficie; a la derecha, el perfil vertical correspondiente">
  <text x="26" y="30" fill="var(--muted)" font-family="inherit" font-size="12">Así aparece en la carta:</text>
  <text x="250" y="30" fill="var(--muted)" font-family="inherit" font-size="12">…y esto significa en vertical:</text>

  <!-- recorte de carta -->
  <rect x="24" y="42" width="180" height="218" rx="6" fill="var(--panel-2)" fill-opacity="0.25" stroke="var(--muted)" stroke-width="1"/>

  <!-- etiqueta TMA -->
  <text x="44" y="76" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">TMA (C)</text>
  <text x="44" y="102" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">FL245</text>
  <line x1="44" y1="110" x2="122" y2="110" stroke="var(--text)" stroke-width="1.5"/>
  <text x="44" y="130" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">4500 ft</text>

  <!-- etiqueta CTR -->
  <text x="44" y="180" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold">CTR (D)</text>
  <text x="44" y="206" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">3500 ft</text>
  <line x1="44" y1="214" x2="122" y2="214" stroke="var(--text)" stroke-width="1.5"/>
  <text x="44" y="234" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">SFC</text>

  <!-- perfil vertical -->
  <rect x="252" y="64" width="196" height="86" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="350" y="112" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold" text-anchor="middle">TMA</text>

  <rect x="300" y="170" width="100" height="78" fill="var(--ok)" fill-opacity="0.14" stroke="var(--ok)" stroke-width="1.5"/>
  <text x="350" y="212" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold" text-anchor="middle">CTR</text>

  <!-- suelo -->
  <rect x="240" y="248" width="216" height="12" fill="var(--panel-2)" fill-opacity="0.5"/>
  <line x1="240" y1="248" x2="456" y2="248" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>

  <!-- techo / piso -->
  <text x="404" y="58" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">TECHO</text>
  <text x="404" y="166" fill="var(--text)" font-family="inherit" font-size="12" font-weight="bold">PISO</text>
  <text x="252" y="276" fill="var(--muted)" font-family="inherit" font-size="12">SFC = superficie (el suelo)</text>

  <!-- líneas guía: número de la carta → borde del perfil -->
  <g stroke="var(--muted)" stroke-width="1">
    <line x1="116" y1="97" x2="248" y2="66"/>
    <line x1="118" y1="126" x2="248" y2="148"/>
    <line x1="114" y1="202" x2="296" y2="171"/>
    <line x1="90" y1="230" x2="298" y2="245"/>
    <line x1="400" y1="61" x2="452" y2="66"/>
    <line x1="400" y1="161" x2="452" y2="152"/>
  </g>
  <g fill="var(--muted)">
    <circle cx="250" cy="65" r="2.5"/><circle cx="250" cy="149" r="2.5"/>
    <circle cx="298" cy="170" r="2.5"/><circle cx="300" cy="246" r="2.5"/>
    <circle cx="452" cy="66" r="2.5"/><circle cx="452" cy="152" r="2.5"/>
  </g>

  <text x="130" y="92" fill="var(--muted)" font-family="inherit" font-size="11">arriba</text>
  <text x="130" y="140" fill="var(--muted)" font-family="inherit" font-size="11">abajo</text>
</svg>
