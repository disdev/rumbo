<svg viewBox="0 0 470 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilusion somatogravica: la aceleracion se siente como cabeceo hacia arriba">
  <defs>
    <marker id="ch17-som-accel" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 L3 5 Z" fill="var(--ok)"/></marker>
    <marker id="ch17-som-fall" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 L3 5 Z" fill="var(--bad)"/></marker>
  </defs>
  <text x="16" y="26" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">Ilusion somatogravica</text>

  <!-- REALIDAD: avion nivelado acelerando -->
  <text x="20" y="52" fill="var(--ok)" font-family="inherit" font-size="12" font-weight="bold">Realidad</text>
  <line x1="20" y1="86" x2="200" y2="86" stroke="var(--muted)" stroke-width="0.75" stroke-dasharray="4 4"/>
  <g transform="translate(96 86)">
    <path d="M-52 0 C-52 -3 -40 -5 -18 -6 C-6 -6 6 -7 24 -6 C34 -5.5 44 -4 50 -1 C52 0 50 2 44 3 C24 6 0 6 -20 5 C-40 4 -52 3 -52 0 Z" fill="var(--panel-2)" stroke="var(--ok)" stroke-width="1.75" stroke-linejoin="round"/>
    <path d="M6 -4 C4 -18 2 -24 -2 -24 C-6 -24 -8 -14 -6 -3 Z" fill="var(--panel-2)" stroke="var(--ok)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M-46 -1 C-52 -11 -54 -13 -58 -12 C-60 -8 -56 -3 -50 -1 Z" fill="var(--panel-2)" stroke="var(--ok)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <line x1="60" y1="112" x2="150" y2="112" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch17-som-accel)"/>
  <text x="20" y="132" fill="var(--muted)" font-family="inherit" font-size="11">nivelado, acelera fuerte</text>

  <!-- SENSACION: nariz arriba -->
  <text x="20" y="176" fill="var(--bad)" font-family="inherit" font-size="12" font-weight="bold">Lo que sientes</text>
  <line x1="20" y1="212" x2="200" y2="212" stroke="var(--muted)" stroke-width="0.75" stroke-dasharray="4 4"/>
  <g transform="translate(96 210) rotate(-18)">
    <path d="M-52 0 C-52 -3 -40 -5 -18 -6 C-6 -6 6 -7 24 -6 C34 -5.5 44 -4 50 -1 C52 0 50 2 44 3 C24 6 0 6 -20 5 C-40 4 -52 3 -52 0 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="1.75" stroke-linejoin="round"/>
    <path d="M6 -4 C4 -18 2 -24 -2 -24 C-6 -24 -8 -14 -6 -3 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M-46 -1 C-52 -11 -54 -13 -58 -12 C-60 -8 -56 -3 -50 -1 Z" fill="var(--panel-2)" stroke="var(--bad)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="20" y="256" fill="var(--muted)" font-family="inherit" font-size="11">"la nariz sube" (falso)</text>

  <!-- caja del peligro -->
  <rect x="238" y="46" width="220" height="212" rx="12" fill="var(--panel-2)" fill-opacity="0.5" stroke="var(--bad)" stroke-width="1.5"/>
  <text x="256" y="74" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">El peligro</text>
  <text x="256" y="100" fill="var(--muted)" font-family="inherit" font-size="11.5">Despegue de noche o sobre</text>
  <text x="256" y="116" fill="var(--muted)" font-family="inherit" font-size="11.5">el mar: aceleras y "sientes"</text>
  <text x="256" y="132" fill="var(--muted)" font-family="inherit" font-size="11.5">que subes demasiado...</text>
  <text x="256" y="158" fill="var(--text)" font-family="inherit" font-size="11.5">bajas la nariz para corregir</text>
  <line x1="256" y1="170" x2="336" y2="192" stroke="var(--bad)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ch17-som-fall)"/>
  <text x="256" y="212" fill="var(--bad)" font-family="inherit" font-size="11.5" font-weight="bold">y vuelas hacia el suelo.</text>
  <text x="256" y="238" fill="var(--accent)" font-family="inherit" font-size="11.5" font-weight="bold">Confia en los instrumentos,</text>
  <text x="256" y="252" fill="var(--accent)" font-family="inherit" font-size="11.5" font-weight="bold">no en el cuerpo.</text>
</svg>
