<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Triángulo de viento: vector aire con rumbo y TAS, vector viento y vector tierra con derrota y GS">
  <text x="14" y="26" fill="var(--text)" font-family="inherit" font-size="15" font-weight="bold">El triángulo de viento</text>

  <!-- vector aire: rumbo + TAS (apunta contra el viento) -->
  <line x1="70" y1="240" x2="398" y2="152" stroke="var(--accent)" stroke-width="3"/>
  <path d="M410 149 L392 146 L396 162 Z" fill="var(--accent)"/>
  <text x="150" y="168" fill="var(--accent)" font-family="inherit" font-size="13" font-weight="bold">Vector AIRE: rumbo + TAS</text>
  <text x="150" y="184" fill="var(--muted)" font-family="inherit" font-size="12">a dónde apunta la nariz</text>

  <!-- vector viento: del extremo del vector aire al destino -->
  <line x1="410" y1="152" x2="430" y2="228" stroke="var(--bad)" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M433 240 L422 226 L437 222 Z" fill="var(--bad)"/>
  <text x="330" y="120" fill="var(--bad)" font-family="inherit" font-size="13" font-weight="bold">Vector VIENTO</text>
  <text x="330" y="136" fill="var(--muted)" font-family="inherit" font-size="12">dirección + velocidad</text>
  <line x1="392" y1="128" x2="418" y2="180" stroke="var(--muted)" stroke-width="1"/>

  <!-- vector tierra: derrota + GS -->
  <line x1="70" y1="240" x2="418" y2="240" stroke="var(--ok)" stroke-width="3"/>
  <path d="M433 240 L415 233 L415 247 Z" fill="var(--ok)"/>
  <text x="140" y="266" fill="var(--ok)" font-family="inherit" font-size="13" font-weight="bold">Vector TIERRA: derrota (curso) + GS</text>
  <text x="140" y="282" fill="var(--muted)" font-family="inherit" font-size="12">tu camino real sobre el suelo</text>

  <!-- puntos -->
  <circle cx="70" cy="240" r="5" fill="var(--text)"/>
  <text x="42" y="262" fill="var(--text)" font-family="inherit" font-size="12">Salida</text>
  <circle cx="433" cy="240" r="5" fill="var(--text)"/>
  <text x="416" y="262" fill="var(--text)" font-family="inherit" font-size="12">Destino</text>

  <!-- WCA -->
  <path d="M150 240 A 80 80 0 0 0 147 219" fill="none" stroke="var(--text)" stroke-width="2"/>
  <text x="160" y="222" fill="var(--text)" font-family="inherit" font-size="13" font-weight="bold">WCA</text>
  <text x="160" y="237" fill="var(--muted)" font-family="inherit" font-size="11">corrección al viento</text>

  <text x="14" y="52" fill="var(--muted)" font-family="inherit" font-size="12">La nariz apunta hacia el viento; el viento te empuja; el resultado es tu derrota.</text>
</svg>
