<svg viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" font-family="inherit">
  <!-- Cuatro tiempos del motor recíproco -->
  <g stroke="var(--text)" stroke-width="2" fill="none">
    <!-- Tiempo 1: Admisión -->
    <g transform="translate(20,30)">
      <rect x="20" y="30" width="90" height="110" fill="var(--panel-2)"/>
      <rect x="28" y="95" width="74" height="34" fill="var(--muted)" stroke="var(--text)"/>
      <line x1="65" y1="129" x2="65" y2="170"/>
      <circle cx="65" cy="178" r="10"/>
      <!-- válvula admisión abierta -->
      <line x1="38" y1="12" x2="38" y2="34" stroke="var(--ok)" stroke-width="3"/>
      <path d="M10 8 L34 22" stroke="var(--ok)" stroke-width="2" marker-end="none"/>
      <path d="M28 16 L34 22 L26 24" stroke="var(--ok)" fill="none"/>
      <line x1="92" y1="12" x2="92" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <path d="M65 50 L65 78 M60 70 L65 78 L70 70" stroke="var(--accent)"/>
    </g>
    <!-- Tiempo 2: Compresión -->
    <g transform="translate(185,30)">
      <rect x="20" y="30" width="90" height="110" fill="var(--panel-2)"/>
      <rect x="28" y="42" width="74" height="34" fill="var(--muted)" stroke="var(--text)"/>
      <line x1="65" y1="76" x2="65" y2="170"/>
      <circle cx="65" cy="178" r="10"/>
      <line x1="38" y1="12" x2="38" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <line x1="92" y1="12" x2="92" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <path d="M65 68 L65 50 M60 58 L65 50 L70 58" stroke="var(--accent)"/>
    </g>
    <!-- Tiempo 3: Potencia -->
    <g transform="translate(350,30)">
      <rect x="20" y="30" width="90" height="110" fill="var(--panel-2)"/>
      <rect x="28" y="80" width="74" height="34" fill="var(--muted)" stroke="var(--text)"/>
      <line x1="65" y1="114" x2="65" y2="170"/>
      <circle cx="65" cy="178" r="10"/>
      <line x1="38" y1="12" x2="38" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <line x1="92" y1="12" x2="92" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <!-- chispa -->
      <path d="M65 30 L58 44 L68 42 L60 58" stroke="var(--bad)" stroke-width="2.5" fill="none"/>
      <path d="M65 62 L65 76 M60 68 L65 76 L70 68" stroke="var(--bad)"/>
    </g>
    <!-- Tiempo 4: Escape -->
    <g transform="translate(515,30)">
      <rect x="20" y="30" width="90" height="110" fill="var(--panel-2)"/>
      <rect x="28" y="46" width="74" height="34" fill="var(--muted)" stroke="var(--text)"/>
      <line x1="65" y1="80" x2="65" y2="170"/>
      <circle cx="65" cy="178" r="10"/>
      <line x1="38" y1="12" x2="38" y2="26" stroke="var(--muted)" stroke-width="3"/>
      <!-- válvula escape abierta -->
      <line x1="92" y1="12" x2="92" y2="34" stroke="var(--bad)" stroke-width="3"/>
      <path d="M96 20 L118 8 M112 8 L118 8 L116 14" stroke="var(--bad)" fill="none"/>
    </g>
  </g>
  <g fill="var(--text)" font-size="14" text-anchor="middle">
    <text x="85" y="238">1. Admisión</text>
    <text x="250" y="238">2. Compresión</text>
    <text x="415" y="238">3. Potencia</text>
    <text x="580" y="238">4. Escape</text>
  </g>
  <g fill="var(--muted)" font-size="12" text-anchor="middle">
    <text x="85" y="18">entra mezcla</text>
    <text x="250" y="18">se aprieta</text>
    <text x="415" y="18">¡chispa!</text>
    <text x="580" y="18">salen gases</text>
  </g>
</svg>
