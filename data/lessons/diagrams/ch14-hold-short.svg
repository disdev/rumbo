<svg viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marca de posición de espera: dos líneas sólidas del lado de la calle de rodaje donde se detiene el avión y dos discontinuas del lado de la pista">
  <!-- pista -->
  <rect x="20" y="30" width="400" height="66" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <line x1="30" y1="63" x2="410" y2="63" stroke="var(--text)" stroke-width="3" stroke-dasharray="16 12"/>
  <text x="32" y="50" fill="var(--muted)" font-family="inherit" font-size="12">PISTA 16-34</text>

  <!-- calle de rodaje -->
  <rect x="165" y="96" width="110" height="210" fill="var(--panel-2)" stroke="var(--text)" stroke-width="2"/>
  <!-- eje amarillo: sólido abajo, guía discontinua hacia la pista -->
  <line x1="220" y1="306" x2="220" y2="198" stroke="var(--accent)" stroke-width="4"/>
  <line x1="220" y1="198" x2="220" y2="96" stroke="var(--accent)" stroke-width="4" stroke-dasharray="10 8"/>

  <!-- marca de posición de espera: 2 discontinuas (lado pista) + 2 sólidas (lado calle) -->
  <line x1="167" y1="166" x2="273" y2="166" stroke="var(--accent)" stroke-width="5" stroke-dasharray="10 7"/>
  <line x1="167" y1="176" x2="273" y2="176" stroke="var(--accent)" stroke-width="5" stroke-dasharray="10 7"/>
  <line x1="167" y1="188" x2="273" y2="188" stroke="var(--accent)" stroke-width="5"/>
  <line x1="167" y1="198" x2="273" y2="198" stroke="var(--accent)" stroke-width="5"/>

  <!-- avión que espera (triángulo) -->
  <path d="M220 232 L207 262 L220 254 L233 262 Z" fill="var(--ok)"/>

  <!-- flecha: saliendo de la pista -->
  <path d="M252 110 v110 m0 0 l-6 -10 m6 10 l6 -10" stroke="var(--muted)" stroke-width="2" fill="none"/>

  <!-- etiquetas -->
  <line x1="273" y1="171" x2="330" y2="150" stroke="var(--muted)" stroke-width="1"/>
  <text x="292" y="136" fill="var(--text)" font-family="inherit" font-size="12">Dos discontinuas:</text>
  <text x="292" y="150" fill="var(--muted)" font-family="inherit" font-size="12">lado de la pista</text>

  <line x1="273" y1="193" x2="330" y2="206" stroke="var(--muted)" stroke-width="1"/>
  <text x="296" y="212" fill="var(--text)" font-family="inherit" font-size="12">Dos sólidas:</text>
  <text x="296" y="226" fill="var(--muted)" font-family="inherit" font-size="12">lado de la calle de rodaje</text>

  <line x1="212" y1="250" x2="140" y2="262" stroke="var(--muted)" stroke-width="1"/>
  <text x="14" y="256" fill="var(--ok)" font-family="inherit" font-size="12">Sólidas de TU lado:</text>
  <text x="14" y="270" fill="var(--ok)" font-family="inherit" font-size="12">DETENTE antes de las líneas</text>
  <text x="14" y="284" fill="var(--muted)" font-family="inherit" font-size="12">(no cruces sin autorización)</text>

  <line x1="252" y1="120" x2="330" y2="108" stroke="var(--muted)" stroke-width="1"/>
  <text x="300" y="116" fill="var(--text)" font-family="inherit" font-size="12">Saliendo de la pista:</text>
  <text x="300" y="130" fill="var(--muted)" font-family="inherit" font-size="12">cruza las 4 líneas</text>
  <text x="300" y="144" fill="var(--muted)" font-family="inherit" font-size="12">por completo</text>
</svg>
