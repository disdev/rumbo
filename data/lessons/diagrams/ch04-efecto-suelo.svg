<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" font-family="inherit" role="img" aria-label="Efecto suelo: cerca de la pista el flujo descendente se bloquea y baja la resistencia inducida">
  <defs>
    <marker id="ch04-suelo-arrow-m" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--muted)"/>
    </marker>
  </defs>

  <!-- pista -->
  <rect x="16" y="204" width="408" height="20" fill="var(--panel-2)" fill-opacity="0.55"/>
  <line x1="16" y1="204" x2="424" y2="204" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="214" x2="406" y2="214" stroke="var(--text)" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="20 16"/>

  <!-- avión en flotación, nariz arriba -->
  <g transform="translate(185 156) rotate(-5) scale(0.75)" stroke="var(--text)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="var(--panel-2)">
    <ellipse cx="99" cy="-3" rx="2" ry="13" fill="var(--muted)" fill-opacity="0.5" stroke="none"/>
    <path d="M -74 -6 C -86 -6 -96 -5 -101 -4 C -103.5 -3.5 -103.5 -1 -101 -0.5 C -94 0.5 -82 0.5 -72 0 Z"/>
    <path d="M -50 -12 C -61 -28 -68 -41 -70 -50 C -70.5 -53 -68 -54.5 -65 -53 C -54 -46 -43 -30 -35 -15 C -40 -14 -45 -13 -50 -12 Z"/>
    <path d="M 98 -2 C 98 -7 93 -10 85 -11 L 62 -13 C 56 -22 47 -27 36 -27 L 4 -27 C -24 -24 -60 -15 -88 -10 C -93 -9 -96 -7 -96 -4 C -96 -1 -93 0 -88 0 C -58 4 -20 9 12 9 C 42 9 70 7 85 4 C 93 2 98 1 98 -2 Z"/>
    <path d="M 40 -29 L -12 -29 C -17 -29 -18 -31 -17 -33 C -16 -35 -13 -36 -8 -36 L 34 -36 C 40 -36 43 -34 43 -32 C 43 -30.5 42 -29 40 -29 Z"/>
    <path d="M 36 -25 C 44 -25 51 -21 56 -14 L 38 -14 Z" fill="var(--muted)" fill-opacity="0.45" stroke="none"/>
    <path d="M 10 -24 L 30 -24 L 30 -14 L 12 -14 Z" fill="var(--muted)" fill-opacity="0.45" stroke="none"/>
  </g>

  <!-- flujo descendente que el suelo "aplasta" -->
  <g fill="none" stroke="var(--muted)" stroke-width="1.25" stroke-linecap="round">
    <path d="M148 156 C 128 170 112 182 96 190 C 82 197 64 199 48 198" marker-end="url(#ch04-suelo-arrow-m)"/>
    <path d="M140 144 C 116 162 94 180 74 189 C 60 195 44 196 32 195" marker-end="url(#ch04-suelo-arrow-m)"/>
    <path d="M158 168 C 144 178 130 188 116 193 C 104 197 90 198 78 197" marker-end="url(#ch04-suelo-arrow-m)"/>
  </g>
  <text x="110" y="244" font-size="12" fill="var(--muted)" text-anchor="middle">el suelo bloquea el flujo descendente</text>

  <!-- cota: menos de una envergadura -->
  <g stroke="var(--accent)" stroke-width="1.25" stroke-linecap="round">
    <line x1="398" y1="140" x2="398" y2="204" stroke-dasharray="5 4"/>
    <line x1="390" y1="140" x2="406" y2="140"/>
  </g>
  <text x="416" y="128" font-size="13" fill="var(--accent)" text-anchor="end">menos de 1 envergadura de altura</text>

  <text x="220" y="42" font-size="14" fill="var(--ok)" font-weight="bold" text-anchor="middle">menos resistencia inducida → el avión «flota»</text>
</svg>
