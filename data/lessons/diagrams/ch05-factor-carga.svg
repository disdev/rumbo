<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="inherit" role="img" aria-label="Factor de carga contra ángulo de banqueo: 2 G a 60 grados y crecimiento explosivo después">
  <defs>
    <marker id="ch05-carga-arrow" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--text)"/>
    </marker>
  </defs>

  <!-- zona de peligro: más de 60° -->
  <rect x="304" y="48" width="120" height="200" fill="var(--bad)" fill-opacity="0.08"/>

  <!-- rejilla -->
  <g stroke="var(--muted)" stroke-width="0.75" stroke-opacity="0.4">
    <line x1="64" y1="186" x2="424" y2="186"/>
    <line x1="64" y1="124" x2="424" y2="124"/>
    <line x1="64" y1="62" x2="424" y2="62"/>
  </g>

  <!-- ejes -->
  <g stroke="var(--text)" stroke-width="1.5" stroke-linecap="round">
    <line x1="64" y1="248" x2="430" y2="248" marker-end="url(#ch05-carga-arrow)"/>
    <line x1="64" y1="248" x2="64" y2="42" marker-end="url(#ch05-carga-arrow)"/>
    <line x1="184" y1="248" x2="184" y2="253"/>
    <line x1="244" y1="248" x2="244" y2="253"/>
    <line x1="304" y1="248" x2="304" y2="253"/>
    <line x1="364" y1="248" x2="364" y2="253"/>
    <line x1="424" y1="248" x2="424" y2="253"/>
  </g>
  <g font-size="11" fill="var(--muted)" text-anchor="middle">
    <text x="184" y="268">30°</text><text x="244" y="268">45°</text><text x="304" y="268">60°</text>
    <text x="364" y="268">75°</text><text x="424" y="268">90°</text>
  </g>
  <g font-size="11" fill="var(--muted)" text-anchor="end">
    <text x="56" y="252">1</text><text x="56" y="190">2</text><text x="56" y="128">3</text><text x="56" y="66">4</text>
  </g>
  <text x="244" y="290" font-size="13" fill="var(--text)" text-anchor="middle">ángulo de banqueo</text>
  <text x="26" y="145" font-size="13" fill="var(--text)" text-anchor="middle" transform="rotate(-90 26 145)">factor de carga (G)</text>

  <!-- curva n = 1 / cos(banqueo) -->
  <path d="M64 248 C 106 247 148 243 184 238 C 214 234 228 230 244 222 C 270 210 288 202 304 186 C 320 170 334 152 344 129 C 352 111 360 92 369 48"
        fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- asíntota en 90° -->
  <line x1="424" y1="48" x2="424" y2="248" stroke="var(--bad)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="418" y="40" font-size="11" fill="var(--bad)" text-anchor="end">a 90° → infinito</text>

  <!-- puntos clave -->
  <g stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 4">
    <line x1="304" y1="192" x2="304" y2="248"/>
    <line x1="64" y1="186" x2="298" y2="186"/>
  </g>
  <circle cx="184" cy="238" r="3.5" fill="var(--ok)"/>
  <circle cx="244" cy="222" r="3.5" fill="var(--ok)"/>
  <circle cx="304" cy="186" r="4.5" fill="var(--bad)"/>
  <text x="176" y="220" font-size="12" fill="var(--text)" text-anchor="middle">30° → 1.15 G</text>
  <text x="234" y="202" font-size="12" fill="var(--text)" text-anchor="middle">45° → 1.41 G</text>
  <text x="290" y="166" font-size="13" fill="var(--bad)" text-anchor="middle" font-weight="bold">60° → 2 G</text>
  <text x="342" y="76" font-size="12" fill="var(--bad)" text-anchor="end" font-weight="bold">pasando 60°,</text>
  <text x="342" y="91" font-size="12" fill="var(--bad)" text-anchor="end" font-weight="bold">¡se dispara!</text>
</svg>
